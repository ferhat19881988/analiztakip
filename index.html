<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>Fenomen Öğretmen Paneli</title>
  <link rel="icon" href="https://i.ibb.co/cS9PSRpq/Logo-Fenomen.jpg" />
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#f4f7fb;
  --surface:#ffffff;
  --surface-2:#f8fafc;
  --surface-3:#eef4ff;
  --ink:#0f172a;
  --text:#1f2937;
  --muted:#64748b;
  --muted-2:#94a3b8;
  --line:#e2e8f0;
  --line-strong:#cbd5e1;
  --primary:#1d4ed8;
  --primary-2:#2563eb;
  --primary-3:#60a5fa;
  --primary-soft:#eaf1ff;
  --navy:#0b1220;
  --navy-2:#172554;
  --cyan:#06b6d4;
  --purple:#7c3aed;
  --success:#16a34a;
  --success-soft:#eafaf1;
  --warning:#d97706;
  --warning-soft:#fff7e6;
  --danger:#dc2626;
  --danger-soft:#fff1f2;
  --radius-sm:12px;
  --radius:18px;
  --radius-lg:26px;
  --shadow-xs:0 1px 2px rgba(15,23,42,.05);
  --shadow:0 14px 38px rgba(15,23,42,.08);
  --shadow-lg:0 30px 80px rgba(15,23,42,.16);
  --focus:0 0 0 4px rgba(37,99,235,.14);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{width:100%;min-height:100%;overflow-x:hidden;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  margin:0;
  width:100%;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  color:var(--text);
  font-family:'Inter',ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  letter-spacing:-.011em;
  background:
    radial-gradient(circle at 0% 0%, rgba(37,99,235,.14) 0, rgba(37,99,235,0) 34%),
    radial-gradient(circle at 100% 0%, rgba(124,58,237,.11) 0, rgba(124,58,237,0) 30%),
    linear-gradient(135deg,#f8fbff 0%,#f3f7fd 42%,#eef5ff 100%);
  background-attachment:fixed;
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(120deg,rgba(255,255,255,.72),rgba(255,255,255,0) 36%),
    radial-gradient(circle at 28% 100%, rgba(6,182,212,.10), transparent 34%);
  z-index:-1;
}
img{max-width:100%;display:block}
button,input,select,textarea{font:inherit}
button{border:0;cursor:pointer}
a{color:inherit}

.app,.app-shell{min-height:100vh;position:relative}
.app-shell,.container{width:min(1240px,100%);margin:0 auto;padding:26px 20px 42px}
.container{padding-bottom:calc(112px + env(safe-area-inset-bottom))}
body:has(.bottom-nav){padding-bottom:0}

.card,.login-card,.section-card,.student-hero{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(226,232,240,.92);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
}
.card{padding:20px}
.card,.section-card,.student-hero{position:relative;overflow:hidden}
.card::before,.section-card::before,.student-hero::before{
  content:"";position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--cyan),transparent);opacity:.78;
}

/* LOGIN */
.login-wrap{
  min-height:100dvh;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:34px 18px;
}
.login-card{
  width:min(960px,100%);
  min-height:560px;
  padding:0;
  display:grid;
  grid-template-columns:minmax(330px,.9fr) minmax(360px,1fr);
  overflow:hidden;
  box-shadow:var(--shadow-lg);
  border:1px solid rgba(255,255,255,.8);
}
.login-hero{
  position:relative;
  color:#fff;
  min-height:560px;
  padding:40px 34px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
    radial-gradient(circle at 20% 16%, rgba(96,165,250,.42), transparent 32%),
    radial-gradient(circle at 90% 10%, rgba(6,182,212,.32), transparent 32%),
    linear-gradient(145deg,#081226 0%,#172554 48%,#1d4ed8 100%);
}
.login-hero::after{
  content:"";position:absolute;inset:auto -80px -80px auto;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.10);filter:blur(1px);
}
.login-logo-mark{
  width:104px;height:104px;border-radius:26px;background:#fff;display:grid;place-items:center;overflow:hidden;
  border:1px solid rgba(255,255,255,.48);box-shadow:0 22px 48px rgba(0,0,0,.22);position:relative;z-index:1;
}
.login-logo-mark img{width:100%;height:100%;object-fit:contain}
.login-hero h1{margin:22px 0 8px;font-size:34px;line-height:1.08;font-weight:900;letter-spacing:-.055em;color:#fff}
.login-hero p{margin:0;color:rgba(255,255,255,.78);line-height:1.65;font-weight:600;max-width:330px}
.login-hero-badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px;position:relative;z-index:1}
.login-hero-badges span{display:inline-flex;align-items:center;gap:7px;min-height:34px;padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.20);color:#fff;font-size:12px;font-weight:800;backdrop-filter:blur(10px)}
.login-form-panel{padding:46px 42px;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(180deg,#fff,#fbfdff)}
.login-form-panel h2{margin:0 0 8px;color:var(--ink);font-size:30px;line-height:1.12;font-weight:900;letter-spacing:-.045em;text-align:left}
.login-form-panel .login-copy{margin:0 0 28px;color:var(--muted);font-weight:600;line-height:1.55;text-align:left}
.login-card .field{margin-top:0;text-align:left}
.login-card .tiny{color:var(--muted-2);text-align:center;font-weight:700}
.login-icon,.login-logo{width:108px;height:108px;border-radius:26px;margin:0 auto 18px;display:grid;place-items:center;overflow:hidden;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.login-icon img,.login-logo img,.logo-img{width:100%;height:100%;object-fit:contain}
.login-title{margin:0;text-align:center;font-size:30px;line-height:1.08;font-weight:900;letter-spacing:-.045em;color:var(--ink)}
.login-sub{margin:10px auto 26px;text-align:center;max-width:380px;color:var(--muted);font-weight:600;line-height:1.6}
.loading-card{width:min(520px,100%);padding:34px;text-align:center}
.loading-card h1{margin:12px 0 6px;font-size:26px;color:var(--ink)}
.loading-card p{margin:0;color:var(--muted);font-weight:600;line-height:1.55}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:30;padding:16px 20px 6px;background:linear-gradient(180deg,rgba(244,247,251,.96),rgba(244,247,251,.74) 70%,transparent);backdrop-filter:blur(12px)}
.topbar-inner{
  width:min(1240px,100%);margin:0 auto;padding:12px 14px;
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.93);border:1px solid rgba(226,232,240,.94);border-radius:26px;box-shadow:var(--shadow);
}
.app-shell>.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin:0 0 20px;padding:12px 0;background:transparent;border-bottom:0;position:relative;backdrop-filter:none}
.brand{display:flex;align-items:center;gap:14px;min-width:0;flex:1}
.brand>div:not(.logo):not(.logo-box){min-width:0}
.logo,.logo-box{width:64px;height:64px;min-width:64px;border-radius:20px;background:#fff;display:grid;place-items:center;overflow:hidden;line-height:0;border:1px solid var(--line);box-shadow:0 12px 28px rgba(37,99,235,.10)}
.logo img,.logo-box img{width:100%;height:100%;object-fit:contain}
.brand h1{margin:0;font-size:20px;line-height:1.12;font-weight:900;letter-spacing:-.04em;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand p{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.section-title{margin:14px 0 18px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.section-title h2,.section-head h3{margin:0;color:var(--ink);font-weight:900;letter-spacing:-.045em}
.section-title h2{font-size:clamp(25px,3vw,36px);line-height:1.05}
.section-title p,.section-head p{margin:7px 0 0;color:var(--muted);font-weight:600;line-height:1.55}
.section-card{padding:24px;margin-top:12px}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
.section-head h3{font-size:24px;line-height:1.15}
.card h2,.card h3{color:var(--ink);letter-spacing:-.035em}.card h2{font-size:24px}.card h3{font-size:19px;margin-top:0}

.grid{display:grid;gap:16px}.two,.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.three,.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.four,.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.compact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:13px}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.row.nowrap{flex-wrap:nowrap}.row>*{min-width:0}.spacer{flex:1}
.meta-row,.chipbar{display:flex;flex-wrap:wrap;gap:9px}

label,.field label{display:block;margin:0 0 8px;color:#334155;font-size:13px;font-weight:800;letter-spacing:-.01em}
.field{width:100%;display:flex;flex-direction:column;gap:8px}
input,select,textarea,.input{
  width:100%;max-width:100%;min-height:50px;border:1px solid var(--line-strong);background:#fff;color:var(--ink);border-radius:16px;padding:13px 15px;outline:none;font-size:15px;font-weight:600;transition:box-shadow .18s ease,border-color .18s ease,background .18s ease,transform .18s ease;appearance:none;-webkit-appearance:none;box-shadow:var(--shadow-xs)
}
select{background-image:linear-gradient(45deg,transparent 50%,#64748b 50%),linear-gradient(135deg,#64748b 50%,transparent 50%);background-position:calc(100% - 18px) 22px,calc(100% - 12px) 22px;background-size:6px 6px,6px 6px;background-repeat:no-repeat;padding-right:34px}
textarea{min-height:110px;resize:vertical;line-height:1.56}
input:focus,select:focus,textarea:focus,.input:focus{border-color:var(--primary-2);box-shadow:var(--focus);background:#fff}
::placeholder{color:#94a3b8;font-weight:500}

.btn,.primary,.secondary,.ghost,.danger-btn,.success-btn,.warning-btn,.btn-primary,.btn-light,.btn-danger,.btn-ghost{
  min-height:48px;border-radius:16px;padding:12px 16px;display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:800;text-decoration:none;line-height:1.1;transition:transform .16s ease,box-shadow .16s ease,background .16s ease,border-color .16s ease,opacity .16s ease;border:1px solid transparent;user-select:none;white-space:nowrap
}
.btn:hover,.primary:hover,.secondary:hover,.ghost:hover,.danger-btn:hover,.success-btn:hover,.warning-btn:hover,.btn-primary:hover,.btn-light:hover,.btn-danger:hover,.btn-ghost:hover{transform:translateY(-1px)}
.btn:active,.primary:active,.secondary:active,.ghost:active,.danger-btn:active,.success-btn:active,.warning-btn:active{transform:translateY(0) scale(.99)}
.primary,.btn-primary{color:#fff;background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 56%,#172554 100%);box-shadow:0 14px 28px rgba(37,99,235,.24)}
.secondary,.btn-light{color:#1d4ed8;background:#eef4ff;border-color:#dbeafe;box-shadow:var(--shadow-xs)}
.ghost,.btn-ghost{color:#334155;background:#fff;border-color:var(--line);box-shadow:var(--shadow-xs)}
.danger-btn,.btn-danger{color:#b91c1c;background:var(--danger-soft);border-color:#fecdd3}
.success-btn{color:#15803d;background:var(--success-soft);border-color:#bbf7d0}
.warning-btn{color:#b45309;background:var(--warning-soft);border-color:#fed7aa}
.btn:disabled,.primary:disabled,.secondary:disabled,.ghost:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}.w-100{width:100%}
.button-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.button-grid button{min-height:50px}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.tabs{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 16px;margin:0 0 6px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{min-height:44px;white-space:nowrap;padding:10px 15px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#334155;font-weight:800;box-shadow:var(--shadow-xs)}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 14px 26px rgba(15,23,42,.20)}

.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:0 14px calc(14px + env(safe-area-inset-bottom));pointer-events:none;background:linear-gradient(180deg,transparent,rgba(244,247,251,.94) 50%)}
.bottom-nav .nav-inner{pointer-events:auto;width:min(720px,100%);margin:0 auto;display:grid;gap:10px;padding:10px;background:rgba(255,255,255,.94);border:1px solid rgba(226,232,240,.94);border-radius:28px;box-shadow:0 22px 60px rgba(15,23,42,.18);backdrop-filter:blur(14px)}
.nav-item{min-height:62px;border-radius:20px;background:transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:800;transition:.16s ease}
.nav-item b{font-size:20px;line-height:1}.nav-item span{font-size:12px}.nav-item.active{background:linear-gradient(135deg,var(--primary-2),var(--navy-2));color:#fff;box-shadow:0 14px 28px rgba(37,99,235,.25)}

.stat-card,.admin-metric{position:relative;overflow:hidden;border-radius:22px;padding:20px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.stat-card::after,.admin-metric::after{content:"";position:absolute;right:-34px;top:-34px;width:98px;height:98px;border-radius:50%;background:rgba(37,99,235,.08)}
.stat-card span,.admin-metric small{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px}
.stat-card strong,.admin-metric strong{display:block;color:var(--ink);font-size:clamp(26px,4vw,34px);font-weight:900;letter-spacing:-.06em;line-height:1}
.mini,.tiny{font-size:12px;color:var(--muted);font-weight:700;line-height:1.45}.muted{color:var(--muted)}.danger{color:var(--danger)}.success{color:var(--success)}.warning{color:var(--warning)}

.pill,.badge,.chip{display:inline-flex;align-items:center;gap:7px;min-height:32px;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#334155;font-size:12px;font-weight:800;box-shadow:var(--shadow-xs)}
.pill.blue,.badge{color:#1d4ed8;background:#eef4ff;border-color:#dbeafe}.pill.green,.badge.green,.green{color:#15803d}.pill.green,.badge.green{background:#eafaf1;border-color:#bbf7d0}.pill.orange,.badge.orange{color:#b45309;background:#fff7e6;border-color:#fed7aa}.badge.red{color:#b91c1c;background:#fff1f2;border-color:#fecdd3}.chip.active{color:#fff;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-color:transparent;box-shadow:0 12px 24px rgba(37,99,235,.22)}

.entry-row,.task-card,.message-card,.course-line,.lesson-card,.topic-card,.thin-item,.day-card,.student-row,.target-summary,.confirm-panel{border:1px solid var(--line);background:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow-xs)}
.entry-row,.task-card,.message-card{margin-bottom:13px}.topic-card{margin-top:12px;background:#f8fbff}.day-card{background:#f8fbff}
.row-title,.task-top,.course-line-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.row-title strong,.task-title{font-size:16px;font-weight:900;color:var(--ink);margin:0}.task-sub{margin:4px 0 0;color:var(--muted);font-size:13px;font-weight:700}
.task-line{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:9px;padding:13px;border-radius:18px;background:#f8fafc;border:1px solid var(--line)}
.progress-wrap,.bar{height:10px;margin-top:9px;background:#e2e8f0;border-radius:999px;overflow:hidden}.progress-bar,.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--primary-2),var(--cyan),var(--success));border-radius:999px}
.message-title{margin:0 0 7px;font-weight:900;color:var(--ink)}.message-text{line-height:1.62;color:#334155;margin:0 0 12px;white-space:pre-wrap;font-weight:600}.message-card.unread{border-color:#bfdbfe;background:#f8fbff}
.message-preview{white-space:pre-wrap;background:#f8fafc;border:1px solid var(--line);border-radius:20px;padding:16px;line-height:1.62;color:#334155;font-weight:600}
.empty{border:1.5px dashed #bfdbfe;background:#f8fbff;border-radius:22px;padding:26px;text-align:center;color:#64748b;line-height:1.6;font-weight:700}

.student-row{display:flex;gap:14px;align-items:center;cursor:pointer;transition:.16s ease}.student-row:hover{transform:translateY(-1px);box-shadow:0 18px 36px rgba(37,99,235,.12);border-color:#bfdbfe}.student-row h3{margin:0;font-size:16px;font-weight:900;color:var(--ink)}.student-row p{margin:4px 0 0;color:var(--muted);font-size:13px;font-weight:700}
.avatar{width:52px;height:52px;min-width:52px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#eef4ff,#dbeafe);color:#1d4ed8;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}

.wizard-shell{display:grid;gap:16px}.wizard-steps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:8px}.wizard-step{position:relative;background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow-xs)}.wizard-step::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 999px 999px 0;background:linear-gradient(180deg,#2563eb,#06b6d4)}.wizard-step b{display:block;color:var(--ink);font-size:14px;font-weight:900;margin-bottom:5px}.wizard-step span{color:var(--muted);font-size:12px;font-weight:700;line-height:1.45}.target-summary{background:#eef4ff;color:#1d4ed8;font-weight:800}.student-picker-tools{display:grid;grid-template-columns:1fr 220px;gap:12px}

.lesson-designer{display:grid;gap:14px}.lesson-card{padding:18px}.lesson-card>.row:first-child{padding-bottom:12px;border-bottom:1px solid var(--line)}.subtopic-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.subtopic-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid #dbeafe;background:#eef4ff;color:#1d4ed8;font-size:12px;font-weight:800}.subtopic-chip button{width:22px;height:22px;border-radius:999px;background:#fff;color:#b91c1c;font-weight:900;display:grid;place-items:center;box-shadow:var(--shadow-xs)}

.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:22px;background:#fff;box-shadow:var(--shadow-xs)}.table{width:100%;border-collapse:collapse;min-width:650px}.table th,.table td{padding:14px 15px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}.table th{background:#f8fafc;color:#334155;font-weight:900;text-transform:uppercase;letter-spacing:.035em;font-size:12px}.table tr:last-child td{border-bottom:none}.table td{color:#334155;font-weight:600}

.alert{border-radius:18px;padding:14px 15px;margin-top:14px;font-size:14px;line-height:1.5;display:none;font-weight:700}.alert.show{display:block}.alert.ok{background:#eafaf1;color:#15803d;border:1px solid #bbf7d0}.alert.bad{background:#fff1f2;color:#b91c1c;border:1px solid #fecdd3}.alert.info{background:#eef4ff;color:#1d4ed8;border:1px solid #dbeafe}
.loading{position:fixed;inset:0;background:rgba(248,250,252,.76);backdrop-filter:blur(14px);z-index:70;display:none;place-items:center;text-align:center;color:var(--ink);font-weight:900}.loading.show{display:grid}.spinner,.loader{display:inline-block;border-radius:50%;border:4px solid #dbeafe;border-top-color:#2563eb;animation:spin .85s linear infinite}.spinner{width:48px;height:48px;margin:0 auto 12px}.loader{width:19px;height:19px;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;left:50%;bottom:calc(104px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:60;max-width:min(92vw,780px);padding:13px 17px;border-radius:999px;background:#0f172a;color:#fff;font-weight:800;box-shadow:0 24px 60px rgba(15,23,42,.25)}.toast.ok{background:#15803d}.toast.error{background:#b91c1c}.hidden{display:none!important}
.footer{text-align:center;color:#94a3b8;font-size:12px;margin-top:26px;font-weight:700}.health-ok{background:#eafaf1!important;color:#15803d!important;border-color:#bbf7d0!important}.health-bad{background:#fff1f2!important;color:#b91c1c!important;border-color:#fecdd3!important}


/* REAL WIZARD + CLEAN STUDENT PICKER + ADMIN MODAL FIXES */
.wizard-shell.real-wizard{gap:18px}

function firebasePath(path){return String(path||'').replace(/^\/+|\/+$/g,'');}
function initFirebase(){
  if(window.firebase && !firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
}
function cleanForFirebase(value){
  if(Array.isArray(value)) return value.map(cleanForFirebase);
  if(value && typeof value === 'object'){
    const out={};
    Object.entries(value).forEach(([k,v])=>{
      if(v === undefined) return;
      const safeKey=String(k).replace(/[.#$\[\]\/]/g,'_');
      out[safeKey]=cleanForFirebase(v);
    });
    return out;
  }
  return value === undefined ? null : value;
}
async function fetchText(url){const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error(`HTTP ${r.status}`); return await r.text();}
async function getJson(path){
  const p=firebasePath(path);
  if(window.firebase){
    initFirebase();
    const snap=await firebase.database().ref(p).once('value');
    return snap.val();
  }
  const url=`${DB_BASE}/${p}.json`; const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error(`Firebase okuma hatası: HTTP ${r.status}`); const t=await r.text(); if(!t || t==='null') return null; return JSON.parse(t);
}
async function putJson(path,obj){
  const p=firebasePath(path); const data=cleanForFirebase(obj);
  try{
    if(window.firebase){initFirebase(); await firebase.database().ref(p).set(data); return data;}
    const url=`${DB_BASE}/${p}.json`; const r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); if(!r.ok) throw new Error(`HTTP ${r.status}`); return await r.json();
  }catch(e){throw new Error(`Firebase kayıt hatası (${p}): ${e.message}`);}
}
async function patchJson(path,obj){

async function postJson(path,obj){

  const url=`${DB_BASE}/${p}.json`; const r=await fetch(url,{method:'DELETE'}); if(!r.ok) throw new Error(`Firebase silme hatası: HTTP ${r.status}`); return true;
}

function parseCsv(csv){
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<csv.length;i++){
    const c=csv[i];
    if(c==='"') { if(q && csv[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(c===',' && !q){ row.push(cur); cur=''; }
    else if((c==='\n'||c==='\r') && !q){ if(cur || row.length){row.push(cur); rows.push(row.map(cleanSheetValue)); row=[]; cur='';} if(c==='\r' && csv[i+1]==='\n') i++; }
    else cur+=c;
  }
  if(cur || row.length){row.push(cur); rows.push(row.map(cleanSheetValue));}
  return rows.filter(r=>r.some(x=>String(x).trim()));
}
function rowsHaveHeaders(rows, groups){const h=(rows[0]||[]).map(normalizeHeader); return groups.every(g=>g.some(k=>h.includes(normalizeHeader(k))));}
async function loadSheetRows(sheetNames, groups){
  for(const name of sheetNames){
    const urls=[
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&headers=1&sheet=${enc(name)}`,
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${enc(name)}`
    ];
    for(const url of urls){
      try{const rows=parseCsv(await fetchText(url)); if(rows.length>1 && rowsHaveHeaders(rows,groups)) return rows;}catch(e){}
    }
  }
  return [];
}

    subtopics:Array.isArray(t.subtopics)?t.subtopics:(Array.isArray(t.altKonular)?t.altKonular:Object.values(t.altKonular||t.alt||{}).map(String))
  })).filter(t=>t.name);

}

function planToDaysObject(task){
  const days={};
  const names=lessonNames();
  for(let d=0; d<Number(task.days||7); d++){
    const date=addDaysISO(task.start,d);
    const items=[];
    for(const lesson of names){
      const n=Number(task.plan?.[planKey(d,lesson)]||0);
      if(n>0) items.push({ders:lesson,course:lesson,soruSayisi:n,hedefSoru:n,anaKonu:'Genel Tekrar',altKonu:'',aciklama:''});
    }
    if(items.length) days[date]=items;
  }
  return days;
}
function planFromDaysObject(daysObj){
  const plan={};
  if(!daysObj || typeof daysObj!=='object') return plan;
  const dates=Object.keys(daysObj).sort();
  dates.forEach((date,idx)=>{
    const val=daysObj[date];
    const items=Array.isArray(val)?val:(Array.isArray(val?.items)?val.items:(Array.isArray(val?.gorevler)?val.gorevler:Object.values(val||{})));
    items.forEach(item=>{
      const lesson=item.ders||item.course||item.lesson||'';
      const n=Number(item.soruSayisi||item.hedefSoru||item.soru||item.total||0);
      if(lesson && n) plan[planKey(idx,lesson)]=String(n);
    });
  });
  return plan;
}
function normalizeTask(key,o){
  if(!o || typeof o!=='object') return null;
  const start=isoFromAny(o.start||o.startDate||o.baslangicTarihi||o.baslangic);
  const duration=Number(o.sureGun||o.durationDays||(typeof o.days==='number'?o.days:0)||7);
  const end=isoFromAny(o.end||o.endDate||o.bitisTarihi) || addDaysISO(start,duration-1);
  const targetType=targetTypeFromLabel(o.targetType||o.hedefTuru||o.hedefTipi);
  const studentNos=Array.isArray(o.studentNos)?o.studentNos.map(cleanId):(Array.isArray(o.ogrenciler)?o.ogrenciler.map(cleanId):(targetType==='student'&&o.targetValue?[cleanId(o.targetValue)]:[]));
  return {
    key,start,days:duration,end,targetType,
    className:o.className||o.sinif||(['class','sinif'].includes(targetType)?(o.targetValue||''):''),
    targetValue:o.targetValue||o.hedefDegeri||'',
    studentNos,plan:o.plan||planFromDaysObject(o.days||o.gunler||{}),
    daysObject:(typeof o.days==='object'?o.days:(o.gunler||{})),
    teacherId:cleanId(o.teacherId||o.ogretmenID||''),
    teacherName:o.teacherName||o.ogretmenAdi||getTeacherName(o.teacherId||o.ogretmenID),
    createdAt:o.createdAt||o.olusturmaZamani||'',updatedAt:o.updatedAt||'',status:o.status||'aktif'
  };
}
function targetTypeFromLabel(v){
  const s=String(v||'').toLocaleLowerCase('tr-TR');
  if(s.includes('tüm')||s==='all'||s==='genel') return 'all';
  if(s.includes('öğr')||s.includes('student')) return 'student';
  return 'class';
}
function targetLabel(task){
  if(task.targetType==='all') return 'Tüm öğrenciler';
  if(task.targetType==='student'||task.targetType==='students'){
    const nos=task.studentNos?.length?task.studentNos:(task.targetValue?[task.targetValue]:[]);
    if(nos.length===1){const st=state.students.find(s=>s.no===cleanId(nos[0])); return st?`${st.name}`:`Öğrenci ${nos[0]}`;}
    return `${nos.length} öğrenci`;
  }
  return `${task.className||task.targetValue||'-'} sınıfı`;
}
function studentsForTask(task, students=state.students){
  const type=task.targetType;
  if(type==='all') return students.map(s=>s.no);
  if(type==='class') return students.filter(s=>s.className===(task.className||task.targetValue)).map(s=>s.no);
  const nos=task.studentNos?.length?task.studentNos:(task.targetValue?[task.targetValue]:[]);
  return nos.map(cleanId).filter(Boolean);
}
function taskQuestionTotal(task){return Object.values(task.plan||{}).reduce((s,v)=>s+(Number(v)||0),0);}
function planKey(dayIndex, lesson){return `d${dayIndex}_${String(lesson||'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[.#$\[\]\/\s]+/g,'_').replace(/[^A-Za-z0-9_ğüşöçıİĞÜŞÖÇ-]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')}`;}
function defaultPlan(days){const m={}; for(let d=0; d<days; d++) for(const l of lessonNames()) m[planKey(d,l)]=''; return m;}
function resizePlan(old,days){const m=defaultPlan(days); for(const [k,v] of Object.entries(old||{})) if(k in m) m[k]=v; return m;}
function applyTemplate(plan,days,type){const names=lessonNames(); const base={hafif:[20,15,15,10,10,10],dengeli:[30,30,25,15,15,15],yogun:[40,40,30,20,20,20]}[type] || [30,30,25,15,15,15]; const m={...plan}; for(let d=0; d<days; d++){ if(d%7<5) names.forEach((l,i)=>m[planKey(d,l)]=String(base[i]??10)); } return m;}
function clearWeekends(plan,days){const m={...plan}; for(let d=0; d<days; d++) if(d%7>=5) for(const l of lessonNames()) m[planKey(d,l)]=''; return m;}
function copyFirstWeek(plan,days){const m={...plan}; for(let d=7; d<days; d++) for(const l of lessonNames()) m[planKey(d,l)]=plan[planKey(d%7,l)]||''; return m;}

function findConflicts(task, ignoreKey=''){
  const targetSet=new Set(studentsForTask(task));
  const conflicts=[];
  for(const old of state.tasks){
    if(old.key===ignoreKey || old.status==='silindi') continue;
    if(!rangesOverlap(task.start,task.end,old.start,old.end)) continue;
    const oldSet=new Set(studentsForTask(old));
    const both=[...targetSet].filter(no=>oldSet.has(no));
    if(both.length){conflicts.push({task:old, students:both});}
  }
  return conflicts;
}
async function saveTaskFromWizard(){
  const task=buildTaskFromWizard();
  if(task.targetType==='class' && !task.className) throw new Error('Sınıf seçilmedi.');
  if(task.targetType==='students' && !task.studentNos.length) throw new Error('En az bir öğrenci seçin.');
  const targetCount=studentsForTask(task).length; if(!targetCount) throw new Error('Bu hedefte öğrenci bulunamadı.');
  if(!taskQuestionTotal(task)) throw new Error('Programda en az bir ders için soru hedefi yazmalısınız.');
  const conflicts=findConflicts(task,state.editingTaskKey||'');
  if(conflicts.length){
    const names=conflicts[0].students.slice(0,5).map(no=>state.students.find(s=>s.no===no)?.name||no).join(', ');
    throw new Error(`Bu tarihlerde bu öğrencinin/program hedefinin görevi vardır: ${names}${conflicts[0].students.length>5?'...':''}. Çakışan görev: ${targetLabel(conflicts[0].task)} (${fmtDate(conflicts[0].task.start)}-${fmtDate(conflicts[0].task.end)}), veren: ${getTeacherName(conflicts[0].task.teacherId)}.`);
  }
  const now=nowText();
  const common={...task,createdAt:state.editingTaskKey?(state.tasks.find(t=>t.key===state.editingTaskKey)?.createdAt||now):now,updatedAt:now,sureGun:task.days,durationDays:task.days,startDate:task.start,endDate:task.end,baslangicTarihi:fmtDate(task.start),bitisTarihi:fmtDate(task.end)};
  common.days=planToDaysObject(task);
  const payloads=[];
  if(task.targetType==='students' && !state.editingTaskKey){
    task.studentNos.forEach(no=>{
      const st=state.students.find(s=>s.no===no);
      payloads.push({...common,targetType:'student',hedefTuru:'student',targetValue:no,hedefDegeri:no,studentNos:[no],className:st?.className||'',sinif:st?.className||''});
    });
  }else{
    const targetType=task.targetType==='students'?'student':task.targetType;
    const targetValue=targetType==='class'?task.className:(targetType==='student'?(task.studentNos[0]||task.targetValue||''):'all');
    payloads.push({...common,targetType,hedefTuru:targetType,targetValue,hedefDegeri:targetValue,studentNos:targetType==='student'?[targetValue]:task.studentNos,sinif:task.className||''});
  }
  const savedKeys=[];
  if(state.editingTaskKey){
    await putJson(`verianalizi001/haftalikGorevler/${state.editingTaskKey}`,payloads[0]);
    savedKeys.push(state.editingTaskKey);
  }else{
    for(const payload of payloads){
      const r=await postJson('verianalizi001/haftalikGorevler',payload);
      savedKeys.push(r.name);
    }
  }
  for(const key of savedKeys){
    const verify=await getJson(`verianalizi001/haftalikGorevler/${key}`);
    if(!verify) throw new Error('Firebase doğrulaması başarısız: kayıt görünmüyor. Realtime Database kurallarını kontrol edin.');
  }
  await logAction(state.editingTaskKey?'Görev güncelleme':'Görev kaydı',`${targetLabel(task)} için ${fmtDate(task.start)}-${fmtDate(task.end)} programı kaydedildi. Firebase key: ${savedKeys.join(', ')}`);
  state.editingTaskKey=null; await loadTasks(); setToast(`Görev Firebase'e kaydedildi: ${savedKeys.length} kayıt`,'ok'); resetWizardAfterSave(); render();
}

async function loadStats(studentNo,start,end){
  const cacheKey=`${studentNo}|${start}|${end}`;
  if(state.statsCache?.[cacheKey]) return structuredClone(state.statsCache[cacheKey]);
  try{
    const root=await getJson(`verianalizi001/calismaKayitlari/${studentNo}`)||{};
    let total=0,correct=0,wrong=0,empty=0,entryCount=0; const active=new Set();
    const subjects={}, topics={}, subtopics={};
    for(const rec of Object.values(root)){
      if(!rec||typeof rec!=='object') continue;
      const date=rec.dateKey||rec.tarih||rec.date||rec.tarihSaat||rec.createdAt||'';
      if(!dateInRange(date,start,end)) continue;
      const lesson=rec.ders||rec.lesson||rec.course||'Genel';
      const topic=rec.anaKonu||rec.konu||rec.topic||rec.mainTopic||'Genel';
      const subtopic=rec.altKonu||rec.alt||rec.subtopic||rec.subTopic||'Genel';
      const t=Number(rec.toplam??rec.toplamSoru??rec.total??rec.soruSayisi??0);
      const w=Number(rec.yanlis??rec.wrong??0);
      const e=Number(rec.bos??rec.empty??0);
      const c=Number(rec.dogru??rec.correct??Math.max(0,t-w-e));
      total+=t; correct+=c; wrong+=w; empty+=e; entryCount++;
      const iso=isoFromAny(date); if(iso) active.add(iso);
      if(!subjects[lesson]) subjects[lesson]={lesson,total:0,correct:0,wrong:0,empty:0,entryCount:0};
      subjects[lesson].total+=t; subjects[lesson].correct+=c; subjects[lesson].wrong+=w; subjects[lesson].empty+=e; subjects[lesson].entryCount++;
      const tk=`${lesson}|||${topic}`;
      if(!topics[tk]) topics[tk]={lesson,topic,total:0,correct:0,wrong:0,empty:0,entryCount:0};
      topics[tk].total+=t; topics[tk].correct+=c; topics[tk].wrong+=w; topics[tk].empty+=e; topics[tk].entryCount++;
      const sk=`${lesson}|||${topic}|||${subtopic}`;
      if(!subtopics[sk]) subtopics[sk]={lesson,topic,subtopic,total:0,correct:0,wrong:0,empty:0,entryCount:0};
      subtopics[sk].total+=t; subtopics[sk].correct+=c; subtopics[sk].wrong+=w; subtopics[sk].empty+=e; subtopics[sk].entryCount++;
    }
    const result={
      total,correct,wrong,empty,entryCount,activeDays:active.size,
      subjects:Object.values(subjects).sort((a,b)=>b.total-a.total),
      topics:Object.values(topics).sort((a,b)=>b.total-a.total),
      subtopics:Object.values(subtopics).sort((a,b)=>b.total-a.total)
    };
    state.statsCache=state.statsCache||{}; state.statsCache[cacheKey]=structuredClone(result);
    return result;
  }catch(e){return {total:0,correct:0,wrong:0,empty:0,entryCount:0,activeDays:0,subjects:[],topics:[],subtopics:[]};}
}
async function countEntries(start,end){try{const root=await getJson('verianalizi001/calismaKayitlari')||{}; let c=0; for(const obj of Object.values(root)){for(const rec of Object.values(obj||{})){const d=rec?.tarih||rec?.date||rec?.tarihSaat||''; if(dateInRange(d,start,end)) c++;}} return c;}catch(e){return 0;}}
async function loadFollowAlerts(start,end,mode='hafta'){
  if(!state.followClasses.length) return {configured:false,items:[]};
  const tracked=state.students.filter(s=>state.followClasses.includes(s.className)).slice(0,220);
  const items=[];
  const chunkSize=24;
  for(let i=0;i<tracked.length;i+=chunkSize){
    const chunk=tracked.slice(i,i+chunkSize);
    const results=await Promise.all(chunk.map(async st=>({st,stats:await loadStats(st.no,start,end)})));
    for(const {st,stats:s} of results){
      if(s.entryCount===0) items.push({student:st,reason:mode==='gün'?'Bugün çalışma girişi yok':'Bu hafta veri girişi yok',level:'high'});
      else if(mode==='hafta' && s.total<50) items.push({student:st,reason:`Haftalık toplam düşük: ${s.total} soru`,level:'mid'});
      else if(mode==='gün' && s.total<20) items.push({student:st,reason:`Bugünkü çalışma düşük: ${s.total} soru`,level:'mid'});
    }
  }
  return {configured:true,items};
}
async function loadAlerts(){

}

function rangeSelectorHtml(){const r=state.range||weekRange(); return `<div class="chipbar" style="margin-bottom:10px"><button class="chip" data-range="today">Bugün</button><button class="chip" data-range="week">Bu hafta</button><button class="chip" data-range="month">Bu ay</button><button class="chip" data-range="last30">Son 30</button></div><div class="compact-grid"><div class="field"><label>Başlangıç</label><input id="rangeStart" type="date" class="input" value="${r.start}"></div><div class="field"><label>Bitiş</label><input id="rangeEnd" type="date" class="input" value="${r.end}"></div></div><button id="applyRange" class="secondary" style="margin-top:10px">Uygula</button><p class="muted tiny">Görünen tarih: ${fmtDate(r.start)} - ${fmtDate(r.end)}</p>`;}
function bindRangeSelector(){document.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>{const type=b.dataset.range; state.range=type==='today'?{title:'Bugün',start:todayISO(),end:todayISO()}:type==='week'?weekRange():type==='month'?monthRange():last30Range(); render();}); document.getElementById('applyRange')?.addEventListener('click',()=>{state.range={title:'Özel',start:document.getElementById('rangeStart').value,end:document.getElementById('rangeEnd').value}; render();});}
function subjectBarsHtml(stats){if(!stats.subjects.length) return '<div class="empty">Bu aralıkta çalışma girişi yok.</div>'; return stats.subjects.map(s=>{const ratio=s.total?Math.round((s.correct/s.total)*100):0; return `<div style="margin:10px 0"><div class="row"><b>${esc(s.lesson)}</b><span class="spacer"></span><span class="muted tiny">${s.total} soru</span></div><div class="bar"><span style="width:${Math.min(100,ratio)}%"></span></div><p class="muted tiny">Doğru ${s.correct} • Yanlış ${s.wrong} • Boş ${s.empty}</p></div>`;}).join('');}

function accuracyPct(obj){const total=Number(obj?.total||0); return total?Math.round((Number(obj.correct||0)/total)*100):0;}
function itemAccuracy(x){return x.total?Math.round((x.correct/x.total)*100):0;}
function weakAreas(stats){
  const arr=[...(stats.topics||[]),...(stats.subjects||[])].filter(x=>Number(x.total||0)>0).map(x=>({
    ...x,
    label:x.topic?`${x.lesson} / ${x.topic}`:x.lesson,
    pct:itemAccuracy(x),
    lowData:Number(x.total||0)<20
  }));
  return arr.sort((a,b)=>(a.pct-b.pct)||((a.total||0)-(b.total||0)));
}
function strongAreas(stats){return [...(stats.topics||[]),...(stats.subjects||[])].filter(x=>Number(x.total||0)>0).map(x=>({...x,label:x.topic?`${x.lesson} / ${x.topic}`:x.lesson,pct:itemAccuracy(x)})).sort((a,b)=>(b.pct-a.pct)||((b.total||0)-(a.total||0)));}
function weakAreasHtml(stats){const list=weakAreas(stats).slice(0,6); if(!list.length) return '<div class="empty">Analiz için yeterli veri yok.</div>'; return `<div class="risk-list">${list.map(x=>`<div class="risk-card ${x.pct<60?'low':'warn'}"><b>${esc(x.label)} • %${x.pct}</b><p>${x.total} soru üzerinden hesaplandı. ${x.lowData?'Veri düşük; daha net analiz için bu konudan daha fazla çalışma girişi gerekli.':'Yanlış/boş oranı takip edilmeli.'}</p></div>`).join('')}</div>`;}
function strongAreasHtml(stats){const list=strongAreas(stats).slice(0,6); if(!list.length) return '<div class="empty">Güçlü alan göstermek için çalışma verisi yok.</div>'; return `<div class="risk-list">${list.map(x=>`<div class="risk-card good"><b>${esc(x.label)} • %${x.pct}</b><p>${x.total} soru içinde ${x.correct} doğru. Bu alan korunmalı ve düzenli tekrar edilmeli.</p></div>`).join('')}</div>`;}
function selectedAnalysisData(stats){
  const lesson=state.analysisLesson||'Tümü';
  const topic=state.analysisTopic||'Tümü';
  let rows=[];
  if(lesson==='Tümü' && topic==='Tümü') rows=stats.subjects||[];
  else if(lesson==='Tümü') rows=(stats.topics||[]).filter(x=>x.topic===topic);
  else if(topic==='Tümü') rows=(stats.topics||[]).filter(x=>x.lesson===lesson);
  else rows=(stats.subtopics||[]).filter(x=>x.lesson===lesson && x.topic===topic);
  const total=rows.reduce((a,x)=>a+Number(x.total||0),0);
  const correct=rows.reduce((a,x)=>a+Number(x.correct||0),0);
  const wrong=rows.reduce((a,x)=>a+Number(x.wrong||0),0);
  const empty=rows.reduce((a,x)=>a+Number(x.empty||0),0);
  return {rows,total,correct,wrong,empty,pct:total?Math.round(correct/total*100):0};
}
function pieGradient(data){
  const total=Math.max(1,Number(data.total||0));
  const c=Math.round((Number(data.correct||0)/total)*1000)/10;
  const w=Math.round((Number(data.wrong||0)/total)*1000)/10;
  const e=Math.max(0,Math.round((100-c-w)*10)/10);
  return `conic-gradient(#16a34a 0 ${c}%, #dc2626 ${c}% ${c+w}%, #d97706 ${c+w}% ${c+w+e}%, #e2e8f0 ${c+w+e}% 100%)`;
}

      <div class="parent-report-card" id="strongReportCard"><h3>Veli Bilgilendirme Kartı: Güçlü Alanlar</h3><div class="big-label">${strong.length?`%${strong[0].pct}`:'Veri yok'}</div><div class="report-meta">${esc(st.name)} • ${fmtDate(range.start)} - ${fmtDate(range.end)}</div><ul>${strong.length?strong.map(x=>`<li>${esc(x.label)}: %${x.pct} başarı, ${x.total} soru</li>`).join(''):'<li>Güçlü alan analizi için veri bulunmuyor.</li>'}</ul><div class="capture-actions"><button class="secondary" data-capture="strongReportCard">PNG İndir</button><button class="ghost" data-copy-report="strong">Metni Kopyala</button></div></div>
    </div>
    <div class="grid two"><div class="card"><h3>Öncelikli Eksik Konular</h3>${weakAreasHtml(stats)}</div><div class="card"><h3>İyi Olduğu Konular</h3>${strongAreasHtml(stats)}</div></div>
  </div>`;
}
function analysisRowsHtml(rows){if(!rows.length) return '<div class="empty">Bu seçim için veri yok.</div>'; return rows.map(x=>{const pct=itemAccuracy(x); const label=x.subtopic?`${x.topic} / ${x.subtopic}`:(x.topic||x.lesson); return `<div class="success-row"><div><b>${esc(label)}</b><div class="bar"><span style="width:${Math.min(100,pct)}%"></span></div><p class="muted tiny">${x.total} soru • Doğru ${x.correct} • Yanlış ${x.wrong} • Boş ${x.empty}</p></div><div class="success-pct">%${pct}</div></div>`;}).join('');}

async function captureElementAsPng(id,filename){
  const el=document.getElementById(id); if(!el){setToast('Kart bulunamadı','error');return;}
  try{

  }catch(e){setToast('PNG oluşturulamadı: '+e.message,'error');}
}
function downloadCanvas(canvas,filename){const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download=filename; document.body.appendChild(a); a.click(); a.remove();}
function fallbackTextCanvas(el,filename){const canvas=document.createElement('canvas'); canvas.width=1100; canvas.height=700; const ctx=canvas.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#0f172a'; ctx.font='bold 34px Inter, Arial'; const lines=el.innerText.split('\n').filter(Boolean); let y=60; lines.forEach((line,i)=>{ctx.font=i===0?'bold 34px Arial':'24px Arial'; ctx.fillText(line.slice(0,70),60,y); y+=i===0?48:34;}); downloadCanvas(canvas,filename);}

function bindPreview(st,stats,range){const draw=(sel='WhatsApp')=>{const note=document.getElementById('teacherNote')?.value||''; const msg=sel==='SMS'?buildSmsMessage(st,stats,range):sel==='E-posta'?buildEmailMessage(st,stats,range,note):buildWhatsAppMessage(st,stats,range,note); document.getElementById('previewBox').innerHTML=`<div class="tabs"><button class="tab ${sel==='WhatsApp'?'active':''}" data-prev="WhatsApp">WhatsApp</button><button class="tab ${sel==='E-posta'?'active':''}" data-prev="E-posta">E-posta</button><button class="tab ${sel==='SMS'?'active':''}" data-prev="SMS">SMS</button></div><div class="message-preview" style="margin-top:10px">${esc(msg)}</div>${sel==='SMS'?`<p class="muted tiny">SMS karakter sayısı: ${msg.length}</p>`:''}`; document.querySelectorAll('[data-prev]').forEach(b=>b.onclick=()=>draw(b.dataset.prev));}; draw(); document.getElementById('teacherNote').oninput=()=>draw(document.querySelector('.tab.active')?.dataset.prev||'WhatsApp'); document.querySelectorAll('[data-send-channel]').forEach(b=>b.onclick=async()=>{const ch=b.dataset.sendChannel; const note=document.getElementById('teacherNote').value; const message=ch==='SMS'?buildSmsMessage(st,stats,range):ch==='E-posta'?buildEmailMessage(st,stats,range,note):buildWhatsAppMessage(st,stats,range,note); try{if(ch==='WhatsApp'){const phone=normalizePhoneTR(st.parentPhone); if(!phone) throw new Error('Veli telefonu yok.'); window.open(`https://wa.me/${phone}?text=${enc(message)}`,'_blank');} else if(ch==='SMS'){const phone=normalizePhoneTR(st.parentPhone); if(!phone) throw new Error('Veli telefonu yok.'); window.location.href=`sms:+${phone}?&body=${enc(message)}`;} else if(ch==='E-posta'){if(!st.parentMail) throw new Error('Veli e-posta adresi yok.'); window.location.href=`mailto:${enc(st.parentMail)}?subject=${enc(state.settings.kurumAdi+' - Öğrenci Bilgilendirme')}&body=${enc(message)}`;} else {await copyText(message); setToast('Metin kopyalandı','ok');} state.draftConfirm={student:st,channel:ch,message}; renderConfirmBox();}catch(e){setToast(e.message,'error');}});}

  const w=state.taskWizard||{targetType:'class',className:classes[0]||'',studentNos:[],start:todayISO(),days:7,plan:defaultPlan(7)};
  w.className=w.className||classes[0]||''; w.plan=resizePlan(w.plan,w.days); state.taskWizard=w;
  const step=Math.max(1,Math.min(4,Number(state.taskWizardStep||1)));
  const progress=`<div class="wizard-progress">${wizardStepMeta().map(([n,t,sub])=>`<button type="button" class="wizard-node ${step===Number(n)?'active':''} ${step>Number(n)?'done':''}" data-wizard-jump="${n}"><span class="num">${step>Number(n)?'✓':n}</span><b>${t}</b><span>${sub}</span></button>`).join('')}</div>`;
  return `<div class="wizard-shell real-wizard">${progress}<div class="wizard-panel">${wizardStepContent(step,w,classes)}</div></div>`;
}
function wizardStepContent(step,w,classes){
  if(step===1) return `<h3>Hedef Seçimi</h3><p class="wizard-help">Görevin tüm öğrencilere, tek bir sınıfa veya seçtiğiniz öğrencilere atanacağını belirleyin.</p><div class="chipbar"><label class="chip ${w.targetType==='all'?'active':''}"><input type="radio" name="targetMode" value="all" ${w.targetType==='all'?'checked':''} hidden> Tüm Öğrenciler</label><label class="chip ${w.targetType==='class'?'active':''}"><input type="radio" name="targetMode" value="class" ${w.targetType==='class'?'checked':''} hidden> Sınıf</label><label class="chip ${w.targetType==='students'?'active':''}"><input type="radio" name="targetMode" value="students" ${w.targetType==='students'?'checked':''} hidden> Öğrenci Seç</label></div><div id="targetFields" style="margin-top:14px">${targetFieldsHtml(w,classes)}</div>${wizardActions(step)}`;
  if(step===2) return `<h3>Tarih ve Süre</h3><p class="wizard-help">Başlangıç gününü ve program süresini seçin. Sistem bitiş tarihini otomatik hesaplar.</p><div class="compact-grid"><div class="field"><label>Başlangıç</label><input id="taskStart" class="input" type="date" value="${w.start}"></div><div class="field"><label>Süre</label><select id="taskDays">${[1,3,5,7,14,21,28,30,60].map(d=>`<option value="${d}" ${w.days===d?'selected':''}>${d} gün</option>`).join('')}</select></div></div><div class="target-summary" id="wizardTargetSummary" style="margin-top:12px">${targetLabel({...w,end:addDaysISO(w.start,w.days-1)})} • ${studentsForTask({...w,end:addDaysISO(w.start,w.days-1)}).length} öğrenci • ${fmtDate(w.start)} - ${fmtDate(addDaysISO(w.start,w.days-1))}</div>${wizardActions(step)}`;
  if(step===3) return `<h3>Hızlı Program</h3><p class="wizard-help">Hazır şablonlardan biriyle başlayın veya gün gün ders hedeflerini elle yazın.</p><div class="template-grid"><button class="template-card" data-template="hafif"><strong>Hafif</strong><span>Kısa tekrar ağırlıklı düşük hedef</span></button><button class="template-card primary-template" data-template="dengeli"><strong>Dengeli</strong><span>Derslere dengeli dağıtılmış hedef</span></button><button class="template-card" data-template="yogun"><strong>Yoğun</strong><span>Yüksek soru hedefli program</span></button><button class="template-card" data-template="copyWeek"><strong>1. Haftayı Kopyala</strong><span>Uzun programlarda tekrar kullan</span></button><button class="template-card" data-template="weekendOff"><strong>Hafta Sonu Boş</strong><span>Cumartesi ve pazar hedeflerini temizle</span></button><button class="template-card" data-template="clear"><strong>Temizle</strong><span>Tüm soru sayılarını sıfırla</span></button></div><div class="plan-summary-row"><span><b id="planTotalBadge">0</b> toplam soru</span><span class="muted tiny">Günlük toplamlar her günün sağ üstünde gösterilir.</span></div><div id="planArea" class="grid" style="margin-top:12px">${planHtml(w)}</div>${wizardActions(step)}`;
  return `<h3>Önizleme ve Kayıt</h3><p class="wizard-help">Kaydetmeden önce hedef, tarih ve toplam soru bilgisini kontrol edin. Sistem çakışan tarih aralığını engeller.</p><div id="taskPreview" class="task-preview-box"></div><div id="firebaseStatus" class="target-summary" style="margin-top:12px">Firebase kaydı hazır.</div>${wizardActions(step,true)}`;
}
function wizardActions(step,isFinal=false){
  return `<div class="wizard-actions"><div>${step>1?'<button type="button" class="ghost" data-wizard-prev>← Geri</button>':''}</div><div class="right">${step<4?'<button type="button" class="primary" data-wizard-next>İleri →</button>':`<button id="saveTask" class="primary">${state.editingTaskKey?'Görevi Güncelle':'Görevi Kaydet'}</button>${state.editingTaskKey?'<button id="cancelEdit" class="ghost">Düzenlemeyi İptal Et</button>':''}`}<span id="taskStatus" class="muted tiny"></span></div></div>`;
}
function targetFieldsHtml(w,classes){
  if(w.targetType==='all') return '<div class="target-summary">Tüm aktif öğrenciler seçildi. Görev bütün öğrenci panelinde görünür.</div>';
  if(w.targetType==='class') return `<div class="field"><label>Sınıf seç</label><select id="taskClass">${classes.map(c=>`<option ${c===w.className?'selected':''}>${esc(c)}</option>`).join('')}</select></div><p class="muted tiny" id="classCount"></p>`;
  const allClasses=['Tümü',...classes];
  const selectedCount=(w.studentNos||[]).length;
  return `<div class="student-picker-tools"><div class="field"><label>Öğrenci ara</label><input id="taskStudentSearch" class="input" placeholder="Ad / no / sınıf"></div><div class="field"><label>Sınıf süz</label><select id="studentClassFilter">${allClasses.map(c=>`<option>${esc(c)}</option>`).join('')}</select></div></div><div id="selectedCount" class="selected-count">Seçili öğrenci: ${selectedCount}</div><div id="studentPickList" class="student-pick-list">${studentPickListHtml(state.students,w.studentNos||[])}</div>`;
}
function studentPickListHtml(list,selected=[]){
  const set=new Set((selected||[]).map(cleanId));
  return list.map(s=>{const checked=set.has(cleanId(s.no)); return `<label class="student-option ${checked?'selected':''}"><input class="student-check" type="checkbox" value="${esc(s.no)}" ${checked?'checked':''}><span class="checkmark">✓</span><span class="student-meta"><b>${esc(s.name)}</b><span>${esc(s.className||'-')}</span></span><span class="student-badge">No ${esc(s.no)}</span></label>`;}).join('')||'<div class="empty">Öğrenci bulunamadı.</div>';
}
function planHtml(w){const names=lessonNames(); let out=''; const weeks=Math.ceil(w.days/7); for(let week=0; week<weeks; week++){const start=week*7,end=Math.min(start+6,w.days-1); out+=`<div class="card" style="box-shadow:none;background:#fff"><h3>${week+1}. Hafta</h3><div class="grid">`; for(let d=start; d<=end; d++){const date=addDaysISO(w.start,d); const total=names.reduce((s,l)=>s+(Number(w.plan[planKey(d,l)])||0),0); out+=`<div class="day-card"><h4><span>${Days[d%7]} • ${fmtDate(date)}</span><span class="day-total-pill"><b>${total}</b> soru</span></h4><div class="lesson-grid">${names.map(l=>`<div class="field"><label>${esc(l)}</label><input class="input" inputmode="numeric" data-plan-key="${esc(planKey(d,l))}" value="${esc(w.plan[planKey(d,l)]||'')}"></div>`).join('')}</div></div>`;} out+=`</div></div>`;} return out;}
function teacherTasksHtml(){const own=state.tasks.filter(t=>state.teacher.isAdmin || cleanId(t.teacherId)===cleanId(state.teacher.id)); if(!own.length) return '<div class="empty">Henüz kayıtlı görevlendirme yok.</div>'; return own.slice(0,40).map(t=>`<div class="thin-item"><div class="row"><b>${esc(targetLabel(t))}</b><span class="badge">${fmtDate(t.start)}-${fmtDate(t.end)}</span><span class="spacer"></span><span class="muted tiny">${taskQuestionTotal(t)} soru</span></div><div class="muted tiny">Veren: ${esc(getTeacherName(t.teacherId))}</div><div class="actions"><button class="secondary" data-edit-task="${esc(t.key)}">Düzenle</button><button class="danger-btn" data-del-task="${esc(t.key)}">Sil</button></div></div>`).join('');}
function syncTaskWizardFromDom(){
  if(!state.taskWizard) return;
  const w=state.taskWizard;
  const mode=document.querySelector('input[name="targetMode"]:checked')?.value; if(mode) w.targetType=mode;
  const cls=document.getElementById('taskClass')?.value; if(cls!==undefined && cls!==null && cls!=='') w.className=cls;
  const start=document.getElementById('taskStart')?.value; if(start) w.start=start;
  const days=document.getElementById('taskDays')?.value; if(days){w.days=Number(days); w.plan=resizePlan(w.plan,w.days);}
  const checked=[...document.querySelectorAll('.student-check:checked')].map(x=>cleanId(x.value));
  if(checked.length || document.getElementById('studentPickList')) w.studentNos=[...new Set([...(w.studentNos||[]),...checked])].filter(Boolean);
  document.querySelectorAll('[data-plan-key]').forEach(inp=>{const v=String(inp.value||'').replace(/\D/g,'').slice(0,4); if(v && v!=='0') w.plan[inp.dataset.planKey]=v; else delete w.plan[inp.dataset.planKey];});
}
function bindTaskWizard(){
  document.querySelectorAll('[data-wizard-jump]').forEach(b=>b.onclick=()=>{syncTaskWizardFromDom(); state.taskWizardStep=Number(b.dataset.wizardJump); renderTasks(document.getElementById('mainArea'));});
  document.querySelector('[data-wizard-next]')?.addEventListener('click',()=>{syncTaskWizardFromDom(); state.taskWizardStep=Math.min(4,(state.taskWizardStep||1)+1); renderTasks(document.getElementById('mainArea'));});
  document.querySelector('[data-wizard-prev]')?.addEventListener('click',()=>{syncTaskWizardFromDom(); state.taskWizardStep=Math.max(1,(state.taskWizardStep||1)-1); renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('input[name="targetMode"]').forEach(r=>r.onchange=()=>{state.taskWizard.targetType=r.value; state.taskWizard.studentNos=state.taskWizard.studentNos||[]; renderTasks(document.getElementById('mainArea'));});
  document.getElementById('taskClass')?.addEventListener('change',e=>{state.taskWizard.className=e.target.value; updatePreviewLive();});
  document.getElementById('taskStart')?.addEventListener('change',e=>{state.taskWizard.start=e.target.value; updatePreviewLive();});
  document.getElementById('taskDays')?.addEventListener('change',e=>{state.taskWizard.days=Number(e.target.value); state.taskWizard.plan=resizePlan(state.taskWizard.plan,state.taskWizard.days); renderTasks(document.getElementById('mainArea'));});
  const drawStudentPick=()=>{const q=(document.getElementById('taskStudentSearch')?.value||'').toLocaleLowerCase('tr-TR'); const cls=document.getElementById('studentClassFilter')?.value||'Tümü'; const selected=[...document.querySelectorAll('.student-check:checked')].map(x=>cleanId(x.value)); state.taskWizard.studentNos=[...new Set([...(state.taskWizard.studentNos||[]),...selected])].filter(Boolean); const filtered=state.students.filter(s=>(cls==='Tümü'||s.className===cls)&&`${s.no} ${s.name} ${s.className}`.toLocaleLowerCase('tr-TR').includes(q)); const box=document.getElementById('studentPickList'); if(box){box.innerHTML=studentPickListHtml(filtered,state.taskWizard.studentNos); bindStudentChecks();} updateSelectedCount();};
  document.getElementById('taskStudentSearch')?.addEventListener('input',drawStudentPick);
  document.getElementById('studentClassFilter')?.addEventListener('change',drawStudentPick);
  bindStudentChecks();
  document.querySelectorAll('[data-template]').forEach(b=>b.onclick=()=>{syncTaskWizardFromDom(); const t=b.dataset.template; if(t==='clear') state.taskWizard.plan=defaultPlan(state.taskWizard.days); else if(t==='copyWeek') state.taskWizard.plan=copyFirstWeek(state.taskWizard.plan,state.taskWizard.days); else if(t==='weekendOff') state.taskWizard.plan=clearWeekends(state.taskWizard.plan,state.taskWizard.days); else state.taskWizard.plan=applyTemplate(state.taskWizard.plan,state.taskWizard.days,t); renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-plan-key]').forEach(inp=>inp.oninput=()=>{state.taskWizard.plan[inp.dataset.planKey]=inp.value.replace(/\D/g,'').slice(0,4); inp.value=state.taskWizard.plan[inp.dataset.planKey]; updatePreviewLive();});
  document.getElementById('saveTask')?.addEventListener('click',async()=>{try{syncTaskWizardFromDom(); document.getElementById('taskStatus').textContent='Kaydediliyor...'; await saveTaskFromWizard();}catch(e){const el=document.getElementById('taskStatus'); if(el) el.textContent=''; setToast(e.message,'error');}});
  document.getElementById('cancelEdit')?.addEventListener('click',()=>resetWizardAfterSave());
  updatePreviewLive(); updateSelectedCount();
}
function updateSelectedCount(){const el=document.getElementById('selectedCount'); if(el) el.textContent=`Seçili öğrenci: ${(state.taskWizard?.studentNos||[]).length}`;}
function bindStudentChecks(){document.querySelectorAll('.student-check').forEach(ch=>ch.onchange=()=>{const set=new Set((state.taskWizard.studentNos||[]).map(cleanId)); if(ch.checked) set.add(cleanId(ch.value)); else set.delete(cleanId(ch.value)); state.taskWizard.studentNos=[...set]; ch.closest('.student-option')?.classList.toggle('selected',ch.checked); updateSelectedCount(); updatePreviewLive();});}
function updatePreviewLive(){
  const w=state.taskWizard; if(!w) return;
  const task={...w,end:addDaysISO(w.start,w.days-1)};
  const count=studentsForTask(task).length;
  const total=Object.values(w.plan||{}).reduce((s,v)=>s+(Number(v)||0),0);
  const classCount=document.getElementById('classCount'); if(classCount) classCount.textContent=`${w.className||'-'} sınıfı ${count} öğrenciyi kapsıyor.`;
  const summary=document.getElementById('wizardTargetSummary'); if(summary) summary.textContent=`${targetLabel(task)} • ${count} öğrenci • ${fmtDate(w.start)} - ${fmtDate(addDaysISO(w.start,w.days-1))}`;
  const planTotalBadge=document.getElementById('planTotalBadge'); if(planTotalBadge) planTotalBadge.textContent=String(total);
  const prev=document.getElementById('taskPreview'); if(prev) prev.innerHTML=`<p><b>Hedef:</b> ${esc(targetLabel(task))}</p><p><b>Öğrenci sayısı:</b> ${count}</p><p><b>Tarih:</b> ${fmtDate(w.start)} - ${fmtDate(addDaysISO(w.start,w.days-1))}</p><p><b>Program toplamı:</b> ${total} soru</p><p class="muted tiny">Aynı tarihlerde aynı öğrenciye verilmiş başka program varsa kayıt engellenir.</p>`;
}
function bindTaskList(){document.querySelectorAll('[data-del-task]').forEach(b=>b.onclick=()=>deleteTask(b.dataset.delTask)); document.querySelectorAll('[data-edit-task]').forEach(b=>b.onclick=()=>{const t=state.tasks.find(x=>x.key===b.dataset.editTask); if(!t) return; state.editingTaskKey=t.key; state.taskWizard={targetType:t.targetType==='student'?'students':t.targetType,className:t.className,studentNos:studentsForTask(t),start:t.start,days:t.days,plan:resizePlan(t.plan,t.days)}; state.taskWizardStep=1; renderTasks(document.getElementById('mainArea'));});}


function lessonDesignerHtml(){

    </div>`).join('')||'<div class="empty">Henüz ders yok. Ders ekleyerek başlayın.</div>'}

function bindLessonDesigner(){
  const sync=()=>{
    document.querySelectorAll('.lesson-name').forEach(inp=>{const li=Number(inp.dataset.li); if(state.lessons[li]) state.lessons[li].name=inp.value.trim();});
    document.querySelectorAll('.topic-name').forEach(inp=>{const li=Number(inp.dataset.li),ti=Number(inp.dataset.ti); if(state.lessons[li]?.topics?.[ti]) state.lessons[li].topics[ti].name=inp.value.trim();});
  };
  document.querySelector('[data-lesson-add]')?.addEventListener('click',()=>{sync(); state.lessons.push({name:'Yeni Ders',topics:[{name:'Yeni Ana Konu',subtopics:['Alt Konu']} ]}); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-lesson-del]').forEach(b=>b.onclick=()=>{sync(); state.lessons.splice(Number(b.dataset.lessonDel),1); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-topic-add]').forEach(b=>b.onclick=()=>{sync(); const li=Number(b.dataset.topicAdd); state.lessons[li].topics=state.lessons[li].topics||[]; state.lessons[li].topics.push({name:'Yeni Ana Konu',subtopics:[]}); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-topic-del]').forEach(b=>b.onclick=()=>{sync(); const [li,ti]=b.dataset.topicDel.split(':').map(Number); state.lessons[li].topics.splice(ti,1); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-subtopic-add]').forEach(b=>b.onclick=()=>{sync(); const [li,ti]=b.dataset.subtopicAdd.split(':').map(Number); const input=document.querySelector(`.subtopic-new[data-li="${li}"][data-ti="${ti}"]`); const val=(input?.value||'').trim(); if(!val){setToast('Alt konu adı yazın','error'); return;} state.lessons[li].topics[ti].subtopics=state.lessons[li].topics[ti].subtopics||[]; state.lessons[li].topics[ti].subtopics.push(val); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-subtopic-del]').forEach(b=>b.onclick=()=>{sync(); const [li,ti,si]=b.dataset.subtopicDel.split(':').map(Number); state.lessons[li].topics[ti].subtopics.splice(si,1); renderAdmin(document.getElementById('mainArea'));});
  document.getElementById('resetLessons')?.addEventListener('click',()=>{state.lessons=structuredClone(DEFAULT_LESSONS); renderAdmin(document.getElementById('mainArea'));});
  document.getElementById('saveLessons')?.addEventListener('click',async()=>{try{sync(); state.lessons=state.lessons.filter(l=>l.name).map(l=>({...l,topics:(l.topics||[]).filter(t=>t.name)})); await saveLessons(); setToast('Dersler Firebase’e kaydedildi','ok'); render();}catch(e){setToast('Ders kaydı hatası: '+e.message,'error');}});
}

function adminSettingsHtml(classes){
  return `<div class="grid two"><div class="card"><h3>Kurum Ayarları</h3><div class="field"><label>Kurum adı</label><input id="setKurum" class="input" value="${esc(state.settings.kurumAdi)}"></div><div class="field" style="margin-top:10px"><label>Logo URL</label><input id="setLogo" class="input" value="${esc(state.settings.logoUrl)}"></div><div class="field" style="margin-top:10px"><label>Ders başına günlük giriş limiti</label><input id="setLimit" class="input" inputmode="numeric" value="${esc(state.settings.dailyLimit)}"></div><div class="row" style="margin-top:12px"><button id="saveSettings" class="primary">Ayarları Kaydet</button><button id="useEduIcon" class="secondary">Fenomen Logosunu Kullan</button></div></div>
  <div class="card"><h3>Takip Edilecek Sınıflar</h3><p class="muted tiny">Sınıf seçilmezse günlük/haftalık uyarı listesi hiç gösterilmez.</p><div class="chipbar">${classes.map(c=>`<label class="chip ${state.followClasses.includes(c)?'active':''}"><input type="checkbox" class="follow-class" value="${esc(c)}" ${state.followClasses.includes(c)?'checked':''} hidden> ${esc(c)}</label>`).join('')||'<div class="empty">Sınıf verisi yok.</div>'}</div><button id="saveFollow" class="primary" style="margin-top:12px">Takip Ayarını Kaydet</button></div></div>`;
}
function adminFirebaseHtml(){
  return `<div class="grid two"><div class="card"><h3>Firebase Durumu</h3><div class="risk-list"><div class="risk-card good"><b>Realtime Database yolu</b><p>Görevler: verianalizi001/haftalikGorevler</p></div><div class="risk-card good"><b>Öğrenci mesajları</b><p>verianalizi001/ogrenciMesajlari/{öğrenciNo}</p></div><div class="risk-card good"><b>Veli bildirim geçmişi</b><p>verianalizi001/veliBildirimGecmisi/{öğrenciNo}</p></div></div></div><div class="card"><h3>Performans</h3><p class="muted">Öğrenci detaylarında istatistikler tarih aralığına göre önbelleğe alınır. Takip listeleri parça parça okunur; gereksiz uzun sayfa yükleri sekmelere bölünmüştür.</p></div></div>`;
}
function bindAdmin(){
  document.querySelectorAll('[data-admin-tab]').forEach(b=>b.onclick=()=>{state.adminTab=b.dataset.adminTab; render();});
  document.getElementById('useEduIcon')?.addEventListener('click',()=>{document.getElementById('setLogo').value=DEFAULT_LOGO;});
  document.getElementById('saveSettings')?.addEventListener('click',async()=>{try{state.settings.kurumAdi=document.getElementById('setKurum').value.trim()||DEFAULT_KURUM; state.settings.logoUrl=document.getElementById('setLogo').value.trim()||DEFAULT_LOGO; state.settings.dailyLimit=Number(document.getElementById('setLimit').value)||3; await saveSettings(); setToast('Kurum ayarları kaydedildi','ok'); render();}catch(e){setToast(e.message,'error');}});
  document.querySelectorAll('.follow-class').forEach(ch=>ch.onchange=()=>{const set=new Set(state.followClasses); if(ch.checked) set.add(ch.value); else set.delete(ch.value); state.followClasses=[...set]; ch.closest('.chip').classList.toggle('active',ch.checked);});
  document.getElementById('saveFollow')?.addEventListener('click',async()=>{try{await saveFollowSettings(); setToast('Takip sınıfları kaydedildi','ok'); render();}catch(e){setToast(e.message,'error');}});
  bindLessonDesigner();
  document.getElementById('loadOps')?.addEventListener('click',loadAdminOperations);
}
function registerAdminRecord(title,path,data){
  const id='rec_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);
  state.adminOpsMap[id]={title,path,data};
  return id;
}
function showModal(html){
  let root=document.getElementById('modalRoot');
  if(!root){root=document.createElement('div');root.id='modalRoot';document.body.appendChild(root);}
  root.innerHTML=`<div class="modal-backdrop" data-close-modal><div class="modal-card" onclick="event.stopPropagation()">${html}</div></div>`;
  root.querySelector('[data-close-modal]')?.addEventListener('click',closeModal);
  root.querySelectorAll('[data-modal-close]').forEach(b=>b.onclick=closeModal);
}
function closeModal(){const root=document.getElementById('modalRoot'); if(root) root.innerHTML='';}
function openAdminRecord(id){
  const rec=state.adminOpsMap[id]; if(!rec) return;
  showModal(`<div class="modal-head"><div><h3>${esc(rec.title)}</h3><p class="muted tiny">Firebase yolu: ${esc(rec.path)}</p></div><button class="ghost" data-modal-close>Kapat</button></div><div class="detail-pre">${esc(JSON.stringify(rec.data,null,2))}</div><div class="row" style="margin-top:14px"><button class="secondary" data-edit-rec="${id}">Düzenle</button><button class="danger-btn" data-del-rec="${id}">Sil</button></div>`);
  document.querySelector('[data-edit-rec]')?.addEventListener('click',()=>editAdminRecord(id));
  document.querySelector('[data-del-rec]')?.addEventListener('click',()=>deleteAdminRecord(id));
}
function editAdminRecord(id){
  const rec=state.adminOpsMap[id]; if(!rec) return;
  showModal(`<div class="modal-head"><div><h3>Düzenle</h3><p class="muted tiny">Firebase yolu: ${esc(rec.path)}</p></div><button class="ghost" data-modal-close>Kapat</button></div><textarea id="jsonEdit" class="input json-editor">${esc(JSON.stringify(rec.data,null,2))}</textarea><div class="row" style="margin-top:14px"><button id="saveJsonEdit" class="primary">Kaydet</button><button class="ghost" data-modal-close>Vazgeç</button></div>`);
  document.getElementById('saveJsonEdit').onclick=async()=>{try{const parsed=JSON.parse(document.getElementById('jsonEdit').value); await putJson(rec.path,parsed); closeModal(); setToast('Kayıt güncellendi','ok'); if(rec.path.includes('haftalikGorevler')) await loadTasks(); await loadAdminOperations();}catch(e){setToast('Düzenleme hatası: '+e.message,'error');}};
}
async function deleteAdminRecord(id){
  const rec=state.adminOpsMap[id]; if(!rec) return;
  if(!confirm('Bu kaydı silmek istiyor musunuz?')) return;
  try{await deleteJson(rec.path); closeModal(); setToast('Kayıt silindi','ok'); if(rec.path.includes('haftalikGorevler')) await loadTasks(); await loadAdminOperations();}catch(e){setToast('Silme hatası: '+e.message,'error');}
}
function adminActionButtons(id){return `<div class="record-actions"><button class="secondary" data-rec-detail="${id}">Detay</button><button class="secondary" data-rec-edit="${id}">Düzenle</button><button class="danger-btn" data-rec-del="${id}">Sil</button></div>`;}
function bindAdminRecordButtons(){
  document.querySelectorAll('[data-rec-detail]').forEach(b=>b.onclick=()=>openAdminRecord(b.dataset.recDetail));
  document.querySelectorAll('[data-rec-edit]').forEach(b=>b.onclick=()=>editAdminRecord(b.dataset.recEdit));
  document.querySelectorAll('[data-rec-del]').forEach(b=>b.onclick=()=>deleteAdminRecord(b.dataset.recDel));
}

async function loadAdminOperations(){
  const box=document.getElementById('adminOpsBox'); box.innerHTML='<span class="loader"></span> Analiz yükleniyor...';
  try{
    state.adminOpsMap={};
    const [logs,notifications,msgs]=await Promise.all([
      getJson('verianalizi001/ogretmenIslemleri').catch(()=>({})),
      getJson('verianalizi001/veliBildirimGecmisi').catch(()=>({})),
      getJson('verianalizi001/ogrenciMesajlari').catch(()=>({}))
    ]);
    const byTeacher={};
    const recentLogs=Object.entries(logs||{}).map(([key,l])=>({key,...l})).sort((a,b)=>String(b.time||b.tarihSaat||'').localeCompare(String(a.time||a.tarihSaat||'')));
    const notifyRows=[];
    Object.entries(notifications||{}).forEach(([studentNo,obj])=>Object.entries(obj||{}).forEach(([key,n])=>notifyRows.push({studentNo,key,...n})));
    const messageRows=[];
    Object.entries(msgs||{}).forEach(([studentNo,obj])=>Object.entries(obj||{}).forEach(([key,m])=>messageRows.push({studentNo,key,...m})));
    for(const l of Object.values(logs||{})){const id=cleanId(l.ogretmenID||l.teacherId); if(!byTeacher[id]) byTeacher[id]={id,name:l.ogretmenAdi||l.teacherName||getTeacherName(id),actions:0,notifications:0,studentMessages:0}; byTeacher[id].actions++;}
    for(const n of notifyRows){const id=cleanId(n.ogretmenID||n.teacherId); if(!byTeacher[id]) byTeacher[id]={id,name:n.ogretmenAdi||n.teacherName||getTeacherName(id),actions:0,notifications:0,studentMessages:0}; byTeacher[id].notifications++;}
    for(const m of messageRows){const id=cleanId(m.ogretmenID||m.teacherId); if(!byTeacher[id]) byTeacher[id]={id,name:m.ogretmenAdi||m.teacherName||getTeacherName(id),actions:0,notifications:0,studentMessages:0}; byTeacher[id].studentMessages++;}
    const teacherRows=Object.values(byTeacher).sort((a,b)=>((b.actions||0)+(b.notifications||0)+(b.studentMessages||0))-((a.actions||0)+(a.notifications||0)+(a.studentMessages||0))).map(x=>`<tr><td>${esc(x.name)}<br><span class="muted tiny">ID ${esc(x.id||'-')}</span></td><td>${x.actions||0}</td><td>${x.notifications||0}</td><td>${x.studentMessages||0}</td><td>${(x.actions||0)+(x.notifications||0)+(x.studentMessages||0)}</td></tr>`).join('');
    const taskRows=state.tasks.slice(0,80).map(t=>{const id=registerAdminRecord('Görev Kaydı',`verianalizi001/haftalikGorevler/${t.key}`,t); return `<tr class="admin-row-click"><td onclick="openAdminRecord('${id}')">${esc(getTeacherName(t.teacherId))}</td><td onclick="openAdminRecord('${id}')">${esc(targetLabel(t))}</td><td>${fmtDate(t.start)} - ${fmtDate(t.end)}</td><td>${taskQuestionTotal(t)} soru</td><td><div class="record-actions"><button class="secondary" data-rec-detail="${id}">Detay</button><button class="secondary" data-admin-edit-task="${esc(t.key)}">Düzenle</button><button class="danger-btn" data-admin-del-task="${esc(t.key)}">Sil</button></div></td></tr>`;}).join('');
    const logRows=recentLogs.slice(0,60).map(l=>{const id=registerAdminRecord('Öğretmen İşlem Kaydı',`verianalizi001/ogretmenIslemleri/${l.key}`,l); return `<tr class="admin-row-click"><td onclick="openAdminRecord('${id}')">${esc(l.time||l.tarihSaat||'')}</td><td>${esc(l.teacherName||l.ogretmenAdi||getTeacherName(l.teacherId||l.ogretmenID))}</td><td>${esc(l.type||'İşlem')}</td><td>${esc(l.detail||'')}</td><td>${adminActionButtons(id)}</td></tr>`;}).join('');
    const notificationHtml=notifyRows.sort((a,b)=>String(b.tarihSaat||'').localeCompare(String(a.tarihSaat||''))).slice(0,50).map(n=>{const st=state.students.find(s=>s.no===cleanId(n.studentNo)); const id=registerAdminRecord('Veli Bildirim Kaydı',`verianalizi001/veliBildirimGecmisi/${n.studentNo}/${n.key}`,n); return `<tr class="admin-row-click"><td onclick="openAdminRecord('${id}')">${esc(n.tarihSaat||'')}</td><td>${esc(st?.name||n.studentNo)}</td><td>${esc(n.kanal||'-')}</td><td>${esc(n.ogretmenAdi||getTeacherName(n.ogretmenID||n.teacherId))}</td><td>${adminActionButtons(id)}</td></tr>`;}).join('');
    const messageHtml=messageRows.sort((a,b)=>String(b.tarihSaat||'').localeCompare(String(a.tarihSaat||''))).slice(0,50).map(m=>{const st=state.students.find(s=>s.no===cleanId(m.studentNo)); const id=registerAdminRecord('Öğrenci Panel Mesajı',`verianalizi001/ogrenciMesajlari/${m.studentNo}/${m.key}`,m); return `<tr class="admin-row-click"><td onclick="openAdminRecord('${id}')">${esc(m.tarihSaat||m.tarih||'')}</td><td>${esc(st?.name||m.studentNo)}</td><td>${esc(m.baslik||'Mesaj')}</td><td>${esc(m.ogretmenAdi||getTeacherName(m.ogretmenID||m.teacherId))}</td><td>${adminActionButtons(id)}</td></tr>`;}).join('');
    const opsTabs=[['teachers','Öğretmenler'],['tasks','Görevler'],['logs','İşlemler'],['notifications','Veli Bildirimleri'],['messages','Panel Mesajları']];
    box.innerHTML=`${statsHtml([['Öğretmen',Object.keys(byTeacher).length,'İşlem yapan'],['Görev',state.tasks.length,'Kayıtlı'],['Veli Bildirimi',notifyRows.length,'Onaylı'],['Panel Mesajı',messageRows.length,'Öğrenciye']])}
      <div class="admin-ops-tabs">${opsTabs.map(([id,label])=>`<button type="button" class="admin-ops-tab ${state.adminOpsTab===id?'active':''}" data-admin-ops-tab="${id}">${label}</button>`).join('')}</div>
      <div class="admin-ops-panel ${state.adminOpsTab==='teachers'?'active':''}" data-admin-ops-panel="teachers"><h3>Öğretmen Performans Özeti</h3><div class="table-wrap"><table class="table"><thead><tr><th>Öğretmen</th><th>İşlem</th><th>Veli Bildirimi</th><th>Panel Mesajı</th><th>Toplam</th></tr></thead><tbody>${teacherRows||'<tr><td colspan="5">Kayıt yok</td></tr>'}</tbody></table></div></div>
      <div class="admin-ops-panel ${state.adminOpsTab==='tasks'?'active':''}" data-admin-ops-panel="tasks"><h3>Görev Kayıtları</h3><div class="table-wrap"><table class="table"><thead><tr><th>Öğretmen</th><th>Hedef</th><th>Tarih</th><th>Toplam</th><th>İşlem</th></tr></thead><tbody>${taskRows||'<tr><td colspan="5">Görev yok</td></tr>'}</tbody></table></div></div>
      <div class="admin-ops-panel ${state.adminOpsTab==='logs'?'active':''}" data-admin-ops-panel="logs"><h3>Son Öğretmen İşlemleri</h3><div class="table-wrap"><table class="table"><thead><tr><th>Tarih</th><th>Öğretmen</th><th>Tür</th><th>Detay</th><th>İşlem</th></tr></thead><tbody>${logRows||'<tr><td colspan="5">İşlem yok</td></tr>'}</tbody></table></div></div>
      <div class="admin-ops-panel ${state.adminOpsTab==='notifications'?'active':''}" data-admin-ops-panel="notifications"><h3>Veli Bildirimleri</h3><div class="table-wrap"><table class="table"><thead><tr><th>Tarih</th><th>Öğrenci</th><th>Kanal</th><th>Öğretmen</th><th>İşlem</th></tr></thead><tbody>${notificationHtml||'<tr><td colspan="5">Veli bildirimi yok</td></tr>'}</tbody></table></div></div>
      <div class="admin-ops-panel ${state.adminOpsTab==='messages'?'active':''}" data-admin-ops-panel="messages"><h3>Öğrenci Panel Mesajları</h3><div class="table-wrap"><table class="table"><thead><tr><th>Tarih</th><th>Öğrenci</th><th>Başlık</th><th>Öğretmen</th><th>İşlem</th></tr></thead><tbody>${messageHtml||'<tr><td colspan="5">Mesaj yok</td></tr>'}</tbody></table></div></div>`;
    document.querySelectorAll('[data-admin-ops-tab]').forEach(b=>b.onclick=()=>{state.adminOpsTab=b.dataset.adminOpsTab; document.querySelectorAll('[data-admin-ops-tab]').forEach(x=>x.classList.toggle('active',x===b)); document.querySelectorAll('[data-admin-ops-panel]').forEach(p=>p.classList.toggle('active',p.dataset.adminOpsPanel===state.adminOpsTab));});
    document.querySelectorAll('[data-admin-del-task]').forEach(b=>b.onclick=()=>deleteTask(b.dataset.adminDelTask));
    document.querySelectorAll('[data-admin-edit-task]').forEach(b=>b.onclick=()=>{const t=state.tasks.find(x=>x.key===b.dataset.adminEditTask); if(!t) return; state.editingTaskKey=t.key; state.taskWizard={targetType:t.targetType==='student'?'students':t.targetType,className:t.className,studentNos:studentsForTask(t),start:t.start,days:t.days,plan:{...t.plan}}; state.taskWizardStep=1; state.activeTab='tasks'; render();});
    bindAdminRecordButtons();
  }catch(e){box.innerHTML=`<div class="empty danger">${esc(e.message)}</div>`;}
}

bootstrap();
</script>
</body>
</html>
