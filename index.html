<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>Fenomen Öğretmen Paneli</title>
  <link rel="icon" href="https://i.ibb.co/cS9PSRpq/Logo-Fenomen.jpg" />
  <style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#eef3ff;
  --bg2:#f8fbff;
  --surface:#ffffff;
  --surface-soft:#f7faff;
  --surface-glass:rgba(255,255,255,.78);
  --surface-strong:rgba(255,255,255,.94);
  --ink:#0b1220;
  --text:#101828;
  --muted:#667085;
  --muted2:#8a98ad;
  --line:rgba(148,163,184,.24);
  --line-strong:rgba(15,23,42,.10);
  --primary:#3158ff;
  --primary-dark:#163ee4;
  --primary-soft:#e9efff;
  --secondary:#7c3aed;
  --accent:#06b6d4;
  --success:#12b76a;
  --success-soft:#e8fff4;
  --warning:#f79009;
  --warning-soft:#fff4df;
  --danger:#ef4444;
  --danger-soft:#fff1f1;
  --blue-soft:#edf4ff;
  --shadow-xs:0 2px 8px rgba(15,23,42,.05);
  --shadow:0 22px 60px rgba(15,23,42,.10);
  --shadow-lg:0 34px 90px rgba(32,56,117,.18);
  --radius-sm:14px;
  --radius:24px;
  --radius-lg:32px;
  --focus:0 0 0 4px rgba(49,88,255,.16);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{width:100%;min-height:100%;overflow-x:hidden;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  margin:0;
  width:100%;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  color:var(--text);
  font-family:'Manrope',Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  letter-spacing:-.012em;
  background:
    radial-gradient(circle at 8% -8%, rgba(49,88,255,.20) 0, rgba(49,88,255,0) 34%),
    radial-gradient(circle at 92% 2%, rgba(124,58,237,.16) 0, rgba(124,58,237,0) 30%),
    radial-gradient(circle at 50% 100%, rgba(6,182,212,.13) 0, rgba(6,182,212,0) 34%),
    linear-gradient(180deg,#f8fbff 0%,#eef3ff 54%,#f9fbff 100%);
  background-attachment:fixed;
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.32) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.32) 1px, transparent 1px);
  background-size:44px 44px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.50),transparent 66%);
  z-index:-1;
}
img{max-width:100%;display:block}
button,input,select,textarea{font:inherit}
button{border:0;cursor:pointer}
a{color:inherit}

.app,.app-shell{min-height:100vh;position:relative}
.app-shell,.container{width:min(1220px,100%);margin:0 auto;padding:28px 20px 42px}
.container{padding-bottom:calc(116px + env(safe-area-inset-bottom))}
body:has(.bottom-nav){padding-bottom:0}

.card,.login-card,.section-card,.student-hero{
  position:relative;
  background:var(--surface-glass);
  border:1px solid rgba(255,255,255,.72);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.card::before,.login-card::before,.section-card::before,.student-hero::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.74);
}
.login-wrap{min-height:calc(100dvh - 80px);display:grid;place-items:center;padding:28px 0}
.login-card{width:min(510px,100%);padding:34px}
.login-icon,.login-logo{
  width:124px;height:124px;border-radius:30px;margin:0 auto 20px;
  display:grid;place-items:center;overflow:hidden;background:#fff;
  border:1px solid rgba(255,255,255,.78);
  box-shadow:0 24px 52px rgba(49,88,255,.15), inset 0 1px 0 rgba(255,255,255,.9);
}
.login-icon img,.login-logo img,.logo-img{width:100%;height:100%;object-fit:contain}
.login-title{margin:0;text-align:center;font-size:30px;line-height:1.08;font-weight:900;letter-spacing:-.045em;color:var(--ink)}
.login-sub{margin:10px auto 26px;text-align:center;max-width:380px;color:var(--muted);font-weight:600;line-height:1.6}

.topbar{
  position:sticky;top:0;z-index:30;
  background:rgba(248,251,255,.80);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid rgba(148,163,184,.18);
}
.topbar-inner{width:min(1220px,100%);margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px}
.app-shell>.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin:0 0 20px;padding:12px 0;background:transparent;border-bottom:0;position:relative;backdrop-filter:none}
.brand{display:flex;align-items:center;gap:14px;min-width:0;flex:1}
.brand>div:not(.logo):not(.logo-box){min-width:0}
.logo,.logo-box{
  width:70px;height:70px;min-width:70px;border-radius:22px;background:#fff;
  display:grid;place-items:center;overflow:hidden;line-height:0;
  border:1px solid rgba(255,255,255,.74);
  box-shadow:0 18px 42px rgba(49,88,255,.12), inset 0 1px 0 rgba(255,255,255,.9);
}
.logo img,.logo-box img{width:100%;height:100%;object-fit:contain}
.brand h1{margin:0;font-size:22px;line-height:1.1;font-weight:900;letter-spacing:-.04em;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand p{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.section-title{margin:12px 0 18px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.section-title h2,.section-head h3{margin:0;color:var(--ink);font-weight:900;letter-spacing:-.04em}
.section-title h2{font-size:clamp(24px,3.4vw,34px)}
.section-title p,.section-head p{margin:6px 0 0;color:var(--muted);font-weight:650;line-height:1.55}
.section-card{padding:24px;margin-top:12px}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
.section-head h3{font-size:24px;line-height:1.15}
.card h2,.card h3{color:var(--ink);letter-spacing:-.035em}.card h2{font-size:24px}.card h3{font-size:19px}

.grid{display:grid;gap:16px}.two,.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.three,.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.four,.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.compact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:12px}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.row.nowrap{flex-wrap:nowrap}.row>*{min-width:0}.spacer{flex:1}
.meta-row,.chipbar{display:flex;flex-wrap:wrap;gap:9px}

label,.field label{display:block;margin:0 0 8px;color:#344054;font-size:13px;font-weight:850;letter-spacing:-.01em}
.field{width:100%;display:flex;flex-direction:column;gap:8px}
input,select,textarea,.input{
  width:100%;max-width:100%;min-height:48px;
  border:1px solid rgba(148,163,184,.32);
  background:rgba(255,255,255,.92);
  color:var(--ink);
  border-radius:18px;
  padding:13px 15px;
  outline:none;
  font-size:15.5px;
  font-weight:650;
  transition:box-shadow .18s ease,border-color .18s ease,background .18s ease,transform .18s ease;
  appearance:none;-webkit-appearance:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 1px 2px rgba(15,23,42,.03);
}
select{background-image:linear-gradient(45deg,transparent 50%,#667085 50%),linear-gradient(135deg,#667085 50%,transparent 50%);background-position:calc(100% - 18px) 21px,calc(100% - 12px) 21px;background-size:6px 6px,6px 6px;background-repeat:no-repeat;padding-right:34px}
textarea{min-height:108px;resize:vertical;line-height:1.55}
input:focus,select:focus,textarea:focus,.input:focus{border-color:rgba(49,88,255,.72);box-shadow:var(--focus), inset 0 1px 0 rgba(255,255,255,.9);background:#fff}
::placeholder{color:#98a2b3;font-weight:600}

.btn,.primary,.secondary,.ghost,.danger-btn,.success-btn,.warning-btn,.btn-primary,.btn-light,.btn-danger,.btn-ghost{
  min-height:48px;border-radius:18px;padding:12px 17px;
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  font-weight:900;text-decoration:none;line-height:1.1;
  transition:transform .18s ease,box-shadow .18s ease,background .18s ease,border-color .18s ease,opacity .18s ease;
  border:1px solid transparent;
  user-select:none;
}
.btn:hover,.primary:hover,.secondary:hover,.ghost:hover,.danger-btn:hover,.success-btn:hover,.warning-btn:hover,.btn-primary:hover,.btn-light:hover,.btn-danger:hover,.btn-ghost:hover{transform:translateY(-2px)}
.btn:active,.primary:active,.secondary:active,.ghost:active,.danger-btn:active,.success-btn:active,.warning-btn:active{transform:translateY(0) scale(.99)}
.primary,.btn-primary{color:#fff;background:linear-gradient(135deg,#4f6dff 0%,#3158ff 46%,#1b36d9 100%);box-shadow:0 16px 34px rgba(49,88,255,.27)}
.secondary,.btn-light{color:#1d3fd1;background:linear-gradient(135deg,#f4f7ff,#e8efff);border-color:rgba(49,88,255,.12);box-shadow:0 10px 20px rgba(49,88,255,.08)}
.ghost,.btn-ghost{color:#344054;background:rgba(255,255,255,.74);border-color:rgba(148,163,184,.32);box-shadow:var(--shadow-xs)}
.danger-btn,.btn-danger{color:#b42318;background:linear-gradient(135deg,#fff5f5,#ffe9e9);border-color:#ffd0d0}
.success-btn{color:#067647;background:linear-gradient(135deg,#effff7,#dcfae6);border-color:#abefc6}
.warning-btn{color:#b54708;background:linear-gradient(135deg,#fff8eb,#ffefd0);border-color:#fedf89}
.btn:disabled,.primary:disabled,.secondary:disabled,.ghost:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}.w-100{width:100%}
.button-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.button-grid button{min-height:50px}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.tabs{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 16px;margin:0 0 6px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{
  min-height:46px;white-space:nowrap;padding:11px 16px;border-radius:999px;
  border:1px solid rgba(148,163,184,.28);background:rgba(255,255,255,.76);
  color:#475467;font-weight:900;box-shadow:var(--shadow-xs);transition:.18s ease;
}
.tab:hover{transform:translateY(-1px);background:#fff}.tab.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,#3158ff,#163ee4);box-shadow:0 14px 32px rgba(49,88,255,.26)}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(248,251,255,.80);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(148,163,184,.20);box-shadow:0 -24px 60px rgba(15,23,42,.12)}
.bottom-nav .nav-inner{width:min(780px,100%);margin:0 auto;display:grid;gap:10px}
.nav-item{min-height:64px;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:#667085;background:rgba(255,255,255,.82);border:1px solid rgba(148,163,184,.26);box-shadow:var(--shadow-xs);font-size:12px;font-weight:900;transition:.18s ease}
.nav-item b{font-size:20px;line-height:1}.nav-item.active{color:#fff;background:linear-gradient(135deg,#3158ff,#163ee4);border-color:transparent;box-shadow:0 18px 34px rgba(49,88,255,.28)}

.student-hero{padding:26px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;margin-bottom:18px;overflow:hidden}
.student-hero::after{content:"";position:absolute;right:-80px;top:-100px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(49,88,255,.15),transparent 65%);pointer-events:none}
.student-hero h2{margin:0 0 10px;color:var(--ink);font-size:clamp(24px,4vw,36px);font-weight:900;letter-spacing:-.055em;line-height:1.05}
.stat-card,.admin-metric{
  position:relative;overflow:hidden;padding:19px;border-radius:26px;background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.72);box-shadow:0 18px 42px rgba(15,23,42,.08);backdrop-filter:blur(14px)
}
.stat-card::after,.admin-metric::after{content:"";position:absolute;right:-36px;top:-36px;width:98px;height:98px;border-radius:50%;background:rgba(49,88,255,.09)}
.stat-card span,.admin-metric small{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px}
.stat-card strong,.admin-metric strong{display:block;color:var(--ink);font-size:clamp(26px,4vw,34px);font-weight:900;letter-spacing:-.06em;line-height:1}
.mini,.tiny{font-size:12px;color:var(--muted);font-weight:750;line-height:1.45}.muted{color:var(--muted)}.danger{color:var(--danger)}.success{color:var(--success)}.warning{color:var(--warning)}

.pill,.badge,.chip{
  display:inline-flex;align-items:center;gap:7px;min-height:34px;padding:8px 11px;border-radius:999px;
  background:rgba(255,255,255,.78);border:1px solid rgba(148,163,184,.26);color:#344054;font-size:12px;font-weight:900;box-shadow:var(--shadow-xs)
}
.pill.blue,.badge{color:#1d3fd1;background:#eef4ff;border-color:#dbe6ff}.pill.green,.badge.green,.green{color:#067647}.pill.green,.badge.green{background:#e8fff4;border-color:#abefc6}.pill.orange,.badge.orange{color:#b54708;background:#fff4df;border-color:#fedf89}.badge.red{color:#b42318;background:#fff1f1;border-color:#ffc9c9}.chip.active{color:#fff;background:linear-gradient(135deg,#3158ff,#163ee4);border-color:transparent;box-shadow:0 14px 30px rgba(49,88,255,.22)}

.entry-row,.task-card,.message-card,.course-line,.lesson-card,.topic-card,.thin-item,.day-card,.student-row,.target-summary,.confirm-panel{
  border:1px solid rgba(148,163,184,.22);background:rgba(255,255,255,.80);border-radius:26px;padding:16px;box-shadow:0 12px 32px rgba(15,23,42,.06);backdrop-filter:blur(12px)
}
.entry-row,.task-card,.message-card{margin-bottom:13px}.topic-card{margin-top:12px;background:rgba(247,250,255,.88)}.day-card{background:rgba(247,250,255,.88)}
.row-title,.task-top,.course-line-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.row-title strong,.task-title{font-size:16px;font-weight:900;color:var(--ink);margin:0}.task-sub{margin:4px 0 0;color:var(--muted);font-size:13px;font-weight:700}
.task-line{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:9px;padding:13px;border-radius:20px;background:rgba(248,251,255,.94);border:1px solid rgba(148,163,184,.18)}
.progress-wrap,.bar{height:10px;margin-top:9px;background:#e6ebf5;border-radius:999px;overflow:hidden}.progress-bar,.bar span{display:block;height:100%;background:linear-gradient(90deg,#3158ff,#06b6d4,#12b76a);border-radius:999px}
.message-title{margin:0 0 7px;font-weight:900;color:var(--ink)}.message-text{line-height:1.62;color:#344054;margin:0 0 12px;white-space:pre-wrap;font-weight:600}.message-card.unread{border-color:rgba(49,88,255,.25);background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(237,244,255,.92))}
.message-preview{white-space:pre-wrap;background:linear-gradient(180deg,#ffffff,#f7faff);border:1px solid rgba(148,163,184,.22);border-radius:24px;padding:16px;line-height:1.62;color:#344054;font-weight:650;box-shadow:inset 0 1px 0 rgba(255,255,255,.85)}
.empty{border:1.5px dashed rgba(49,88,255,.25);background:rgba(237,244,255,.62);border-radius:28px;padding:28px;text-align:center;color:#667085;line-height:1.6;font-weight:750}

.student-row{display:flex;gap:14px;align-items:center;cursor:pointer;transition:.18s ease}.student-row:hover{transform:translateY(-2px);box-shadow:0 20px 42px rgba(49,88,255,.12);border-color:rgba(49,88,255,.28)}.student-row h3{margin:0;font-size:16px;font-weight:900;color:var(--ink)}.student-row p{margin:4px 0 0;color:var(--muted);font-size:13px;font-weight:750}
.avatar{width:52px;height:52px;min-width:52px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(135deg,#eef4ff,#e8e6ff);color:#3158ff;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}

.wizard-shell{display:grid;gap:16px}.wizard-steps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:8px}.wizard-step{position:relative;overflow:hidden;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.78);border-radius:26px;padding:16px;box-shadow:0 12px 28px rgba(15,23,42,.06)}.wizard-step::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,#3158ff,#06b6d4)}.wizard-step b{display:block;color:var(--ink);font-size:14px;font-weight:900;margin-bottom:5px}.wizard-step span{color:var(--muted);font-size:12px;font-weight:750;line-height:1.45}.target-summary{background:linear-gradient(135deg,#edf4ff,#f5f8ff);color:#1d3fd1;font-weight:850}.student-picker-tools{display:grid;grid-template-columns:1fr 200px;gap:12px}

.lesson-designer{display:grid;gap:14px}.lesson-card{padding:18px}.lesson-card>.row:first-child{padding-bottom:12px;border-bottom:1px solid rgba(148,163,184,.18)}.subtopic-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.subtopic-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid rgba(49,88,255,.15);background:#eef4ff;color:#1d3fd1;font-size:12px;font-weight:900}.subtopic-chip button{width:22px;height:22px;border-radius:999px;background:#fff;color:#b42318;font-weight:900;display:grid;place-items:center;box-shadow:var(--shadow-xs)}

.table-wrap{overflow:auto;border:1px solid rgba(148,163,184,.22);border-radius:26px;background:rgba(255,255,255,.82);box-shadow:0 12px 32px rgba(15,23,42,.06)}.table{width:100%;border-collapse:collapse;min-width:650px}.table th,.table td{padding:14px 15px;border-bottom:1px solid rgba(148,163,184,.18);text-align:left;font-size:13px;vertical-align:top}.table th{background:rgba(237,244,255,.74);color:#344054;font-weight:900;text-transform:uppercase;letter-spacing:.035em;font-size:12px}.table tr:last-child td{border-bottom:none}.table td{color:#344054;font-weight:650}

.alert{border-radius:20px;padding:14px 15px;margin-top:14px;font-size:14px;line-height:1.5;display:none;font-weight:750}.alert.show{display:block}.alert.ok{background:#e8fff4;color:#067647;border:1px solid #abefc6}.alert.bad{background:#fff1f1;color:#b42318;border:1px solid #ffc9c9}.alert.info{background:#edf4ff;color:#1d3fd1;border:1px solid #dbe6ff}
.loading{position:fixed;inset:0;background:rgba(248,251,255,.76);backdrop-filter:blur(16px);z-index:70;display:none;place-items:center;text-align:center;color:var(--ink);font-weight:900}.loading.show{display:grid}.spinner,.loader{display:inline-block;border-radius:50%;border:4px solid #dbe6ff;border-top-color:#3158ff;animation:spin .85s linear infinite}.spinner{width:48px;height:48px;margin:0 auto 12px}.loader{width:19px;height:19px;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;left:50%;bottom:calc(104px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:60;max-width:min(92vw,780px);padding:13px 17px;border-radius:999px;background:#101828;color:#fff;font-weight:900;box-shadow:0 24px 60px rgba(15,23,42,.25)}.toast.ok{background:#067647}.toast.error{background:#b42318}.hidden{display:none!important}
.footer{text-align:center;color:#8a98ad;font-size:12px;margin-top:26px;font-weight:800}.health-ok{background:#e8fff4!important;color:#067647!important;border-color:#abefc6!important}.health-bad{background:#fff1f1!important;color:#b42318!important;border-color:#ffc9c9!important}


.tabbox{display:grid;gap:12px}
input[type="checkbox"],input[type="radio"]{width:18px!important;height:18px!important;min-height:18px!important;padding:0!important;border-radius:6px;accent-color:var(--primary);box-shadow:none;appearance:auto;-webkit-appearance:auto;flex:0 0 auto}
.student-check{margin-right:2px}.follow-class{width:18px!important;height:18px!important;position:absolute;opacity:0;pointer-events:none}.chip:has(.follow-class){cursor:pointer}.chip:has(.follow-class:checked){color:#fff;background:linear-gradient(135deg,#3158ff,#163ee4);border-color:transparent;box-shadow:0 14px 30px rgba(49,88,255,.22)}
.lesson-name,.topic-name,.subtopic-new{font-weight:800}
.confirm-panel b{display:block;color:var(--ink);font-weight:900;font-size:18px;margin-bottom:6px}

@media(max-width:920px){

function parseAnyDate(v){
  const s=String(v ?? '').trim(); if(!s) return null;

function parseCsv(csv){
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<csv.length;i++){
    const c=csv[i];
    if(c==='"') { if(q && csv[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(c===',' && !q){ row.push(cur); cur=''; }
    else if((c==='\n'||c==='\r') && !q){ if(cur || row.length){row.push(cur); rows.push(row.map(cleanSheetValue)); row=[]; cur='';} if(c==='\r' && csv[i+1]==='\n') i++; }
    else cur+=c;
  }
  if(cur || row.length){row.push(cur); rows.push(row.map(cleanSheetValue));}
  return rows.filter(r=>r.some(x=>String(x).trim()));
}
function rowsHaveHeaders(rows, groups){const h=(rows[0]||[]).map(normalizeHeader); return groups.every(g=>g.some(k=>h.includes(normalizeHeader(k))));}
async function loadSheetRows(sheetNames, groups){
  for(const name of sheetNames){
    const urls=[
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&headers=1&sheet=${enc(name)}`,
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${enc(name)}`
    ];
    for(const url of urls){
      try{const rows=parseCsv(await fetchText(url)); if(rows.length>1 && rowsHaveHeaders(rows,groups)) return rows;}catch(e){}
    }
  }
  return [];
}

function lessonToTeacherLesson(x){
  if(!x || typeof x !== 'object') return null;
  const name=x.name||x.ad||x.ders||'';
  const rawTopics=x.topics||x.anaKonular||x.konular||[];
  const topics=(Array.isArray(rawTopics)?rawTopics:Object.values(rawTopics||{})).map(t=>({

    subtopics:Array.isArray(t.subtopics)?t.subtopics:(Array.isArray(t.altKonular)?t.altKonular:Object.values(t.altKonular||t.alt||{}).map(String))
  })).filter(t=>t.name);
  return name?{name,topics}:null;
}

function planToDaysObject(task){
  const days={};
  const names=lessonNames();
  for(let d=0; d<Number(task.days||7); d++){
    const date=addDaysISO(task.start,d);
    const items=[];
    for(const lesson of names){
      const n=Number(task.plan?.[planKey(d,lesson)]||0);
      if(n>0) items.push({ders:lesson,course:lesson,soruSayisi:n,hedefSoru:n,anaKonu:'Genel Tekrar',altKonu:'',aciklama:''});
    }
    if(items.length) days[date]=items;
  }
  return days;
}
function planFromDaysObject(daysObj){
  const plan={};
  if(!daysObj || typeof daysObj!=='object') return plan;
  const dates=Object.keys(daysObj).sort();
  dates.forEach((date,idx)=>{
    const val=daysObj[date];
    const items=Array.isArray(val)?val:(Array.isArray(val?.items)?val.items:(Array.isArray(val?.gorevler)?val.gorevler:Object.values(val||{})));
    items.forEach(item=>{
      const lesson=item.ders||item.course||item.lesson||'';
      const n=Number(item.soruSayisi||item.hedefSoru||item.soru||item.total||0);
      if(lesson && n) plan[planKey(idx,lesson)]=String(n);
    });
  });
  return plan;
}
function normalizeTask(key,o){
  if(!o || typeof o!=='object') return null;
  const start=isoFromAny(o.start||o.startDate||o.baslangicTarihi||o.baslangic);
  const duration=Number(o.sureGun||o.durationDays||(typeof o.days==='number'?o.days:0)||7);
  const end=isoFromAny(o.end||o.endDate||o.bitisTarihi) || addDaysISO(start,duration-1);
  const targetType=targetTypeFromLabel(o.targetType||o.hedefTuru||o.hedefTipi);
  const studentNos=Array.isArray(o.studentNos)?o.studentNos.map(cleanId):(Array.isArray(o.ogrenciler)?o.ogrenciler.map(cleanId):(targetType==='student'&&o.targetValue?[cleanId(o.targetValue)]:[]));
  return {
    key,start,days:duration,end,targetType,
    className:o.className||o.sinif||(['class','sinif'].includes(targetType)?(o.targetValue||''):''),
    targetValue:o.targetValue||o.hedefDegeri||'',
    studentNos,plan:o.plan||planFromDaysObject(o.days||o.gunler||{}),
    daysObject:(typeof o.days==='object'?o.days:(o.gunler||{})),
    teacherId:cleanId(o.teacherId||o.ogretmenID||''),
    teacherName:o.teacherName||o.ogretmenAdi||getTeacherName(o.teacherId||o.ogretmenID),
    createdAt:o.createdAt||o.olusturmaZamani||'',updatedAt:o.updatedAt||'',status:o.status||'aktif'
  };
}
function targetTypeFromLabel(v){
  const s=String(v||'').toLocaleLowerCase('tr-TR');
  if(s.includes('tüm')||s==='all'||s==='genel') return 'all';
  if(s.includes('öğr')||s.includes('student')) return 'student';
  return 'class';
}
function targetLabel(task){
  if(task.targetType==='all') return 'Tüm öğrenciler';
  if(task.targetType==='student'||task.targetType==='students'){
    const nos=task.studentNos?.length?task.studentNos:(task.targetValue?[task.targetValue]:[]);
    if(nos.length===1){const st=state.students.find(s=>s.no===cleanId(nos[0])); return st?`${st.name}`:`Öğrenci ${nos[0]}`;}
    return `${nos.length} öğrenci`;
  }
  return `${task.className||task.targetValue||'-'} sınıfı`;
}
function studentsForTask(task, students=state.students){
  const type=task.targetType;
  if(type==='all') return students.map(s=>s.no);
  if(type==='class') return students.filter(s=>s.className===(task.className||task.targetValue)).map(s=>s.no);
  const nos=task.studentNos?.length?task.studentNos:(task.targetValue?[task.targetValue]:[]);
  return nos.map(cleanId).filter(Boolean);
}
function taskQuestionTotal(task){return Object.values(task.plan||{}).reduce((s,v)=>s+(Number(v)||0),0);}
function planKey(dayIndex, lesson){return `d${dayIndex}_${lesson.replaceAll(' ','_')}`;}
function defaultPlan(days){const m={}; for(let d=0; d<days; d++) for(const l of lessonNames()) m[planKey(d,l)]=''; return m;}
function resizePlan(old,days){const m=defaultPlan(days); for(const [k,v] of Object.entries(old||{})) if(k in m) m[k]=v; return m;}
function applyTemplate(plan,days,type){const names=lessonNames(); const base={hafif:[20,15,15,10,10,10],dengeli:[30,30,25,15,15,15],yogun:[40,40,30,20,20,20]}[type] || [30,30,25,15,15,15]; const m={...plan}; for(let d=0; d<days; d++){ if(d%7<5) names.forEach((l,i)=>m[planKey(d,l)]=String(base[i]??10)); } return m;}
function clearWeekends(plan,days){const m={...plan}; for(let d=0; d<days; d++) if(d%7>=5) for(const l of lessonNames()) m[planKey(d,l)]=''; return m;}
function copyFirstWeek(plan,days){const m={...plan}; for(let d=7; d<days; d++) for(const l of lessonNames()) m[planKey(d,l)]=plan[planKey(d%7,l)]||''; return m;}
function buildTaskFromWizard(){
  const mode=document.querySelector('input[name="targetMode"]:checked')?.value||'class';
  const start=document.getElementById('taskStart')?.value||todayISO();
  const days=Number(document.getElementById('taskDays')?.value||7);
  const className=document.getElementById('taskClass')?.value||'';
  const domStudentNos=[...document.querySelectorAll('.student-check:checked')].map(x=>cleanId(x.value));
  const studentNos=[...new Set([...(state.taskWizard?.studentNos||[]),...domStudentNos])].filter(Boolean);
  let plan={};
  document.querySelectorAll('[data-plan-key]').forEach(inp=>{const v=String(inp.value||'').replace(/\D/g,'').slice(0,4); if(v && v!=='0') plan[inp.dataset.planKey]=v;});
  return {start,days,end:addDaysISO(start,days-1),targetType:mode,className,studentNos,plan,teacherId:state.teacher.id,teacherName:state.teacher.name,status:'aktif'};
}
function findConflicts(task, ignoreKey=''){
  const targetSet=new Set(studentsForTask(task));
  const conflicts=[];
  for(const old of state.tasks){
    if(old.key===ignoreKey || old.status==='silindi') continue;
    if(!rangesOverlap(task.start,task.end,old.start,old.end)) continue;
    const oldSet=new Set(studentsForTask(old));
    const both=[...targetSet].filter(no=>oldSet.has(no));
    if(both.length){conflicts.push({task:old, students:both});}
  }
  return conflicts;
}
async function saveTaskFromWizard(){
  const task=buildTaskFromWizard();
  if(task.targetType==='class' && !task.className) throw new Error('Sınıf seçilmedi.');
  if(task.targetType==='students' && !task.studentNos.length) throw new Error('En az bir öğrenci seçin.');
  const targetCount=studentsForTask(task).length; if(!targetCount) throw new Error('Bu hedefte öğrenci bulunamadı.');
  const conflicts=findConflicts(task,state.editingTaskKey||'');
  if(conflicts.length){
    const names=conflicts[0].students.slice(0,5).map(no=>state.students.find(s=>s.no===no)?.name||no).join(', ');
    throw new Error(`Bu tarihlerde bu öğrencinin/program hedefinin görevi vardır: ${names}${conflicts[0].students.length>5?'...':''}. Çakışan görev: ${targetLabel(conflicts[0].task)} (${fmtDate(conflicts[0].task.start)}-${fmtDate(conflicts[0].task.end)}), veren: ${getTeacherName(conflicts[0].task.teacherId)}.`);
  }
  const now=nowText();
  const common={...task,createdAt:state.editingTaskKey?(state.tasks.find(t=>t.key===state.editingTaskKey)?.createdAt||now):now,updatedAt:now,sureGun:task.days,durationDays:task.days,startDate:task.start,endDate:task.end,baslangicTarihi:fmtDate(task.start),bitisTarihi:fmtDate(task.end)};
  common.days=planToDaysObject(task);
  const payloads=[];
  if(task.targetType==='students' && !state.editingTaskKey){
    task.studentNos.forEach(no=>{
      const st=state.students.find(s=>s.no===no);
      payloads.push({...common,targetType:'student',hedefTuru:'student',targetValue:no,hedefDegeri:no,studentNos:[no],className:st?.className||'',sinif:st?.className||''});
    });
  }else{
    const targetType=task.targetType==='students'?'student':task.targetType;
    const targetValue=targetType==='class'?task.className:(targetType==='student'?(task.studentNos[0]||task.targetValue||''):'all');
    payloads.push({...common,targetType,hedefTuru:targetType,targetValue,hedefDegeri:targetValue,studentNos:targetType==='student'?[targetValue]:task.studentNos,sinif:task.className||''});
  }
  const savedKeys=[];
  if(state.editingTaskKey){
    await putJson(`verianalizi001/haftalikGorevler/${state.editingTaskKey}`,payloads[0]);
    savedKeys.push(state.editingTaskKey);
  }else{
    for(const payload of payloads){
      const r=await postJson('verianalizi001/haftalikGorevler',payload);
      savedKeys.push(r.name);
    }
  }
  for(const key of savedKeys){
    const verify=await getJson(`verianalizi001/haftalikGorevler/${key}`);
    if(!verify) throw new Error('Firebase doğrulaması başarısız: kayıt görünmüyor. Realtime Database kurallarını kontrol edin.');
  }
  await logAction(state.editingTaskKey?'Görev güncelleme':'Görev kaydı',`${targetLabel(task)} için ${fmtDate(task.start)}-${fmtDate(task.end)} programı kaydedildi. Firebase key: ${savedKeys.join(', ')}`);
  state.editingTaskKey=null; await loadTasks(); setToast(`Görev Firebase'e kaydedildi: ${savedKeys.length} kayıt`,'ok'); resetWizardAfterSave(); render();
}

async function loadStats(studentNo,start,end){
  try{const root=await getJson(`verianalizi001/calismaKayitlari/${studentNo}`)||{}; let total=0,correct=0,wrong=0,empty=0,entryCount=0; const active=new Set(); const subjects={};
    for(const rec of Object.values(root)){if(!rec||typeof rec!=='object') continue; const date=rec.tarih||rec.date||rec.tarihSaat||''; if(!dateInRange(date,start,end)) continue; const lesson=rec.ders||rec.lesson||'Genel'; const t=Number(rec.toplam??rec.toplamSoru??rec.total??0); const w=Number(rec.yanlis??rec.wrong??0); const e=Number(rec.bos??rec.empty??0); const c=Number(rec.dogru??rec.correct??Math.max(0,t-w-e)); total+=t; correct+=c; wrong+=w; empty+=e; entryCount++; const iso=isoFromAny(date); if(iso) active.add(iso); if(!subjects[lesson]) subjects[lesson]={lesson,total:0,correct:0,wrong:0,empty:0}; subjects[lesson].total+=t; subjects[lesson].correct+=c; subjects[lesson].wrong+=w; subjects[lesson].empty+=e;}
    return {total,correct,wrong,empty,entryCount,activeDays:active.size,subjects:Object.values(subjects).sort((a,b)=>b.total-a.total)};
  }catch(e){return {total:0,correct:0,wrong:0,empty:0,entryCount:0,activeDays:0,subjects:[]};}
}
async function countEntries(start,end){try{const root=await getJson('verianalizi001/calismaKayitlari')||{}; let c=0; for(const obj of Object.values(root)){for(const rec of Object.values(obj||{})){const d=rec?.tarih||rec?.date||rec?.tarihSaat||''; if(dateInRange(d,start,end)) c++;}} return c;}catch(e){return 0;}}
async function loadFollowAlerts(start,end,mode='hafta'){
  if(!state.followClasses.length) return {configured:false,items:[]};
  const tracked=state.students.filter(s=>state.followClasses.includes(s.className)).slice(0,220);
  const items=[];
  for(const st of tracked){
    const s=await loadStats(st.no,start,end);
    if(s.entryCount===0) items.push({student:st,reason:mode==='gün'?'Bugün çalışma girişi yok':'Bu hafta veri girişi yok',level:'high'});
    else if(mode==='hafta' && s.total<50) items.push({student:st,reason:`Haftalık toplam düşük: ${s.total} soru`,level:'mid'});
    else if(mode==='gün' && s.total<20) items.push({student:st,reason:`Bugünkü çalışma düşük: ${s.total} soru`,level:'mid'});
  }
  return {configured:true,items};
}

function rangeSelectorHtml(){const r=state.range||weekRange(); return `<div class="chipbar" style="margin-bottom:10px"><button class="chip" data-range="today">Bugün</button><button class="chip" data-range="week">Bu hafta</button><button class="chip" data-range="month">Bu ay</button><button class="chip" data-range="last30">Son 30</button></div><div class="compact-grid"><div class="field"><label>Başlangıç</label><input id="rangeStart" type="date" class="input" value="${r.start}"></div><div class="field"><label>Bitiş</label><input id="rangeEnd" type="date" class="input" value="${r.end}"></div></div><button id="applyRange" class="secondary" style="margin-top:10px">Uygula</button><p class="muted tiny">Görünen tarih: ${fmtDate(r.start)} - ${fmtDate(r.end)}</p>`;}
function bindRangeSelector(){document.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>{const type=b.dataset.range; state.range=type==='today'?{title:'Bugün',start:todayISO(),end:todayISO()}:type==='week'?weekRange():type==='month'?monthRange():last30Range(); render();}); document.getElementById('applyRange')?.addEventListener('click',()=>{state.range={title:'Özel',start:document.getElementById('rangeStart').value,end:document.getElementById('rangeEnd').value}; render();});}

function studentPanelMessageHtml(st,stats,range){return `<p class="muted tiny">Mesaj öğrenci panelinde öğretmen adıyla birlikte görünür.</p><div class="chipbar"><button class="chip" data-msg-level="excellent">Çok pozitif</button><button class="chip" data-msg-level="positive">Pozitif</button><button class="chip" data-msg-level="normal">Normal</button><button class="chip" data-msg-level="high">Önemli uyarı</button></div><div class="field" style="margin-top:10px"><label>Başlık</label><input id="studentMsgTitle" class="input" value="Öğretmen Bilgilendirmesi"></div><div class="field" style="margin-top:10px"><label>Mesaj</label><textarea id="studentMsgText">${esc(buildStudentMsg('normal',st,stats,range))}</textarea></div><button id="sendStudentMsg" class="primary" style="margin-top:10px">Öğrenci Paneline Gönder</button>`;}

annel:ch,message}; renderConfirmBox();}catch(e){setToast(e.message,'error');}});}
function renderConfirmBox(){const box=document.getElementById('confirmBox'); if(!box||!state.draftConfirm) return; box.innerHTML=`<div class="confirm-panel"><b>Bu bildirimi gerçekten veliye gönderdiniz mi?</b><p class="muted tiny">Sadece “Gönderdim” derseniz Firebase veli bildirim geçmişine işlenecek. Hazırlanmış ama gönderilmemiş mesaj kayıt sayılmayacak.</p><div class="row"><button id="confirmSent" class="success-btn">Gönderdim, kaydet</button><button id="confirmNo" class="danger-btn">Göndermedim, kaydetme</button></div></div>`; document.getElementById('confirmSent').onclick=async()=>{try{await logParentNotification(state.draftConfirm.student,state.draftConfirm.channel,state.draftConfirm.message); state.draftConfirm=null; setToast('Veli bildirimi gönderildi olarak işlendi','ok'); render();}catch(e){setToast(e.message,'error');}}; document.getElementById('confirmNo').onclick=()=>{state.draftConfirm=null; box.innerHTML='<div class="empty">Mesaj gönderildi olarak kaydedilmedi.</div>';};}

function studentPickListHtml(list,selected){

function planHtml(w){const names=lessonNames(); let out=''; const weeks=Math.ceil(w.days/7); for(let week=0; week<weeks; week++){const start=week*7,end=Math.min(start+6,w.days-1); out+=`<div class="card" style="box-shadow:none;background:#fff"><h3>${week+1}. Hafta</h3><div class="grid">`; for(let d=start; d<=end; d++){const date=addDaysISO(w.start,d); const total=names.reduce((s,l)=>s+(Number(w.plan[planKey(d,l)])||0),0); out+=`<div class="day-card"><h4><span>${Days[d%7]} • ${fmtDate(date)}</span><span class="badge">${total} soru</span></h4><div class="lesson-grid">${names.map(l=>`<div class="field"><label>${esc(l)}</label><input class="input" inputmode="numeric" data-plan-key="${esc(planKey(d,l))}" value="${esc(w.plan[planKey(d,l)]||'')}"></div>`).join('')}</div></div>`;} out+=`</div></div>`;} return out;}
function teacherTasksHtml(){const own=state.tasks.filter(t=>state.teacher.isAdmin || cleanId(t.teacherId)===cleanId(state.teacher.id)); if(!own.length) return '<div class="empty">Henüz kayıtlı görevlendirme yok.</div>'; return own.slice(0,40).map(t=>`<div class="thin-item"><div class="row"><b>${esc(targetLabel(t))}</b><span class="badge">${fmtDate(t.start)}-${fmtDate(t.end)}</span><span class="spacer"></span><span class="muted tiny">${taskQuestionTotal(t)} soru</span></div><div class="muted tiny">Veren: ${esc(getTeacherName(t.teacherId))} • Firebase key: ${esc(t.key)}</div><div class="actions"><button class="secondary" data-edit-task="${esc(t.key)}">Düzenle</button><button class="danger-btn" data-del-task="${esc(t.key)}">Sil</button></div></div>`).join('');}
function bindTaskWizard(){
  document.querySelectorAll('input[name="targetMode"]').forEach(r=>r.onchange=()=>{state.taskWizard.targetType=r.value; renderTasks(document.getElementById('mainArea'));});
  document.getElementById('taskClass')?.addEventListener('change',e=>{state.taskWizard.className=e.target.value; updatePreviewLive();});
  document.getElementById('taskStart').onchange=e=>{state.taskWizard.start=e.target.value; renderTasks(document.getElementById('mainArea'));};
  document.getElementById('taskDays').onchange=e=>{state.taskWizard.days=Number(e.target.value); state.taskWizard.plan=resizePlan(state.taskWizard.plan,state.taskWizard.days); renderTasks(document.getElementById('mainArea'));};
  const drawStudentPick=()=>{
    const q=(document.getElementById('taskStudentSearch')?.value||'').toLocaleLowerCase('tr-TR');
    const cls=document.getElementById('studentClassFilter')?.value||'Tümü';
    const selected=[...document.querySelectorAll('.student-check:checked')].map(x=>x.value);
    state.taskWizard.studentNos=[...new Set([...state.taskWizard.studentNos,...selected])];
    const filtered=state.students.filter(s=>(cls==='Tümü'||s.className===cls)&&`${s.no} ${s.name} ${s.className}`.toLocaleLowerCase('tr-TR').includes(q));
    const box=document.getElementById('studentPickList'); if(box){box.innerHTML=studentPickListHtml(filtered,state.taskWizard.studentNos); bindStudentChecks();}

  document.querySelectorAll('[data-plan-key]').forEach(inp=>inp.oninput=()=>{state.taskWizard.plan[inp.dataset.planKey]=inp.value.replace(/\D/g,'').slice(0,4); inp.value=state.taskWizard.plan[inp.dataset.planKey]; updatePreviewLive();});

function bindStudentChecks(){document.querySelectorAll('.student-check').forEach(ch=>ch.onchange=()=>{const set=new Set(state.taskWizard.studentNos); if(ch.checked) set.add(ch.value); else set.delete(ch.value); state.taskWizard.studentNos=[...set]; updatePreviewLive();});}
function updatePreviewLive(){
  const w=state.taskWizard; if(!w) return;
  const task={...w,end:addDaysISO(w.start,w.days-1)};
  const count=studentsForTask(task).length;
  const total=Object.values(w.plan||{}).reduce((s,v)=>s+(Number(v)||0),0);
  const classCount=document.getElementById('classCount'); if(classCount) classCount.textContent=`${w.className||'-'} sınıfı ${count} öğrenciyi kapsıyor.`;
  const summary=document.getElementById('wizardTargetSummary'); if(summary) summary.textContent=`${targetLabel(task)} • ${count} öğrenci • ${fmtDate(w.start)} - ${fmtDate(addDaysISO(w.start,w.days-1))}`;
  const prev=document.getElementById('taskPreview'); if(prev) prev.innerHTML=`<p><b>Hedef:</b> ${esc(targetLabel(task))}</p><p><b>Öğrenci sayısı:</b> ${count}</p><p><b>Tarih:</b> ${fmtDate(w.start)} - ${fmtDate(addDaysISO(w.start,w.days-1))}</p><p><b>Program toplamı:</b> ${total} soru</p><p class="muted tiny">Kaydetmeden önce sistem aynı tarih aralığında aynı öğrenciye/sınıfa verilen başka görevleri kontrol eder.</p>`;
}
function bindTaskList(){document.querySelectorAll('[data-del-task]').forEach(b=>b.onclick=()=>deleteTask(b.dataset.delTask)); document.querySelectorAll('[data-edit-task]').forEach(b=>b.onclick=()=>{const t=state.tasks.find(x=>x.key===b.dataset.editTask); if(!t) return; state.editingTaskKey=t.key; state.taskWizard={targetType:t.targetType,className:t.className,studentNos:[...t.studentNos],start:t.start,days:t.days,plan:resizePlan(t.plan,t.days)}; renderTasks(document.getElementById('mainArea'));});}

    <div class="row"><button class="secondary" data-lesson-add>+ Ders Ekle</button><button class="ghost" id="resetLessons">Varsayılanı Yükle</button><button class="primary" id="saveLessons">Dersleri Firebase’e Kaydet</button></div>
    ${(state.lessons||[]).map((lesson,li)=>`<div class="lesson-card" data-lesson-card="${li}">
      <div class="compact-grid"><div class="field"><label>Ders adı</label><input class="input lesson-name" data-li="${li}" value="${esc(lesson.name||'')}"></div><div class="field"><label>İşlem</label><div class="row"><button class="secondary" data-topic-add="${li}">+ Ana Konu</button><button class="danger-btn" data-lesson-del="${li}">Dersi Sil</button></div></div></div>
      ${(lesson.topics||[]).map((topic,ti)=>`<div class="topic-card"><div class="compact-grid"><div class="field"><label>Ana konu</label><input class="input topic-name" data-li="${li}" data-ti="${ti}" value="${esc(topic.name||'')}"></div><div class="field"><label>Alt konu ekle</label><div class="row"><input class="input subtopic-new" data-li="${li}" data-ti="${ti}" placeholder="Alt konu adı"><button class="secondary" data-subtopic-add="${li}:${ti}">Ekle</button><button class="danger-btn" data-topic-del="${li}:${ti}">Sil</button></div></div></div><div class="subtopic-chips">${(topic.subtopics||[]).map((sub,si)=>`<span class="subtopic-chip">${esc(sub)} <button type="button" data-subtopic-del="${li}:${ti}:${si}">×</button></span>`).join('')||'<span class="muted tiny">Alt konu yok.</span>'}</div></div>`).join('')}
    </div>`).join('')||'<div class="empty">Henüz ders yok. Ders ekleyerek başlayın.</div>'}
  </div>`;
}
function bindLessonDesigner(){
  const sync=()=>{
    document.querySelectorAll('.lesson-name').forEach(inp=>{const li=Number(inp.dataset.li); if(state.lessons[li]) state.lessons[li].name=inp.value.trim();});
    document.querySelectorAll('.topic-name').forEach(inp=>{const li=Number(inp.dataset.li),ti=Number(inp.dataset.ti); if(state.lessons[li]?.topics?.[ti]) state.lessons[li].topics[ti].name=inp.value.trim();});
  };
  document.querySelector('[data-lesson-add]')?.addEventListener('click',()=>{sync(); state.lessons.push({name:'Yeni Ders',topics:[{name:'Yeni Ana Konu',subtopics:['Alt Konu']} ]}); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-lesson-del]').forEach(b=>b.onclick=()=>{sync(); state.lessons.splice(Number(b.dataset.lessonDel),1); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-topic-add]').forEach(b=>b.onclick=()=>{sync(); const li=Number(b.dataset.topicAdd); state.lessons[li].topics=state.lessons[li].topics||[]; state.lessons[li].topics.push({name:'Yeni Ana Konu',subtopics:[]}); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-topic-del]').forEach(b=>b.onclick=()=>{sync(); const [li,ti]=b.dataset.topicDel.split(':').map(Number); state.lessons[li].topics.splice(ti,1); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-subtopic-add]').forEach(b=>b.onclick=()=>{sync(); const [li,ti]=b.dataset.subtopicAdd.split(':').map(Number); const input=document.querySelector(`.subtopic-new[data-li="${li}"][data-ti="${ti}"]`); const val=(input?.value||'').trim(); if(!val){setToast('Alt konu adı yazın','error'); return;} state.lessons[li].topics[ti].subtopics=state.lessons[li].topics[ti].subtopics||[]; state.lessons[li].topics[ti].subtopics.push(val); renderAdmin(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-subtopic-del]').forEach(b=>b.onclick=()=>{sync(); const [li,ti,si]=b.dataset.subtopicDel.split(':').map(Number); state.lessons[li].topics[ti].subtopics.splice(si,1); renderAdmin(document.getElementById('mainArea'));});
  document.getElementById('resetLessons')?.addEventListener('click',()=>{state.lessons=structuredClone(DEFAULT_LESSONS); renderAdmin(document.getElementById('mainArea'));});
  document.getElementById('saveLessons')?.addEventListener('click',async()=>{try{sync(); state.lessons=state.lessons.filter(l=>l.name).map(l=>({...l,topics:(l.topics||[]).filter(t=>t.name)})); await saveLessons(); setToast('Dersler Firebase’e kaydedildi','ok'); render();}catch(e){setToast('Ders kaydı hatası: '+e.message,'error');}});
}
function renderAdmin(main){
  if(!state.teacher.isAdmin){main.innerHTML='<div class="empty">Admin yetkisi gerekli.</div>';return;}
  const classes=[...new Set(state.students.map(s=>s.className).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'tr'));
  const activeTeachers=state.teachers.length;
  const firebaseHealth=`<span class="badge health-ok">Firebase SDK aktif</span>`;
  main.innerHTML=`${section('Admin Merkezi','Kurum, takip, ders yapısı, Firebase uyumu ve öğretmen işlemleri')}
    <div class="grid four">
      <div class="admin-metric"><small>Öğrenci</small><strong>${state.students.length}</strong><span class="muted tiny">Sistemde görünen</span></div>
      <div class="admin-metric"><small>Öğretmen</small><strong>${activeTeachers}</strong><span class="muted tiny">Tanımlı kullanıcı</span></div>
      <div class="admin-metric"><small>Görev</small><strong>${state.tasks.length}</strong><span class="muted tiny">Firebase kayıtlı</span></div>
      <div class="admin-metric"><small>Bağlantı</small><strong style="font-size:18px">${firebaseHealth}</strong><span class="muted tiny">Realtime Database</span></div>
    </div>
    <div class="grid two" style="margin-top:14px">
      <div class="card"><h3>Kurum Ayarları</h3><div class="field"><label>Kurum adı</label><input id="setKurum" class="input" value="${esc(state.settings.kurumAdi)}"></div><div class="field" style="margin-top:10px"><label>Logo URL</label><input id="setLogo" class="input" value="${esc(state.settings.logoUrl)}"></div><div class="field" style="margin-top:10px"><label>Ders başına günlük giriş limiti</label><input id="setLimit" class="input" inputmode="numeric" value="${esc(state.settings.dailyLimit)}"></div><div class="row" style="margin-top:12px"><button id="saveSettings" class="primary">Ayarları Kaydet</button><button id="useEduIcon" class="secondary">Fenomen Logosunu Kullan</button></div><p class="muted tiny" style="margin-top:10px">Bu alan öğrenci panelindeki kurum adı, logo ve günlük giriş limitleriyle aynı Firebase yollarına kaydedilir.</p></div>
      <div class="card"><h3>Takip Edilecek Sınıflar</h3><p class="muted tiny">Sınıf seçilmezse günlük/haftalık uyarı listesi hiç gösterilmez.</p><div class="chipbar">${classes.map(c=>`<label class="chip ${state.followClasses.includes(c)?'active':''}"><input type="checkbox" class="follow-class" value="${esc(c)}" ${state.followClasses.includes(c)?'checked':''} hidden> ${esc(c)}</label>`).join('')||'<div class="empty">Sınıf verisi yok.</div>'}</div><button id="saveFollow" class="primary" style="margin-top:12px">Takip Ayarını Kaydet</button></div>
    </div>
    <div class="card" style="margin-top:14px"><h3>Dersleri Kur / Düzenle</h3><p class="muted tiny">Modern ders editörü: ders, ana konu ve alt konuları kart yapısıyla düzenler; kayıt hem öğretmen hem öğrenci panelinin okuyacağı Firebase yollarına yazılır.</p>${lessonDesignerHtml()}</div>
    <div class="card" style="margin-top:14px"><h3>Öğretmen İşlemleri ve Sistem Analizi</h3><p class="muted tiny">Görevler, veli bildirimleri ve öğrenci mesajları öğretmen bazında analiz edilir. Hatalı görevler admin tarafından silinebilir.</p><div id="adminOpsBox"><button id="loadOps" class="primary">Analizi Yükle</button></div></div>`;
  bindAdmin();
}
function bindAdmin(){
  document.getElementById('useEduIcon').onclick=()=>{document.getElementById('setLogo').value=DEFAULT_LOGO;};
  document.getElementById('saveSettings').onclick=async()=>{try{state.settings.kurumAdi=document.getElementById('setKurum').value.trim()||DEFAULT_KURUM; state.settings.logoUrl=document.getElementById('setLogo').value.trim()||DEFAULT_LOGO; state.settings.dailyLimit=Number(document.getElementById('setLimit').value)||3; await saveSettings(); setToast('Kurum ayarları kaydedildi','ok'); render();}catch(e){setToast(e.message,'error');}};
  document.querySelectorAll('.follow-class').forEach(ch=>ch.onchange=()=>{const set=new Set(state.followClasses); if(ch.checked) set.add(ch.value); else set.delete(ch.value); state.followClasses=[...set]; ch.closest('.chip').classList.toggle('active',ch.checked);});
  document.getElementById('saveFollow').onclick=async()=>{try{await saveFollowSettings(); setToast('Takip sınıfları kaydedildi','ok'); render();}catch(e){setToast(e.message,'error');}};
  bindLessonDesigner();
  document.getElementById('loadOps').onclick=loadAdminOperations;
}
async function loadAdminOperations(){
  const box=document.getElementById('adminOpsBox'); box.innerHTML='<span class="loader"></span> Analiz yükleniyor...';
  try{
    const [logs,notifications,msgs]=await Promise.all([
      getJson('verianalizi001/ogretmenIslemleri').catch(()=>({})),
      getJson('verianalizi001/veliBildirimGecmisi').catch(()=>({})),
      getJson('verianalizi001/ogrenciMesajlari').catch(()=>({}))
    ]);
    const byTeacher={};
    const recentLogs=Object.entries(logs||{}).map(([key,l])=>({key,...l})).sort((a,b)=>String(b.time||b.tarihSaat||'').localeCompare(String(a.time||a.tarihSaat||'')));
    for(const l of Object.values(logs||{})){const id=cleanId(l.ogretmenID||l.teacherId); if(!byTeacher[id]) byTeacher[id]={id,name:l.ogretmenAdi||l.teacherName||getTeacherName(id),actions:0}; byTeacher[id].actions++;}
    for(const stu of Object.values(notifications||{})) for(const n of Object.values(stu||{})){const id=cleanId(n.ogretmenID||n.teacherId); if(!byTeacher[id]) byTeacher[id]={id,name:n.ogretmenAdi||n.teacherName||getTeacherName(id),actions:0}; byTeacher[id].notifications=(byTeacher[id].notifications||0)+1;}
    for(const stu of Object.values(msgs||{})) for(const m of Object.values(stu||{})){const id=cleanId(m.ogretmenID||m.teacherId); if(!byTeacher[id]) byTeacher[id]={id,name:m.ogretmenAdi||m.teacherName||getTeacherName(id),actions:0}; byTeacher[id].studentMessages=(byTeacher[id].studentMessages||0)+1;}
    const teacherRows=Object.values(byTeacher).sort((a,b)=>(b.actions+b.notifications+b.studentMessages)-(a.actions+a.notifications+a.studentMessages)).map(x=>`<tr><td>${esc(x.name)}<br><span class="muted tiny">ID ${esc(x.id||'-')}</span></td><td>${x.actions||0}</td><td>${x.notifications||0}</td><td>${x.studentMessages||0}</td><td>${(x.actions||0)+(x.notifications||0)+(x.studentMessages||0)}</td></tr>`).join('');
    const taskRows=state.tasks.slice(0,60).map(t=>`<tr><td>${esc(getTeacherName(t.teacherId))}</td><td>${esc(targetLabel(t))}</td><td>${fmtDate(t.start)} - ${fmtDate(t.end)}</td><td>${taskQuestionTotal(t)} soru</td><td><button class="secondary" data-admin-edit-task="${esc(t.key)}">Düzenle</button> <button class="danger-btn" data-admin-del-task="${esc(t.key)}">Sil</button></td></tr>`).join('');
    const logRows=recentLogs.slice(0,30).map(l=>`<tr><td>${esc(l.time||l.tarihSaat||'')}</td><td>${esc(l.teacherName||l.ogretmenAdi||getTeacherName(l.teacherId||l.ogretmenID))}</td><td>${esc(l.type||'İşlem')}</td><td>${esc(l.detail||'')}</td></tr>`).join('');
    box.innerHTML=`${statsHtml([['Öğretmen',Object.keys(byTeacher).length,'İşlem yapan'],['Görev',state.tasks.length,'Kayıtlı'],['Veli Bildirimi',Object.values(byTeacher).reduce((s,x)=>s+(x.notifications||0),0),'Onaylı'],['Panel Mesajı',Object.values(byTeacher).reduce((s,x)=>s+(x.studentMessages||0),0),'Öğrenciye']])}
      <h3 style="margin-top:14px">Öğretmen Performans Özeti</h3><div class="table-wrap"><table class="table"><thead><tr><th>Öğretmen</th><th>İşlem</th><th>Veli Bildirimi</th><th>Panel Mesajı</th><th>Toplam</th></tr></thead><tbody>${teacherRows||'<tr><td colspan="5">Kayıt yok</td></tr>'}</tbody></table></div>
      <h3 style="margin-top:14px">Görev Kayıtları</h3><div class="table-wrap"><table class="table"><thead><tr><th>Öğretmen</th><th>Hedef</th><th>Tarih</th><th>Toplam</th><th>İşlem</th></tr></thead><tbody>${taskRows||'<tr><td colspan="5">Görev yok</td></tr>'}</tbody></table></div>
      <h3 style="margin-top:14px">Son İşlemler</h3><div class="table-wrap"><table class="table"><thead><tr><th>Tarih</th><th>Öğretmen</th><th>Tür</th><th>Detay</th></tr></thead><tbody>${logRows||'<tr><td colspan="4">İşlem yok</td></tr>'}</tbody></table></div>`;
    document.querySelectorAll('[data-admin-del-task]').forEach(b=>b.onclick=()=>deleteTask(b.dataset.adminDelTask));
    document.querySelectorAll('[data-admin-edit-task]').forEach(b=>b.onclick=()=>{const t=state.tasks.find(x=>x.key===b.dataset.adminEditTask); if(!t) return; state.editingTaskKey=t.key; state.taskWizard={targetType:t.targetType==='student'?'students':t.targetType,className:t.className,studentNos:studentsForTask(t),start:t.start,days:t.days,plan:{...t.plan}}; state.activeTab='tasks'; render();});
  }catch(e){box.innerHTML=`<div class="empty danger">${esc(e.message)}</div>`;}
}

bootstrap();
</script>
</body>
</html>
