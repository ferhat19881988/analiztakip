function buildTaskStudentReportBlock(a,index,total,ctx){
  const st=a.student;
  const positive=a.positives.length?a.positives.slice(0,3).map(x=>`• ${x}`).join('\n'):'• Bu dönem için olumlu değerlendirme yapacak kadar çalışma görünmüyor.';
  const attention=a.attention.length?a.attention.slice(0,4).map(x=>`• ${x}`).join('\n'):'• Şu anda belirgin bir takip ihtiyacı görünmüyor.';
  const dayText=a.days.map(d=>{
    const lessonText=d.lessonRows.map(x=>`${x.lesson}: ${x.done}/${x.target} ${x.status==='done'?'✅':x.status==='partial'?'⚠️':'❌'}`).concat(d.extraLessons.map(x=>`${x.lesson}: ${x.total} ek soru`)).join(' • ');
    const topicLines=d.topicRows.map(x=>{
      const path=[x.lesson,x.topic,x.subtopic].filter(v=>String(v||'').trim() && String(v||'').trim()!=='Genel').join(' / ')||x.lesson;
      return `  - ${path}: ${x.total} soru • ${x.correct} doğru / ${x.wrong} yanlış / ${x.empty} boş`;
    }).join('\n');
    const resultLine=d.doneTotal?`• Sonuç: ${d.correct} doğru / ${d.wrong} yanlış / ${d.empty} boş • Başarı %${d.accuracy}`:'• Bu gün için çalışma görünmüyor.';
    return `${taskReportStatusEmoji(d.statusKey)} *${fmtDateWithDay(d.day)} — ${taskReportStatusLabel(d.statusKey)}*\n• Görev: ${d.credited}/${d.targetTotal} soru tamamlandı • Toplam çözüm: ${d.doneTotal}\n${resultLine}\n• Dersler: ${lessonText||'Görev bulunmuyor.'}${topicLines?`\n• Konular:\n${topicLines}`:''}`;
  }).join('\n\n')||'• Henüz gerçekleşen görev günü bulunmuyor.';
  const lessonText=(a.stats.subjects||[]).length?a.stats.subjects.map(x=>`• *${x.lesson}:* ${x.total} soru • ${x.correct} doğru / ${x.wrong} yanlış / ${x.empty} boş • Başarı %${reportPct(x.correct,x.total)}`).join('\n'):'• Derslere göre çalışma görünmüyor.';
  const offTargetText=a.offTargetRecords.length?`\n\n➕ *Görev günleri dışında yapılan ek çalışma:* ${a.offTargetTotal} soru\n${[...new Set(a.offTargetRecords.map(r=>r.date))].sort().map(day=>taskReportGroupRecords(a.offTargetRecords.filter(r=>r.date===day)).map(x=>{const path=[x.lesson,x.topic,x.subtopic].filter(v=>String(v||'').trim() && String(v||'').trim()!=='Genel').join(' / ')||x.lesson; return `• ${fmtDate(day)} — ${path}: ${x.total} soru • ${x.correct} doğru / ${x.wrong} yanlış / ${x.empty} boş`;}).join('\n')).join('\n')}`:'';
  const strongest=a.strongestTopic?`${a.strongestTopic.lesson} / ${a.strongestTopic.topic} — Başarı %${a.strongestTopic.pct}`:(a.strongestLesson?`${a.strongestLesson.lesson} — Başarı %${a.strongestLesson.pct}`:'Henüz karşılaştırma yapacak kadar soru çözülmemiş.');
  const weakest=a.weakestTopic?`${a.weakestTopic.lesson} / ${a.weakestTopic.topic} — Başarı %${a.weakestTopic.pct}`:(a.weakestLesson?`${a.weakestLesson.lesson} — Başarı %${a.weakestLesson.pct}`:'Henüz karşılaştırma yapacak kadar soru çözülmemiş.');
  const trendLine=a.trend.label?`\n• Çalışma gidişatı: *${a.trend.label.replace(/\.$/,'')}*`:'';
  return `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n👤 *${index+1}/${total} — ${st.name}*\n🏷️ *Sınıf / No:* ${st.className||'-'} / ${st.no}\n\nSayın Velimiz, merhaba. 👋\n*${st.name}* öğrencimizin ${fmtDate(ctx.start)} - ${fmtDate(ctx.end)} tarihleri arasındaki görev durumu aşağıdadır.\n\n📌 *KISA ÖZET*\n• Görev günleri: *${a.completedDays} tamamlandı / ${a.partialDays} eksik / ${a.missingDays} çalışma görünmüyor*\n• Görev durumu: *${a.credited}/${a.targetTotal} soru tamamlandı — %${a.completionPct}*\n• Toplam çözülen: *${a.stats.total} soru*\n• Doğru / Yanlış / Boş: *${a.stats.correct} / ${a.stats.wrong} / ${a.stats.empty}*\n• Genel başarı: *%${a.accuracy}*${trendLine}\n\n✅ *İYİ GİDENLER*\n${positive}\n\n📍 *ÜZERİNDE DURULMASI GEREKENLER*\n${attention}\n\n🌟 *En güçlü olduğu alan:* ${strongest}\n🛠️ *Tekrar etmesi faydalı olacak alan:* ${weakest}\n\n🗓️ *GÜN GÜN ÇALIŞMA DURUMU*\n\n${dayText}${offTargetText}\n\n📚 *DERSLERE GÖRE GENEL DURUM*\n${lessonText}\n\n📌 *Not:* Bu raporda sisteme işlenen çalışmalar yer almaktadır.\n\nBilginize sunar, iyi günler dileriz.\n*${state.settings.kurumAdi}*\n`;
}
function buildTaskStudentReportText(task,analyses,ctx){
  return `👥 *ÖĞRENCİ GÖREV RAPORLARI*\n\n🎯 *Görev:* ${targetLabel(task)}\n🗓️ *Tarih aralığı:* ${fmtDate(ctx.start)} - ${fmtDate(ctx.end)}\n⏱️ *Rapor zamanı:* ${ctx.moment.text}\n👨‍🏫 *Öğretmen:* ${getTeacherName(task.teacherId)}\n📌 Her öğrenci ayrı bir bölümde yer almaktadır. İlgili bölüm doğrudan WhatsApp’a kopyalanabilir.\n\n${analyses.map((a,i)=>buildTaskStudentReportBlock(a,i,analyses.length,ctx)).join('\n\n')}\n`;
}
async function downloadTaskReport(taskKey,reportType,button){
  const task=state.tasks.find(x=>x.key===taskKey);
  if(!task){setToast('Görev bulunamadı.','error'); return;}
  const isGeneral=reportType==='general';
  const reportName=isGeneral?'Genel rapor':'Öğrenci raporu';
  const momentDate=new Date();
  const moment=reportMomentInfo(momentDate);
  const start=isoFromAny(task.start);
  const end=taskReportEffectiveEnd(task,momentDate);
  if(!start){setToast('Görevin başlangıç tarihi geçersiz.','error'); return;}
  if(start>end){setToast(`Bu görev henüz başlamadı. Başlangıç: ${fmtDate(start)}`,'error'); return;}
  const studentNos=studentsForTask(task).map(cleanId);
  const students=studentNos.map(no=>state.students.find(s=>cleanId(s.no)===no)||{no,name:`Öğrenci ${no}`,className:task.className||''});
  if(!students.length){setToast('Bu görev için raporlanacak öğrenci bulunamadı.','error'); return;}
  const oldText=button?.innerHTML;
  if(button){button.disabled=true; button.innerHTML='<span class="loader"></span>Hazırlanıyor';}
  setToast(`${reportName} hazırlanıyor...`);
  try{
    const dayContext=taskReportDayContext(task,start,end);
    const plannedEnd=isoFromAny(task.end)||end;
    const totalPlannedDays=taskDayKeys(task).filter(day=>day>=start && day<=plannedEnd).length;
    const freshStats=await Promise.all(students.map(student=>loadStats(student.no,start,end,{force:true,endDate:end,endTime:moment.time})));
    const analyses=students.map((student,index)=>buildTaskReportStudentAnalysis(task,student,freshStats[index],dayContext))
      .sort((a,b)=>String(a.student.className||'').localeCompare(String(b.student.className||''),'tr',{numeric:true})||String(a.student.name||'').localeCompare(String(b.student.name||''),'tr'));
    const ctx={start,end,moment,dayContext,totalPlannedDays};
    const period=`${reportDateFilePart(start)}_${reportDateFilePart(end)}_${moment.fileTime}`;
    if(isGeneral){
      downloadUtf8Text(`GENEL_GOREV_RAPORU_${period}.txt`,buildTaskGeneralReportText(task,analyses,ctx));
    }else{
      downloadUtf8Text(`OGRENCI_GOREV_RAPORLARI_${period}.txt`,buildTaskStudentReportText(task,analyses,ctx));
    }
    await logAction('Görev raporu',`${targetLabel(task)} için ${fmtDate(start)}-${fmtDate(end)} aralığında ${reportName.toLocaleLowerCase('tr-TR')} indirildi.`);
    setToast(`${reportName} indirildi.`,'ok');
  }catch(e){
    console.error('Görev raporu hatası:',e);
    setToast('Rapor hazırlanamadı: '+(e?.message||e),'error');
  }finally{
    if(button){button.disabled=false; button.innerHTML=oldText||(isGeneral?'📊 Genel Raporu İndir':'👥 Öğrenci Raporunu İndir');}
  }
}

function teacherTaskCardHtml(t,isPast=false){
  return `<div class="teacher-task-card ${isPast?'past':''}"><div><h4>${esc(targetLabel(t))}</h4><div class="task-card-meta"><span class="badge ${isPast?'':'green'}">${fmtDate(t.start)}-${fmtDate(t.end)}</span><span class="badge">${taskQuestionTotal(t)} soru</span></div><div class="muted tiny">Veren: ${esc(getTeacherName(t.teacherId))}</div></div><div class="actions"><button class="secondary" data-edit-task="${esc(t.key)}">Düzenle</button><button class="danger-btn" data-del-task="${esc(t.key)}">Sil</button><button class="task-report-btn general-report-btn" data-report-general-task="${esc(t.key)}">📊 Genel Raporu İndir</button><button class="task-report-btn student-report-btn" data-report-students-task="${esc(t.key)}">👥 Öğrenci Raporunu İndir</button></div></div>`;
}
function teacherTasksHtml(){
  const own=state.tasks.filter(t=>state.teacher.isAdmin || cleanId(t.teacherId)===cleanId(state.teacher.id));
  if(!own.length) return '<div class="empty">Henüz kayıtlı görevlendirme yok.</div>';
  const today=todayISO();
  const current=own.filter(t=>!t.end || t.end>=today).slice(0,60);
  const past=own.filter(t=>t.end && t.end<today).slice(0,80);
  return `<div class="teacher-task-section"><div><h4 style="margin:0 0 8px;color:var(--ink)">Güncel Verdiğim Görevler</h4>${current.length?`<div class="teacher-task-grid">${current.map(t=>teacherTaskCardHtml(t,false)).join('')}</div>`:'<div class="empty">Güncel görev yok.</div>'}</div><div><h4 style="margin:10px 0 8px;color:var(--ink)">Geçmiş Görevler</h4>${past.length?`<div class="teacher-task-grid">${past.map(t=>teacherTaskCardHtml(t,true)).join('')}</div>`:'<div class="empty">Geçmiş görev yok.</div>'}</div></div>`;
}
function syncTaskWizardFromDom(){
  if(!state.taskWizard) return;
  const w=state.taskWizard;
  const mode=document.querySelector('input[name="targetMode"]:checked')?.value; if(mode) w.targetType=mode;
  const cls=document.getElementById('taskClass')?.value; if(cls!==undefined && cls!==null && cls!=='') w.className=cls;
  const start=document.getElementById('taskStart')?.value; if(start) w.start=start;
  const days=document.getElementById('taskDays')?.value; if(days && days!=='manual'){w.days=Number(days); w.plan=resizePlan(w.plan,w.days);}
  const manualEnd=document.getElementById('taskEndManual')?.value; if(manualEnd) setTaskWizardEndDate(manualEnd);
  const checked=[...document.querySelectorAll('.student-check:checked')].map(x=>cleanId(x.value));
  if(checked.length || document.getElementById('studentPickList')) w.studentNos=[...new Set([...(w.studentNos||[]),...checked])].filter(Boolean);
  document.querySelectorAll('[data-plan-key]').forEach(inp=>{const v=String(inp.value||'').replace(/\D/g,'').slice(0,4); if(v && v!=='0') w.plan[inp.dataset.planKey]=v; else delete w.plan[inp.dataset.planKey];});
}
function bindTaskWizard(){
  document.querySelectorAll('[data-wizard-jump]').forEach(b=>b.onclick=()=>{syncTaskWizardFromDom(); state.taskWizardStep=Number(b.dataset.wizardJump); renderTasks(document.getElementById('mainArea'));});
  document.querySelector('[data-wizard-next]')?.addEventListener('click',()=>{syncTaskWizardFromDom(); state.taskWizardStep=Math.min(4,(state.taskWizardStep||1)+1); renderTasks(document.getElementById('mainArea'));});
  document.querySelector('[data-wizard-prev]')?.addEventListener('click',()=>{syncTaskWizardFromDom(); state.taskWizardStep=Math.max(1,(state.taskWizardStep||1)-1); renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('input[name="targetMode"]').forEach(r=>r.onchange=()=>{state.taskWizard.targetType=r.value; state.taskWizard.studentNos=state.taskWizard.studentNos||[]; renderTasks(document.getElementById('mainArea'));});
  document.getElementById('taskClass')?.addEventListener('change',e=>{state.taskWizard.className=e.target.value; updatePreviewLive();});
  document.getElementById('taskStart')?.addEventListener('change',e=>{state.taskWizard.start=e.target.value; renderTasks(document.getElementById('mainArea'));});
  document.getElementById('taskDays')?.addEventListener('change',e=>{if(e.target.value==='manual'){openManualEndPicker(); return;} state.taskWizard.days=Number(e.target.value); state.taskWizard.plan=resizePlan(state.taskWizard.plan,state.taskWizard.days); renderTasks(document.getElementById('mainArea'));});
  document.getElementById('taskEndManual')?.addEventListener('change',e=>{if(setTaskWizardEndDate(e.target.value)) renderTasks(document.getElementById('mainArea'));});
  document.querySelector('[data-open-end-picker]')?.addEventListener('click',openManualEndPicker);
  const drawStudentPick=()=>{const q=(document.getElementById('taskStudentSearch')?.value||'').toLocaleLowerCase('tr-TR'); const cls=document.getElementById('studentClassFilter')?.value||'Tümü'; const selected=[...document.querySelectorAll('.student-check:checked')].map(x=>cleanId(x.value)); state.taskWizard.studentNos=[...new Set([...(state.taskWizard.studentNos||[]),...selected])].filter(Boolean); const filtered=state.students.filter(s=>(cls==='Tümü'||s.className===cls)&&`${s.no} ${s.name} ${s.className}`.toLocaleLowerCase('tr-TR').includes(q)); const box=document.getElementById('studentPickList'); if(box){box.innerHTML=studentPickListHtml(filtered,state.taskWizard.studentNos); bindStudentChecks();} updateSelectedCount();};
  document.getElementById('taskStudentSearch')?.addEventListener('input',drawStudentPick);
  document.getElementById('studentClassFilter')?.addEventListener('change',drawStudentPick);
  bindStudentChecks();
  document.querySelector('[data-copy-last-program]')?.addEventListener('click',()=>{syncTaskWizardFromDom(); if(copyLastStudentProgramToWizard()) renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-template]').forEach(b=>b.onclick=()=>{syncTaskWizardFromDom(); const t=b.dataset.template; if(t==='clear') state.taskWizard.plan=defaultPlan(state.taskWizard.days); else if(t==='copyWeek') state.taskWizard.plan=copyFirstWeek(state.taskWizard.plan,state.taskWizard.days); else if(t==='weekendOff') state.taskWizard.plan=clearWeekends(state.taskWizard.plan,state.taskWizard.days); else if(t==='bulkAdd10') state.taskWizard.plan=addToEveryPlanDay(state.taskWizard.plan,state.taskWizard.days,10); else if(t==='bulkAdd20') state.taskWizard.plan=addToEveryPlanDay(state.taskWizard.plan,state.taskWizard.days,20); else if(t==='bulkAdd30') state.taskWizard.plan=addToEveryPlanDay(state.taskWizard.plan,state.taskWizard.days,30); else state.taskWizard.plan=applyTemplate(state.taskWizard.plan,state.taskWizard.days,t); renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-day-add]').forEach(b=>b.onclick=()=>{syncTaskWizardFromDom(); state.taskWizard.plan=addToPlanDay(state.taskWizard.plan,Number(b.dataset.dayAdd),Number(b.dataset.delta||0)); renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-day-clear]').forEach(b=>b.onclick=()=>{syncTaskWizardFromDom(); state.taskWizard.plan=clearPlanDay(state.taskWizard.plan,Number(b.dataset.dayClear)); renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-day-copy]').forEach(b=>b.onclick=()=>{syncTaskWizardFromDom(); copyPlanDayToClipboard(Number(b.dataset.dayCopy)); renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-day-paste]').forEach(b=>b.onclick=()=>{syncTaskWizardFromDom(); if(pastePlanDayFromClipboard(Number(b.dataset.dayPaste))) renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-lesson-clear]').forEach(b=>b.onclick=()=>{syncTaskWizardFromDom(); state.taskWizard.plan=clearPlanKey(state.taskWizard.plan,b.dataset.lessonClear); renderTasks(document.getElementById('mainArea'));});
  document.querySelectorAll('[data-plan-key]').forEach(inp=>inp.oninput=()=>{const v=inp.value.replace(/\D/g,'').slice(0,4); if(v && v!=='0') state.taskWizard.plan[inp.dataset.planKey]=v; else delete state.taskWizard.plan[inp.dataset.planKey]; inp.value=v; updatePreviewLive();});
  document.getElementById('saveTask')?.addEventListener('click',async()=>{try{syncTaskWizardFromDom(); document.getElementById('taskStatus').textContent='Kaydediliyor...'; await saveTaskFromWizard();}catch(e){const el=document.getElementById('taskStatus'); if(el) el.textContent=''; setToast(e.message,'error');}});
  document.getElementById('cancelEdit')?.addEventListener('click',()=>resetWizardAfterSave());
  updatePreviewLive(); updateSelectedCount();
}
function updateSelectedCount(){const el=document.getElementById('selectedCount'); if(el) el.textContent=`Seçili öğrenci: ${(state.taskWizard?.studentNos||[]).length}`;}
function bindStudentChecks(){document.querySelectorAll('.student-check').forEach(ch=>ch.onchange=()=>{const set=new Set((state.taskWizard.studentNos||[]).map(cleanId)); if(ch.checked) set.add(cleanId(ch.value)); else set.delete(cleanId(ch.value)); state.taskWizard.studentNos=[...set]; ch.closest('.student-option')?.classList.toggle('selected',ch.checked); updateSelectedCount(); updatePreviewLive();});}
function updatePlanDayTotalsLive(){
  const w=state.taskWizard; if(!w) return;
  const names=lessonNames();
  document.querySelectorAll('.plan-day-card[data-day-index]').forEach(card=>{
    const d=Number(card.dataset.dayIndex);
    const total=names.reduce((s,l)=>s+(Number(w.plan?.[planKey(d,l)]||0)||0),0);
    const filled=names.filter(l=>Number(w.plan?.[planKey(d,l)]||0)>0).length;
    const badge=card.querySelector('.question-total-badge');
    if(badge) badge.textContent=`${total} soru`;
    const filledEl=card.querySelector('[data-day-filled]');
    if(filledEl) filledEl.textContent=`${filled}/${names.length} ders dolu`;
  });
}
function updatePreviewLive(){
  const w=state.taskWizard; if(!w) return;
  const task={...w,end:taskWizardEndDate(w)};
  const count=studentsForTask(task).length;
  const total=Object.values(w.plan||{}).reduce((s,v)=>s+(Number(v)||0),0);
  updatePlanDayTotalsLive();
  const classCount=document.getElementById('classCount'); if(classCount) classCount.textContent=`${w.className||'-'} sınıfı ${count} öğrenciyi kapsıyor.`;
  const summary=document.getElementById('wizardTargetSummary'); if(summary) summary.textContent=`${targetLabel(task)} • ${count} öğrenci • ${fmtDate(w.start)} - ${fmtDate(task.end)} • ${w.days} gün`;
  const prev=document.getElementById('taskPreview'); if(prev) prev.innerHTML=`<p><b>Hedef:</b> ${esc(targetLabel(task))}</p><p><b>Öğrenci sayısı:</b> ${count}</p><p><b>Tarih:</b> ${fmtDate(w.start)} - ${fmtDate(task.end)} (${w.days} gün)</p><p><b>Program toplamı:</b> ${total} soru</p><p class="muted tiny">Aynı tarihlerde aynı öğrenciye verilmiş başka program varsa kayıt engellenir.</p>`;
}
function bindTaskList(){document.querySelectorAll('[data-del-task]').forEach(b=>b.onclick=()=>deleteTask(b.dataset.delTask)); document.querySelectorAll('[data-edit-task]').forEach(b=>b.onclick=()=>{const t=state.tasks.find(x=>x.key===b.dataset.editTask); if(!t) return; state.editingTaskKey=t.key; state.taskWizard={targetType:t.targetType==='student'?'students':t.targetType,className:t.className,studentNos:studentsForTask(t),start:t.start,days:t.days,plan:resizePlan(t.plan,t.days)}; state.taskWizardStep=1; renderTasks(document.getElementById('mainArea'));}); document.querySelectorAll('[data-report-general-task]').forEach(b=>b.onclick=()=>downloadTaskReport(b.dataset.reportGeneralTask,'general',b)); document.querySelectorAll('[data-report-students-task]').forEach(b=>b.onclick=()=>downloadTaskReport(b.dataset.reportStudentsTask,'students',b));}


function lessonDesignerHtml(){
  const lessons=state.lessons||[];
  if(!lessons.length){state.lessonDesignerTab=0;}
  const active=Math.max(0,Math.min(Number(state.lessonDesignerTab||0),Math.max(0,lessons.length-1)));
  state.lessonDesignerTab=active;
  const lesson=lessons[active];
  const tabbar=lessons.length?`<div class="lesson-tabbar">${lessons.map((l,li)=>`<button type="button" class="lesson-tab-btn ${li===active?'active':''}" data-lesson-tab="${li}">${esc(l.name||('Ders '+(li+1)))}</button>`).join('')}</div>`:'';
  const activeCard=lesson?`<div class="lesson-active-note"><span>Aktif ders: ${esc(lesson.name||('Ders '+(active+1)))}</span><span>${(lesson.topics||[]).length} ana konu</span></div><div class="lesson-card" data-lesson-card="${active}">

      ${(lesson.topics||[]).map((topic,ti)=>`<div class="topic-card"><div class="compact-grid"><div class="field"><label>Ana konu</label><input class="input topic-name" data-li="${active}" data-ti="${ti}" value="${esc(topic.name||'')}"></div><div class="field"><label>Alt konu ekle</label><div class="row"><input class="input subtopic-new" data-li="${active}" data-ti="${ti}" placeholder="Alt konu adı"><button class="secondary" data-subtopic-add="${active}:${ti}">Ekle</button><button class="danger-btn" data-topic-del="${active}:${ti}">Sil</button></div></div></div><div class="subtopic-chips">${(topic.subtopics||[]).map((sub,si)=>`<span class="subtopic-chip">${esc(sub)} <button type="button" data-subtopic-del="${active}:${ti}:${si}">×</button></span>`).join('')||'<span class="muted tiny">Alt konu yok.</span>'}</div></div>`).join('')}

    <div class="row"><button class="secondary" data-lesson-add>+ Ders Ekle</button><button class="ghost" id="resetLessons">Varsayılanı Yükle</button><button class="primary" id="saveLessons">Dersleri Firebase’e Kaydet</button></div>
    ${tabbar}${activeCard}
  </div>`;
}

    document.querySelectorAll('.topic-name').forEach(inp=>{const li=Number(inp.dataset.li),ti=Number(inp.dataset.ti); if(state.lessons[li]?.topics?.[ti]) state.lessons[li].topics[ti].name=inp.value.trim();});

async function deleteProgramFirebasePaths(){
  if(!state.teacher?.isAdmin){setToast('Bu işlem için admin yetkisi gerekli.','error');return;}
  const dbBase=(document.getElementById('sysDbBase')?.value.trim()||getDbBase()).replace(/\/+$/,'');
  if(!dbBase){setToast('Database URL boş olduğu için işlem durduruldu.','error');return;}
  const paths=[...PROGRAM_FIREBASE_DELETE_PATHS];
  const ok=confirm(`DİKKAT!\n\n${dbBase} adresinde yalnızca bu programın Firebase kayıt klasörleri silinecek.\n\nSilinecek klasörler:\n- ${paths.join('\n- ')}\n\nFirebase kökü ve bu listenin dışındaki yollar silinmeyecek. Devam etmek istiyor musunuz?`);
  if(!ok) return;
  const typed=prompt('Silme işlemini başlatmak için kutuya aynen şunu yazın: VERİ SİL');
  if(typed !== 'VERİ SİL'){setToast('Program klasörü silme işlemi iptal edildi. Doğrulama metni eşleşmedi.','error');return;}
  const finalOk=confirm('Son onay: Sadece listelenen program klasörleri silinecek. Bu listenin dışındaki Firebase verileri korunacak. Emin misiniz?');
  if(!finalOk) return;
  const deleted=[];
  const failed=[];
  try{
    setToast('Program Firebase klasörleri siliniyor...');
    for(const p of paths){
      try{
        await deleteJsonAtDbBase(dbBase,p);
        deleted.push(p);
      }catch(err){
        failed.push(`${p}: ${err.message}`);
      }
    }
    if(failed.length){
      console.error('Silinemeyen Firebase klasörleri:', failed);
      setToast(`Bazı klasörler silinemedi: ${failed.length}. Konsolu kontrol edin.`,'error');
      return;
    }
    state.tasks=[];
    state.followClasses=[];
    state.adminOpsMap={};
    state.statsCache={};
    state.selectedStudent=null;
    state.settings={kurumAdi:DEFAULT_KURUM,logoUrl:DEFAULT_LOGO,dailyLimit:3};
    state.systemSettings={firebaseEnabled:true,sheetsEnabled:true,smsEnabled:true,smsSignature:'Fenomen',smsPrefix:'',autoRefreshSeconds:45,sheetId:SHEET_ID,dbBase:DB_BASE,firebaseConfig:{...FIREBASE_CONFIG}};
    state.lessons=structuredClone(DEFAULT_LESSONS);
    closeModal();
    setToast(`${deleted.length} program Firebase klasörü silindi. Veritabanındaki diğer yollar korunmuştur.`,'ok');
    render();
  }catch(e){setToast('Program klasörlerini silme hatası: '+e.message,'error');}
}

async function loadAdminOperations(){
  const box=document.getElementById('adminOpsBox'); box.innerHTML='<span class="loader"></span> Analiz yükleniyor...';
  try{
    state.adminOpsMap={};
    const [logs,notifications,msgs]=await Promise.all([
      getJson('verianalizi001/ogretmenIslemleri').catch(()=>({})),
      getJson('verianalizi001/veliBildirimGecmisi').catch(()=>({})),
      getJson('verianalizi001/ogrenciMesajlari').catch(()=>({}))
    ]);
    const byTeacher={};
    const recentLogs=Object.entries(logs||{}).map(([key,l])=>({key,...l})).sort((a,b)=>String(b.time||b.tarihSaat||'').localeCompare(String(a.time||a.tarihSaat||'')));
    const notifyRows=[];
    Object.entries(notifications||{}).forEach(([studentNo,obj])=>Object.entries(obj||{}).forEach(([key,n])=>notifyRows.push({studentNo,key,...n})));
    const messageRows=[];
    Object.entries(msgs||{}).forEach(([studentNo,obj])=>Object.entries(obj||{}).forEach(([key,m])=>messageRows.push({studentNo,key,...m})));
    for(const l of Object.values(logs||{})){const id=cleanId(l.ogretmenID||l.teacherId); if(!byTeacher[id]) byTeacher[id]={id,name:l.ogretmenAdi||l.teacherName||getTeacherName(id),actions:0,notifications:0,studentMessages:0}; byTeacher[id].actions++;}
    for(const n of notifyRows){const id=cleanId(n.ogretmenID||n.teacherId); if(!byTeacher[id]) byTeacher[id]={id,name:n.ogretmenAdi||n.teacherName||getTeacherName(id),actions:0,notifications:0,studentMessages:0}; byTeacher[id].notifications++;}
    for(const m of messageRows){const id=cleanId(m.ogretmenID||m.teacherId); if(!byTeacher[id]) byTeacher[id]={id,name:m.ogretmenAdi||m.teacherName||getTeacherName(id),actions:0,notifications:0,studentMessages:0}; byTeacher[id].studentMessages++;}
    const teacherRows=Object.values(byTeacher).sort((a,b)=>((b.actions||0)+(b.notifications||0)+(b.studentMessages||0))-((a.actions||0)+(a.notifications||0)+(a.studentMessages||0))).map(x=>`<tr><td>${esc(x.name)}<br><span class="muted tiny">ID ${esc(x.id||'-')}</span></td><td>${x.actions||0}</td><td>${x.notifications||0}</td><td>${x.studentMessages||0}</td><td>${(x.actions||0)+(x.notifications||0)+(x.studentMessages||0)}</td></tr>`).join('');
    const taskRows=state.tasks.slice(0,80).map(t=>{const id=registerAdminRecord('Görev Kaydı',`verianalizi001/haftalikGorevler/${t.key}`,t); return `<tr class="admin-row-click"><td onclick="openAdminRecord('${id}')">${esc(getTeacherName(t.teacherId))}</td><td onclick="openAdminRecord('${id}')">${esc(targetLabel(t))}</td><td>${fmtDate(t.start)} - ${fmtDate(t.end)}</td><td>${taskQuestionTotal(t)} soru</td><td><div class="record-actions"><input class="bulk-check" type="checkbox" data-admin-select data-scope="generic" value="${id}"><button class="secondary" data-rec-detail="${id}">Detay</button><button class="secondary" data-admin-edit-task="${esc(t.key)}">Düzenle</button><button class="danger-btn" data-admin-del-task="${esc(t.key)}">Sil</button></div></td></tr>`;}).join('');
    const logRows=recentLogs.slice(0,60).map(l=>{const id=registerAdminRecord('Öğretmen İşlem Kaydı',`verianalizi001/ogretmenIslemleri/${l.key}`,l); return `<tr class="admin-row-click"><td onclick="openAdminRecord('${id}')">${esc(l.time||l.tarihSaat||'')}</td><td>${esc(l.teacherName||l.ogretmenAdi||getTeacherName(l.teacherId||l.ogretmenID))}</td><td>${esc(l.type||'İşlem')}</td><td>${esc(l.detail||'')}</td><td>${adminActionButtons(id)}</td></tr>`;}).join('');
    const notificationHtml=notifyRows.sort((a,b)=>String(b.tarihSaat||'').localeCompare(String(a.tarihSaat||''))).slice(0,50).map(n=>{const st=state.students.find(s=>s.no===cleanId(n.studentNo)); const id=registerAdminRecord('Veli Bildirim Kaydı',`verianalizi001/veliBildirimGecmisi/${n.studentNo}/${n.key}`,n); return `<tr class="admin-row-click"><td onclick="openAdminRecord('${id}')">${esc(n.tarihSaat||'')}</td><td>${esc(st?.name||n.studentNo)}</td><td>${esc(n.kanal||'-')}</td><td>${esc(n.ogretmenAdi||getTeacherName(n.ogretmenID||n.teacherId))}</td><td>${adminActionButtons(id)}</td></tr>`;}).join('');
    const messageHtml=messageRows.sort((a,b)=>String(b.tarihSaat||'').localeCompare(String(a.tarihSaat||''))).slice(0,50).map(m=>{const st=state.students.find(s=>s.no===cleanId(m.studentNo)); const id=registerAdminRecord('Öğrenci Panel Mesajı',`verianalizi001/ogrenciMesajlari/${m.studentNo}/${m.key}`,m); return `<tr class="admin-row-click"><td onclick="openAdminRecord('${id}')">${esc(m.tarihSaat||m.tarih||'')}</td><td>${esc(st?.name||m.studentNo)}</td><td>${esc(m.baslik||'Mesaj')}</td><td>${esc(m.ogretmenAdi||getTeacherName(m.ogretmenID||m.teacherId))}</td><td>${adminActionButtons(id)}</td></tr>`;}).join('');
    box.innerHTML=`${statsHtml([['Öğretmen',Object.keys(byTeacher).length,'İşlem yapan'],['Görev',state.tasks.length,'Kayıtlı'],['Veli Bildirimi',notifyRows.length,'Onaylı'],['Panel Mesajı',messageRows.length,'Öğrenciye']])}<div class="bulk-toolbar"><button class="danger-btn" data-bulk-delete>Seçilenleri Sil</button></div>
      <h3 style="margin-top:14px">Öğretmen Performans Özeti</h3><div class="table-wrap"><table class="table"><thead><tr><th>Öğretmen</th><th>İşlem</th><th>Veli Bildirimi</th><th>Panel Mesajı</th><th>Toplam</th></tr></thead><tbody>${teacherRows||'<tr><td colspan="5">Kayıt yok</td></tr>'}</tbody></table></div>
      <h3 style="margin-top:14px">Görev Kayıtları</h3><div class="table-wrap"><table class="table"><thead><tr><th>Öğretmen</th><th>Hedef</th><th>Tarih</th><th>Toplam</th><th>İşlem</th></tr></thead><tbody>${taskRows||'<tr><td colspan="5">Görev yok</td></tr>'}</tbody></table></div>
      <h3 style="margin-top:14px">Son Öğretmen İşlemleri</h3><div class="table-wrap"><table class="table"><thead><tr><th>Tarih</th><th>Öğretmen</th><th>Tür</th><th>Detay</th><th>İşlem</th></tr></thead><tbody>${logRows||'<tr><td colspan="5">İşlem yok</td></tr>'}</tbody></table></div>
      <h3 style="margin-top:14px">Veli Bildirimleri</h3><div class="table-wrap"><table class="table"><thead><tr><th>Tarih</th><th>Öğrenci</th><th>Kanal</th><th>Öğretmen</th><th>İşlem</th></tr></thead><tbody>${notificationHtml||'<tr><td colspan="5">Veli bildirimi yok</td></tr>'}</tbody></table></div>
      <h3 style="margin-top:14px">Öğrenci Panel Mesajları</h3><div class="table-wrap"><table class="table"><thead><tr><th>Tarih</th><th>Öğrenci</th><th>Başlık</th><th>Öğretmen</th><th>İşlem</th></tr></thead><tbody>${messageHtml||'<tr><td colspan="5">Mesaj yok</td></tr>'}</tbody></table></div>`;
    document.querySelectorAll('[data-admin-del-task]').forEach(b=>b.onclick=()=>deleteTask(b.dataset.adminDelTask));
    document.querySelectorAll('[data-admin-edit-task]').forEach(b=>b.onclick=()=>{const t=state.tasks.find(x=>x.key===b.dataset.adminEditTask); if(!t) return; state.editingTaskKey=t.key; state.taskWizard={targetType:t.targetType==='student'?'students':t.targetType,className:t.className,studentNos:studentsForTask(t),start:t.start,days:t.days,plan:{...t.plan}}; state.taskWizardStep=1; state.activeTab='tasks'; queueUiScroll('wizardPanel','smooth'); render();});
    bindAdminRecordButtons(); bindBulkSelectors();
  }catch(e){box.innerHTML=`<div class="empty danger">${esc(e.message)}</div>`;}
}

bootstrap();
</script>
</body>
</html>
