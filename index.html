<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e66012" />
  <title>Fenomen Öğretmen Paneli</title>
  <link rel="icon" href="https://i.ibb.co/cS9PSRpq/Logo-Fenomen.jpg" />
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#f4f7fb;
  --surface:#ffffff;
  --surface-2:#f8fafc;
  --surface-3:#eef4ff;
  --ink:#0f172a;
  --text:#1f2937;
  --muted:#64748b;
  --muted-2:#94a3b8;
  --line:#e2e8f0;
  --line-strong:#cbd5e1;
  --primary:#e66012;
  --primary-2:#f97316;
  --primary-3:#fdba74;
  --primary-soft:#fff7ed;
  --navy:#0b1220;
  --navy-2:#7c2d12;
  --cyan:#f59e0b;
  --purple:#7c3aed;
  --success:#16a34a;
  --success-soft:#eafaf1;
  --warning:#d97706;
  --warning-soft:#fff7e6;
  --danger:#dc2626;
  --danger-soft:#fff1f2;
  --radius-sm:12px;
  --radius:18px;
  --radius-lg:26px;
  --shadow-xs:0 1px 2px rgba(15,23,42,.05);
  --shadow:0 14px 38px rgba(15,23,42,.08);
  --shadow-lg:0 30px 80px rgba(15,23,42,.16);
  --focus:0 0 0 4px rgba(249,115,22,.18);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{width:100%;min-height:100%;overflow-x:hidden;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  margin:0;
  width:100%;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  color:var(--text);
  font-family:'Inter',ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  letter-spacing:-.011em;
  background:
    radial-gradient(circle at 0% 0%, rgba(37,99,235,.14) 0, rgba(37,99,235,0) 34%),
    radial-gradient(circle at 100% 0%, rgba(124,58,237,.11) 0, rgba(124,58,237,0) 30%),
    linear-gradient(135deg,#f8fbff 0%,#f3f7fd 42%,#eef5ff 100%);
  background-attachment:fixed;
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(120deg,rgba(255,255,255,.72),rgba(255,255,255,0) 36%),
    radial-gradient(circle at 28% 100%, rgba(6,182,212,.10), transparent 34%);
  z-index:-1;
}
img{max-width:100%;display:block}
button,input,select,textarea{font:inherit}
button{border:0;cursor:pointer}
a{color:inherit}

.app,.app-shell{min-height:100vh;position:relative}
.app-shell,.container{width:min(1240px,100%);margin:0 auto;padding:26px 20px 42px}
.container{padding-bottom:calc(112px + env(safe-area-inset-bottom))}
body:has(.bottom-nav){padding-bottom:0}

.card,.login-card,.section-card,.student-hero{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(226,232,240,.92);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
}
.card{padding:20px}
.card,.section-card,.student-hero{position:relative;overflow:hidden}
.card::before,.section-card::before,.student-hero::before{
  content:"";position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--cyan),transparent);opacity:.78;
}

/* LOGIN */
.login-wrap{
  min-height:100dvh;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:34px 18px;
}
.login-card{
  width:min(960px,100%);
  min-height:560px;
  padding:0;
  display:grid;
  grid-template-columns:minmax(330px,.9fr) minmax(360px,1fr);
  overflow:hidden;
  box-shadow:var(--shadow-lg);
  border:1px solid rgba(255,255,255,.8);
}
.login-hero{
  position:relative;
  color:#fff;
  min-height:560px;
  padding:40px 34px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
    radial-gradient(circle at 20% 16%, rgba(96,165,250,.42), transparent 32%),
    radial-gradient(circle at 90% 10%, rgba(6,182,212,.32), transparent 32%),
    linear-gradient(145deg,#081226 0%,#172554 48%,#1d4ed8 100%);
}
.login-hero::after{
  content:"";position:absolute;inset:auto -80px -80px auto;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.10);filter:blur(1px);
}
.login-logo-mark{
  width:104px;height:104px;border-radius:26px;background:#fff;display:grid;place-items:center;overflow:hidden;
  border:1px solid rgba(255,255,255,.48);box-shadow:0 22px 48px rgba(0,0,0,.22);position:relative;z-index:1;
}
.login-logo-mark img{width:100%;height:100%;object-fit:contain}
.login-hero h1{margin:22px 0 8px;font-size:34px;line-height:1.08;font-weight:900;letter-spacing:-.055em;color:#fff}
.login-hero p{margin:0;color:rgba(255,255,255,.78);line-height:1.65;font-weight:600;max-width:330px}
.login-hero-badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px;position:relative;z-index:1}
.login-hero-badges span{display:inline-flex;align-items:center;gap:7px;min-height:34px;padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.20);color:#fff;font-size:12px;font-weight:800;backdrop-filter:blur(10px)}
.login-form-panel{padding:46px 42px;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(180deg,#fff,#fbfdff)}
.login-form-panel h2{margin:0 0 8px;color:var(--ink);font-size:30px;line-height:1.12;font-weight:900;letter-spacing:-.045em;text-align:left}
.login-form-panel .login-copy{margin:0 0 28px;color:var(--muted);font-weight:600;line-height:1.55;text-align:left}
.login-card .field{margin-top:0;text-align:left}
.login-card .tiny{color:var(--muted-2);text-align:center;font-weight:700}
.login-icon,.login-logo{width:108px;height:108px;border-radius:26px;margin:0 auto 18px;display:grid;place-items:center;overflow:hidden;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.login-icon img,.login-logo img,.logo-img{width:100%;height:100%;object-fit:contain}
.login-title{margin:0;text-align:center;font-size:30px;line-height:1.08;font-weight:900;letter-spacing:-.045em;color:var(--ink)}
.login-sub{margin:10px auto 26px;text-align:center;max-width:380px;color:var(--muted);font-weight:600;line-height:1.6}
.loading-card{width:min(520px,100%);padding:34px;text-align:center}
.loading-card h1{margin:12px 0 6px;font-size:26px;color:var(--ink)}
.loading-card p{margin:0;color:var(--muted);font-weight:600;line-height:1.55}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:30;padding:16px 20px 6px;background:linear-gradient(180deg,rgba(244,247,251,.96),rgba(244,247,251,.74) 70%,transparent);backdrop-filter:blur(12px)}
.topbar-inner{
  width:min(1240px,100%);margin:0 auto;padding:12px 14px;
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.93);border:1px solid rgba(226,232,240,.94);border-radius:26px;box-shadow:var(--shadow);
}
.app-shell>.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin:0 0 20px;padding:12px 0;background:transparent;border-bottom:0;position:relative;backdrop-filter:none}
.brand{display:flex;align-items:center;gap:14px;min-width:0;flex:1}
.brand>div:not(.logo):not(.logo-box){min-width:0}
.logo,.logo-box{width:64px;height:64px;min-width:64px;border-radius:20px;background:#fff;display:grid;place-items:center;overflow:hidden;line-height:0;border:1px solid var(--line);box-shadow:0 12px 28px rgba(37,99,235,.10)}
.logo img,.logo-box img{width:100%;height:100%;object-fit:contain}
.brand h1{margin:0;font-size:20px;line-height:1.12;font-weight:900;letter-spacing:-.04em;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand p{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.section-title{margin:14px 0 18px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.section-title h2,.section-head h3{margin:0;color:var(--ink);font-weight:900;letter-spacing:-.045em}
.section-title h2{font-size:clamp(25px,3vw,36px);line-height:1.05}
.section-title p,.section-head p{margin:7px 0 0;color:var(--muted);font-weight:600;line-height:1.55}
.section-card{padding:24px;margin-top:12px}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
.section-head h3{font-size:24px;line-height:1.15}
.card h2,.card h3{color:var(--ink);letter-spacing:-.035em}.card h2{font-size:24px}.card h3{font-size:19px;margin-top:0}

.grid{display:grid;gap:16px}.two,.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.three,.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.four,.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.compact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:13px}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.row.nowrap{flex-wrap:nowrap}.row>*{min-width:0}.spacer{flex:1}
.meta-row,.chipbar{display:flex;flex-wrap:wrap;gap:9px}

label,.field label{display:block;margin:0 0 8px;color:#334155;font-size:13px;font-weight:800;letter-spacing:-.01em}
.field{width:100%;display:flex;flex-direction:column;gap:8px}
input,select,textarea,.input{
  width:100%;max-width:100%;min-height:50px;border:1px solid var(--line-strong);background:#fff;color:var(--ink);border-radius:16px;padding:13px 15px;outline:none;font-size:15px;font-weight:600;transition:box-shadow .18s ease,border-color .18s ease,background .18s ease,transform .18s ease;appearance:none;-webkit-appearance:none;box-shadow:var(--shadow-xs)
}
select{background-image:linear-gradient(45deg,transparent 50%,#64748b 50%),linear-gradient(135deg,#64748b 50%,transparent 50%);background-position:calc(100% - 18px) 22px,calc(100% - 12px) 22px;background-size:6px 6px,6px 6px;background-repeat:no-repeat;padding-right:34px}
textarea{min-height:110px;resize:vertical;line-height:1.56}
input:focus,select:focus,textarea:focus,.input:focus{border-color:var(--primary-2);box-shadow:var(--focus);background:#fff}
::placeholder{color:#94a3b8;font-weight:500}

.btn,.primary,.secondary,.ghost,.danger-btn,.success-btn,.warning-btn,.btn-primary,.btn-light,.btn-danger,.btn-ghost{
  min-height:48px;border-radius:16px;padding:12px 16px;display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:800;text-decoration:none;line-height:1.1;transition:transform .16s ease,box-shadow .16s ease,background .16s ease,border-color .16s ease,opacity .16s ease;border:1px solid transparent;user-select:none;white-space:nowrap
}
.btn:hover,.primary:hover,.secondary:hover,.ghost:hover,.danger-btn:hover,.success-btn:hover,.warning-btn:hover,.btn-primary:hover,.btn-light:hover,.btn-danger:hover,.btn-ghost:hover{transform:translateY(-1px)}
.btn:active,.primary:active,.secondary:active,.ghost:active,.danger-btn:active,.success-btn:active,.warning-btn:active{transform:translateY(0) scale(.99)}
.primary,.btn-primary{color:#fff;background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 56%,#172554 100%);box-shadow:0 14px 28px rgba(37,99,235,.24)}
.secondary,.btn-light{color:#1d4ed8;background:#eef4ff;border-color:#dbeafe;box-shadow:var(--shadow-xs)}
.ghost,.btn-ghost{color:#334155;background:#fff;border-color:var(--line);box-shadow:var(--shadow-xs)}
.danger-btn,.btn-danger{color:#b91c1c;background:var(--danger-soft);border-color:#fecdd3}
.success-btn{color:#15803d;background:var(--success-soft);border-color:#bbf7d0}
.warning-btn{color:#b45309;background:var(--warning-soft);border-color:#fed7aa}
.btn:disabled,.primary:disabled,.secondary:disabled,.ghost:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}.w-100{width:100%}
.button-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.button-grid button{min-height:50px}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.tabs{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 16px;margin:0 0 6px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{min-height:44px;white-space:nowrap;padding:10px 15px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#334155;font-weight:800;box-shadow:var(--shadow-xs)}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 14px 26px rgba(15,23,42,.20)}

.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:0 14px calc(14px + env(safe-area-inset-bottom));pointer-events:none;background:linear-gradient(180deg,transparent,rgba(244,247,251,.94) 50%)}
.bottom-nav .nav-inner{pointer-events:auto;width:min(720px,100%);margin:0 auto;display:grid;gap:10px;padding:10px;background:rgba(255,255,255,.94);border:1px solid rgba(226,232,240,.94);border-radius:28px;box-shadow:0 22px 60px rgba(15,23,42,.18);backdrop-filter:blur(14px)}
.nav-item{min-height:62px;border-radius:20px;background:transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:800;transition:.16s ease}
.nav-item b{font-size:20px;line-height:1}.nav-item span{font-size:12px}.nav-item.active{background:linear-gradient(135deg,var(--primary-2),var(--navy-2));color:#fff;box-shadow:0 14px 28px rgba(37,99,235,.25)}

.stat-card,.admin-metric{position:relative;overflow:hidden;border-radius:22px;padding:20px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.stat-card::after,.admin-metric::after{content:"";position:absolute;right:-34px;top:-34px;width:98px;height:98px;border-radius:50%;background:rgba(37,99,235,.08)}
.stat-card span,.admin-metric small{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px}
.stat-card strong,.admin-metric strong{display:block;color:var(--ink);font-size:clamp(26px,4vw,34px);font-weight:900;letter-spacing:-.06em;line-height:1}
.mini,.tiny{font-size:12px;color:var(--muted);font-weight:700;line-height:1.45}.muted{color:var(--muted)}.danger{color:var(--danger)}.success{color:var(--success)}.warning{color:var(--warning)}

.pill,.badge,.chip{display:inline-flex;align-items:center;gap:7px;min-height:32px;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#334155;font-size:12px;font-weight:800;box-shadow:var(--shadow-xs)}
.pill.blue,.badge{color:#1d4ed8;background:#eef4ff;border-color:#dbeafe}.pill.green,.badge.green,.green{color:#15803d}.pill.green,.badge.green{background:#eafaf1;border-color:#bbf7d0}.pill.orange,.badge.orange{color:#b45309;background:#fff7e6;border-color:#fed7aa}.badge.red{color:#b91c1c;background:#fff1f2;border-color:#fecdd3}.chip.active{color:#fff;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-color:transparent;box-shadow:0 12px 24px rgba(37,99,235,.22)}

.entry-row,.task-card,.message-card,.course-line,.lesson-card,.topic-card,.thin-item,.day-card,.student-row,.target-summary,.confirm-panel{border:1px solid var(--line);background:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow-xs)}
.entry-row,.task-card,.message-card{margin-bottom:13px}.topic-card{margin-top:12px;background:#f8fbff}.day-card{background:#f8fbff}
.row-title,.task-top,.course-line-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.row-title strong,.task-title{font-size:16px;font-weight:900;color:var(--ink);margin:0}.task-sub{margin:4px 0 0;color:var(--muted);font-size:13px;font-weight:700}
.task-line{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:9px;padding:13px;border-radius:18px;background:#f8fafc;border:1px solid var(--line)}
.progress-wrap,.bar{height:10px;margin-top:9px;background:#e2e8f0;border-radius:999px;overflow:hidden}.progress-bar,.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--primary-2),var(--cyan),var(--success));border-radius:999px}
.message-title{margin:0 0 7px;font-weight:900;color:var(--ink)}.message-text{line-height:1.62;color:#334155;margin:0 0 12px;white-space:pre-wrap;font-weight:600}.message-card.unread{border-color:#bfdbfe;background:#f8fbff}
.message-preview{white-space:pre-wrap;background:#f8fafc;border:1px solid var(--line);border-radius:20px;padding:16px;line-height:1.62;color:#334155;font-weight:600}
.empty{border:1.5px dashed #bfdbfe;background:#f8fbff;border-radius:22px;padding:26px;text-align:center;color:#64748b;line-height:1.6;font-weight:700}

.student-row{display:flex;gap:14px;align-items:center;cursor:pointer;transition:.16s ease}.student-row:hover{transform:translateY(-1px);box-shadow:0 18px 36px rgba(37,99,235,.12);border-color:#bfdbfe}.student-row h3{margin:0;font-size:16px;font-weight:900;color:var(--ink)}.student-row p{margin:4px 0 0;color:var(--muted);font-size:13px;font-weight:700}
.avatar{width:52px;height:52px;min-width:52px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#eef4ff,#dbeafe);color:#1d4ed8;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}

.wizard-shell{display:grid;gap:16px}.wizard-steps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:8px}.wizard-step{position:relative;background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow-xs)}.wizard-step::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 999px 999px 0;background:linear-gradient(180deg,#2563eb,#06b6d4)}.wizard-step b{display:block;color:var(--ink);font-size:14px;font-weight:900;margin-bottom:5px}.wizard-step span{color:var(--muted);font-size:12px;font-weight:700;line-height:1.45}.target-summary{background:#eef4ff;color:#1d4ed8;font-weight:800}.student-picker-tools{display:grid;grid-template-columns:1fr 220px;gap:12px}

.lesson-designer{display:grid;gap:14px}.lesson-card{padding:18px}.lesson-card>.row:first-child{padding-bottom:12px;border-bottom:1px solid var(--line)}.subtopic-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.subtopic-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid #dbeafe;background:#eef4ff;color:#1d4ed8;font-size:12px;font-weight:800}.subtopic-chip button{width:22px;height:22px;border-radius:999px;background:#fff;color:#b91c1c;font-weight:900;display:grid;place-items:center;box-shadow:var(--shadow-xs)}

.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:22px;background:#fff;box-shadow:var(--shadow-xs)}.table{width:100%;border-collapse:collapse;min-width:650px}.table th,.table td{padding:14px 15px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}.table th{background:#f8fafc;color:#334155;font-weight:900;text-transform:uppercase;letter-spacing:.035em;font-size:12px}.table tr:last-child td{border-bottom:none}.table td{color:#334155;font-weight:600}

.alert{border-radius:18px;padding:14px 15px;margin-top:14px;font-size:14px;line-height:1.5;display:none;font-weight:700}.alert.show{display:block}.alert.ok{background:#eafaf1;color:#15803d;border:1px solid #bbf7d0}.alert.bad{background:#fff1f2;color:#b91c1c;border:1px solid #fecdd3}.alert.info{background:#eef4ff;color:#1d4ed8;border:1px solid #dbeafe}
.loading{position:fixed;inset:0;background:rgba(248,250,252,.76);backdrop-filter:blur(14px);z-index:70;display:none;place-items:center;text-align:center;color:var(--ink);font-weight:900}.loading.show{display:grid}.spinner,.loader{display:inline-block;border-radius:50%;border:4px solid #dbeafe;border-top-color:#2563eb;animation:spin .85s linear infinite}.spinner{width:48px;height:48px;margin:0 auto 12px}.loader{width:19px;height:19px;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;left:50%;bottom:calc(104px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:60;max-width:min(92vw,780px);padding:13px 17px;border-radius:999px;background:#0f172a;color:#fff;font-weight:800;box-shadow:0 24px 60px rgba(15,23,42,.25)}.toast.ok{background:#15803d}.toast.error{background:#b91c1c}.hidden{display:none!important}
.footer{text-align:center;color:#94a3b8;font-size:12px;margin-top:26px;font-weight:700}.health-ok{background:#eafaf1!important;color:#15803d!important;border-color:#bbf7d0!important}.health-bad{background:#fff1f2!important;color:#b91c1c!important;border-color:#fecdd3!important}


/* REAL WIZARD + CLEAN STUDENT PICKER + ADMIN MODAL FIXES */
.wizard-shell.real-wizard{gap:18px}

  position:relative;
  box-shadow:0 22px 54px rgba(15,23,42,.12), inset 0 0 0 1px rgba(15,23,42,.06)!important;
}
.pie-chart.pro-chart::before{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius:50%;
  border:1px solid rgba(226,232,240,.82);
  background:linear-gradient(180deg,rgba(255,255,255,.34),rgba(255,255,255,0));
  z-index:0;
  pointer-events:none;
}
.pie-chart.pro-chart::after{
  content:"";
  position:absolute;
  inset:30%!important;
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 0 11px rgba(255,255,255,.62), inset 0 0 0 1px var(--line)!important;
  z-index:1;
}
.pie-center{
  position:absolute;
  inset:0;
  z-index:3;
  display:flex!important;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  text-align:center;
  pointer-events:none;
  color:var(--ink);
}
.pie-center strong{
  display:block;
  font-size:clamp(26px,4vw,34px);
  line-height:1;
  font-weight:900;
  letter-spacing:-.06em;
  font-variant-numeric:tabular-nums;
}
.pie-center small{
  display:block;
  max-width:96px;
  color:var(--muted);
  font-size:12px;
  line-height:1.18;
  font-weight:900;
  letter-spacing:-.01em;
}
.analysis-summary-line{
  margin-top:8px!important;
}
.legend{
  margin-top:4px!important;
}
.legend span{white-space:nowrap}
@media(max-width:620px){.pie-card{padding:18px!important}.pie-chart.pro-chart{width:min(214px,72vw)!important}.pie-center strong{font-size:28px}.pie-center small{font-size:11px}}

async function sendSmsApiOnce({gsm,message}){
  if(state.systemSettings?.smsEnabled===false) return {ok:false,reason:'Sistem ayarlarında SMS kapalı.'};
  const cfg=getSmsApiConfig();
  const gsmNo=normalizePhoneTR(gsm);
  const msg=String(message||'').trim();
  if(!gsmNo) return {ok:false,reason:'Veli telefonu yok veya geçersiz.'};
  if(!msg) return {ok:false,reason:'SMS metni boş.'};
  if(!cfg.username || !cfg.password || !cfg.hostname) return {ok:false,reason:'SMS API kullanıcı bilgileri eksik.'};

  if(cfg.proxyUrl){
    try{
      const resp=await fetchWithTimeout(cfg.proxyUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:cfg.username,password:cfg.password,header:cfg.header||'FENOMEN',gsm:gsmNo,message:msg}),cache:'no-store',mode:'cors'},15000);
      const ct=resp.headers.get('content-type')||'';
      const data=ct.includes('application/json') ? await resp.json() : {text:await resp.text()};
      if(resp.ok && (isOkLike(data.ok) || isOkLike(data.success) || isOkLike(data.status))) return {ok:true,gsm:gsmNo,data};
      return {ok:false,gsm:gsmNo,data,reason:`SMS proxy yanıtı başarısız: HTTP ${resp.status}`};
    }catch(e){return {ok:false,gsm:gsmNo,reason:e?.name==='AbortError'?'SMS proxy zaman aşımına uğradı.':(e?.message||String(e))};}
  }

  try{
    const host=String(cfg.hostname||'').replace(/\/+$/,'');
    const path=String(cfg.directGetPath||'/api/smsget/v1').startsWith('/') ? cfg.directGetPath : `/${cfg.directGetPath}`;
    const params=new URLSearchParams({username:cfg.username,password:cfg.password,header:cfg.header||'FENOMEN',gsm:gsmNo,message:msg});
    await fetchWithTimeout(`${host}${path}?${params.toString()}`,{method:'GET',mode:'no-cors',cache:'no-store'},12000);
    return {ok:true,gsm:gsmNo,opaque:true};
  }catch(e){
    return {ok:false,gsm:gsmNo,reason:e?.name==='AbortError'?'SMS API zaman aşımına uğradı.':(e?.message||String(e))};
  }
}

async function patchJsonAtDbBase(base,path,obj){

  const p=firebasePath(path); const data=cleanForFirebase(obj);

function cleanForFirebase(value){
  if(Array.isArray(value)) return value.map(cleanForFirebase);
  if(value && typeof value === 'object'){
    const out={};
    Object.entries(value).forEach(([k,v])=>{
      if(v === undefined) return;
      const safeKey=String(k).replace(/[.#$\[\]\/]/g,'_');
      out[safeKey]=cleanForFirebase(v);
    });
    return out;
  }
  return value === undefined ? null : value;
}

function parseCsv(csv){
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<csv.length;i++){
    const c=csv[i];
    if(c==='"') { if(q && csv[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(c===',' && !q){ row.push(cur); cur=''; }
    else if((c==='\n'||c==='\r') && !q){ if(cur || row.length){row.push(cur); rows.push(row.map(cleanSheetValue)); row=[]; cur='';} if(c==='\r' && csv[i+1]==='\n') i++; }
    else cur+=c;
  }
  if(cur || row.length){row.push(cur); rows.push(row.map(cleanSheetValue));}
  return rows.filter(r=>r.some(x=>String(x).trim()));
}
function rowsHaveHeaders(rows, groups){const h=(rows[0]||[]).map(normalizeHeader); return groups.every(g=>g.some(k=>h.includes(normalizeHeader(k))));}
async function loadSheetRows(sheetNames, groups){
  for(const name of sheetNames){
    const urls=[
      `https://docs.google.com/spreadsheets/d/${getSheetId()}/gviz/tq?tqx=out:csv&headers=1&sheet=${enc(name)}`,
      `https://docs.google.com/spreadsheets/d/${getSheetId()}/export?format=csv&sheet=${enc(name)}`
    ];
    for(const url of urls){
      try{const rows=parseCsv(await fetchText(url)); if(rows.length>1 && rowsHaveHeaders(rows,groups)) return rows;}catch(e){}
    }
  }
  return [];
}

function lessonImportanceWeight(lesson,type='base'){
  const k=lessonKind(lesson);
  if(type==='sayisalFocus'){
    if(k==='matematik'||k==='fen') return 40;

    return 5;
  }
  if(type==='sozelFocus'){

    if(k==='inkilap'||k==='din'||k==='ingilizce') return 20;
    if(k==='matematik'||k==='fen') return 10;

  }
  if(k==='turkce'||k==='matematik'||k==='fen') return 20;
  if(k==='inkilap'||k==='din'||k==='ingilizce') return 10;
  return 10;
}

function focusLessonFromTemplate(type){

  if(legacy[type]) return legacy[type];
  if(String(type||'').startsWith('focus:')){try{return decodeURIComponent(String(type).slice(6));}catch(e){return String(type).slice(6);}}

function distributeQuestionTotal(total,names,type='base',fixed={}){
  const out={};
  const lessonList=(names||[]).filter(Boolean);
  if(!lessonList.length) return out;
  lessonList.forEach(l=>out[l]=0);
  Object.entries(fixed||{}).forEach(([lesson,value])=>{
    const real=lessonList.find(l=>sameLesson(l,lesson)) || lesson;
    if(lessonList.includes(real)) out[real]=Math.max(0,Number(value)||0);
  });
  let remaining=Math.max(0,Number(total||0)-Object.values(out).reduce((s,v)=>s+(Number(v)||0),0));
  const available=lessonList.filter(l=>!Object.keys(fixed||{}).some(f=>sameLesson(f,l)));
  if(!available.length){
    const first=lessonList[0];
    out[first]=(out[first]||0)+remaining;
    return out;
  }
  const weightSum=available.reduce((s,l)=>s+lessonImportanceWeight(l,type),0)||available.length;
  const rows=available.map((lesson,idx)=>{
    const raw=remaining*(lessonImportanceWeight(lesson,type)/weightSum);
    const base=Math.floor(raw/5)*5;
    return {lesson,idx,raw,base,rem:raw-base,weight:lessonImportanceWeight(lesson,type)};
  });
  rows.forEach(r=>{out[r.lesson]=(out[r.lesson]||0)+r.base;});
  let used=rows.reduce((s,r)=>s+r.base,0);
  const sorted=[...rows].sort((a,b)=>(b.rem-a.rem)||(b.weight-a.weight)||(a.idx-b.idx));
  let i=0;
  while(used+5<=remaining && sorted.length){out[sorted[i%sorted.length].lesson]+=5; used+=5; i++;}
  if(used<remaining) out[sorted[0]?.lesson||available[0]]+=remaining-used;
  return out;
}
function templateNumbersForType(type,names){

  const total=QUICK_PROGRAM_TOTALS[type]||QUICK_PROGRAM_TOTALS.dengeli;

function planFromTaskForWizard(task){

function findConflicts(task, ignoreKey=''){
  const targetSet=new Set(studentsForTask(task));
  const conflicts=[];
  for(const old of state.tasks){
    if(old.key===ignoreKey || old.status==='silindi') continue;
    if(!rangesOverlap(task.start,task.end,old.start,old.end)) continue;
    const oldSet=new Set(studentsForTask(old));
    const both=[...targetSet].filter(no=>oldSet.has(no));
    if(both.length){conflicts.push({task:old, students:both});}
  }
  return conflicts;
}

function emptyStudyStats(){return {total:0,correct:0,wrong:0,empty:0,entryCount:0,activeDays:0,subjects:[],topics:[],subtopics:[],records:[]};}
function normalizeStudyRecord(rec){
  if(!rec || typeof rec!=='object') return null;
  const dateRaw=rec.dateKey||rec.tarih||rec.date||rec.tarihSaat||rec.createdAt||'';
  const date=isoFromAny(dateRaw);
  if(!date) return null;
  const lesson=rec.ders||rec.lesson||rec.course||'Genel';
  const topic=rec.anaKonu||rec.konu||rec.topic||rec.mainTopic||'Genel';
  const subtopic=rec.altKonu||rec.alt||rec.subtopic||rec.subTopic||'Genel';
  const total=Math.max(0,Number(rec.toplam??rec.toplamSoru??rec.total??rec.soruSayisi??0)||0);
  const wrong=Math.max(0,Number(rec.yanlis??rec.wrong??0)||0);
  const empty=Math.max(0,Number(rec.bos??rec.empty??0)||0);
  const correct=Math.max(0,Number(rec.dogru??rec.correct??Math.max(0,total-wrong-empty))||0);
  return {date,lesson:String(lesson||'Genel').trim()||'Genel',topic:String(topic||'Genel').trim()||'Genel',subtopic:String(subtopic||'Genel').trim()||'Genel',total,correct,wrong,empty,raw:rec};
}
function summarizeStudyRecords(records){
  let total=0,correct=0,wrong=0,empty=0; const active=new Set();
  const subjects={},topics={},subtopics={};
  (records||[]).forEach(r=>{
    total+=r.total; correct+=r.correct; wrong+=r.wrong; empty+=r.empty; if(r.date) active.add(r.date);
    if(!subjects[r.lesson]) subjects[r.lesson]={lesson:r.lesson,total:0,correct:0,wrong:0,empty:0,entryCount:0};
    subjects[r.lesson].total+=r.total; subjects[r.lesson].correct+=r.correct; subjects[r.lesson].wrong+=r.wrong; subjects[r.lesson].empty+=r.empty; subjects[r.lesson].entryCount++;
    const tk=`${r.lesson}|||${r.topic}`;
    if(!topics[tk]) topics[tk]={lesson:r.lesson,topic:r.topic,total:0,correct:0,wrong:0,empty:0,entryCount:0};
    topics[tk].total+=r.total; topics[tk].correct+=r.correct; topics[tk].wrong+=r.wrong; topics[tk].empty+=r.empty; topics[tk].entryCount++;
    const sk=`${r.lesson}|||${r.topic}|||${r.subtopic}`;
    if(!subtopics[sk]) subtopics[sk]={lesson:r.lesson,topic:r.topic,subtopic:r.subtopic,total:0,correct:0,wrong:0,empty:0,entryCount:0};
    subtopics[sk].total+=r.total; subtopics[sk].correct+=r.correct; subtopics[sk].wrong+=r.wrong; subtopics[sk].empty+=r.empty; subtopics[sk].entryCount++;
  });
  return {total,correct,wrong,empty,entryCount:(records||[]).length,activeDays:active.size,subjects:Object.values(subjects).sort((a,b)=>b.total-a.total),topics:Object.values(topics).sort((a,b)=>b.total-a.total),subtopics:Object.values(subtopics).sort((a,b)=>b.total-a.total),records:[...(records||[])].sort((a,b)=>recordSortValue(a)-recordSortValue(b))};
}
function buildStatsFromStudyRecords(root,start,end,options={}){
  const endDate=isoFromAny(options.endDate||end);
  const endTime=String(options.endTime||'');
  const endMinutes=minutesFromTimeText(endTime);
  const records=[];
  for(const rec of Object.values(root||{})){
    const normalized=normalizeStudyRecord(rec);
    if(!normalized || !dateInRange(normalized.date,start,end)) continue;
    if(endMinutes!==null && normalized.date===endDate){
      const displayTime=recordTimeText(normalized);
      const match=String(displayTime||'').match(/(\d{2}:\d{2})/);
      const recordMinutes=match?minutesFromTimeText(match[1]):null;
      if(recordMinutes!==null && recordMinutes>endMinutes) continue;
    }
    records.push(normalized);
  }
  return summarizeStudyRecords(records);
}
async function loadStats(studentNo,start,end,options={}){
  const cacheKey=`${studentNo}|${start}|${end}`;
  if(!options.force && state.statsCache?.[cacheKey]) return structuredClone(state.statsCache[cacheKey]);
  try{
    const root=await getJson(`verianalizi001/calismaKayitlari/${studentNo}`)||{};
    const result=buildStatsFromStudyRecords(root,start,end,options);
    if(!options.force){state.statsCache=state.statsCache||{}; state.statsCache[cacheKey]=structuredClone(result);}
    return result;
  }catch(e){return emptyStudyStats();}
}

function taskIsActiveForStudentOnDay(task,student,day){
  if(!task || !student) return false;
  const status=String(task.status||'aktif').toLocaleLowerCase('tr-TR');
  if(status.includes('pasif') || status.includes('sil')) return false;
  if(!dateInRange(day,task.start||day,task.end||day)) return false;
  return studentsForTask(task).map(cleanId).includes(cleanId(student.no));
}
function dailyTaskTargetsForStudent(student,day){
  const rows=[];
  for(const task of state.tasks||[]){
    if(!taskIsActiveForStudentOnDay(task,student,day)) continue;
    const targets=aggregateTaskItemsByLesson(taskItemsForDay(task,day));
    const total=targets.reduce((sum,x)=>sum+(Number(x.target)||0),0);
    if(total>0) rows.push({task,targets,total});
  }
  return rows;
}
function dailyFollowSortScore(item){
  if(!item || Number(item.totalTarget||0)<=0) return -1;
  return Number(item.completionPct||0);
}
function compareDailyFollowItems(a,b){
  return dailyFollowSortScore(b)-dailyFollowSortScore(a)
    || Number(b.totalDone||0)-Number(a.totalDone||0)
    || Number(b.stats?.entryCount||0)-Number(a.stats?.entryCount||0)
    || String(a.student?.name||'').localeCompare(String(b.student?.name||''),'tr');
}
async function loadDailyFollowSummaries(day){
  if(!state.followClasses.length) return {configured:false,items:[],summary:{tracked:0,entries:0,warnings:0,completed:0}};
  const tracked=state.students.filter(s=>state.followClasses.includes(s.className)).sort((a,b)=>(a.className||'').localeCompare(b.className||'','tr') || a.name.localeCompare(b.name,'tr'));
  const items=[];
  for(const st of tracked){
    const stats=await loadStats(st.no,day,day);
    const doneMap=recordDoneByLesson(stats.records,day,day);
    const taskRows=dailyTaskTargetsForStudent(st,day).map(row=>{
      const lessonRows=row.targets.map(t=>{
        const done=Number(doneMap[t.lesson]||0);
        const target=Number(t.target)||0;
        return {lesson:t.lesson,target,done,missing:Math.max(0,target-done),completed:target>0 && done>=target};
      });
      const targetTotal=lessonRows.reduce((sum,x)=>sum+x.target,0);
      const doneTotal=lessonRows.reduce((sum,x)=>sum+x.done,0);
      const cappedDoneTotal=lessonRows.reduce((sum,x)=>sum+creditedTaskDone(x.done,x.target),0);
      return {task:row.task,lessonRows,targetTotal,doneTotal,cappedDoneTotal};
    });
    const totalTarget=taskRows.reduce((sum,x)=>sum+x.targetTotal,0);
    const totalDone=taskRows.reduce((sum,x)=>sum+x.doneTotal,0);
    const cappedDone=taskRows.reduce((sum,x)=>sum+x.cappedDoneTotal,0);
    const completionPct=totalTarget>0 ? Math.min(100,Math.round((cappedDone/totalTarget)*100)) : null;
    const completedLessons=taskRows.flatMap(x=>x.lessonRows.filter(r=>r.completed));
    const missingLessons=taskRows.flatMap(x=>x.lessonRows.filter(r=>!r.completed));
    const warning=totalTarget>0 && completionPct<50;
    items.push({student:st,stats,doneMap,taskRows,totalTarget,totalDone,completionPct,completedLessons,missingLessons,warning});
  }
  const summary={
    tracked:items.length,
    entries:items.filter(x=>x.stats.entryCount>0).length,
    completed:items.filter(x=>x.totalTarget>0 && x.completionPct>=100).length,
    incomplete:items.filter(x=>x.totalTarget>0 && x.totalDone>0 && x.completionPct<100).length,
    zero:items.filter(x=>x.totalTarget>0 && x.totalDone<=0).length
  };
  summary.warnings=summary.incomplete+summary.zero;
  items.sort(compareDailyFollowItems);
  return {configured:true,items,summary};
}

function buildStudentMsg(level,st,stats,range){const who=`\n\nGönderen Öğretmen: ${state.teacher.name}`; if(level==='positive') return `Sevgili ${st.name}, ${fmtDate(range.start)} - ${fmtDate(range.end)} aralığında ${stats.total} soru girişi yaptın. Bu iyi bir başlangıç. Düzenli devam edersen gelişimin çok daha net görülecek.${who}`; if(level==='high') return `Sevgili ${st.name}, bu aralıktaki çalışma takibin beklenen seviyenin altında görünüyor. Bugünden itibaren kısa ama düzenli çalışma yapmanı ve girişlerini aksatmamanı bekliyorum.${who}`; if(level==='excellent') return `Sevgili ${st.name}, çalışman çok güzel ilerliyor. Toplam ${stats.total} soru çözmen ve düzenli takip yapman çok değerli. Aynı tempoyla devam etmeni bekliyorum.${who}`; return `Sevgili ${st.name}, ${fmtDate(range.start)} - ${fmtDate(range.end)} aralığındaki çalışma durumunu kontrol etmeni istiyorum. Toplam soru: ${stats.total}. Günlük girişlerini düzenli yapmayı unutma.${who}`;}
function taskItemParentSummary(item){
  const lesson=taskItemLesson(item);
  const target=taskItemTarget(item);
  const topic=[item?.anaKonu||item?.topic||item?.konu||'', item?.altKonu||item?.subtopic||item?.alt||''].map(x=>String(x||'').trim()).filter(Boolean).join(' / ');
  const desc=String(item?.aciklama||item?.description||'').trim();
  const parts=[lesson,topic,desc].filter(Boolean).join(' - ');
  return `${parts}${target?`: ${target} soru`:''}`;
}
function studentAssignmentDaySummaries(tasks,range){
  const map={};
  (tasks||[]).forEach(task=>{
    const obj=task.daysObj||task.daysObject||planToDaysObject(task);
    Object.entries(obj||{}).forEach(([date,val])=>{
      const iso=isoFromAny(date);
      if(!iso || (range && range.start && range.end && !dateInRange(iso,range.start,range.end))) return;
      const rawItems=normalizeTaskItems(val);
      const items=rawItems.map(taskItemParentSummary).filter(Boolean);
      if(!items.length) return;
      if(!map[iso]) map[iso]=[];
      map[iso].push({title:targetLabel(task),items,total:rawItems.reduce((s,it)=>s+taskItemTarget(it),0)});
    });
  });
  return Object.keys(map).sort().map(day=>({day,assignments:map[day]}));
}

${kurum} çalışma takip sistemi üzerinden ${st.name} öğrencimize ait görevlendirme bilgileri aşağıda bilgilerinize sunulmuştur.

Öğrencimiz görevlendirmelerini ve çalışma girişlerini aşağıdaki bağlantıdan kontrol edebilir:

${STUDENT_ASSIGNMENT_URL}

function studentTaskParentNotifyHtml(pkg,st){

function bindAssignmentParentNotify(st,tasks){
  const root=document.querySelector('[data-task-parent-package]');
  if(!root) return;
  const packages=buildStudentTaskPackages(tasks,null);
  const pkg=packages.find(p=>p.id===root.dataset.taskParentPackage && packageAllowsParentNotify(p));
  if(!pkg) return;
  let generatedMessage='';
  const drawMessage=()=>{
    generatedMessage=generatedMessage || buildAssignmentParentWhatsAppMessage(st,pkg.tasks,null);
    const box=document.getElementById('taskParentMessageBox');
    if(!box) return generatedMessage;
    box.innerHTML=`<div class="message-preview">${esc(generatedMessage)}</div><div class="student-panel-link-box"><a href="${esc(STUDENT_ASSIGNMENT_URL)}" target="_blank" rel="noopener">${esc(STUDENT_ASSIGNMENT_URL)}</a></div><div class="button-grid channel-actions parent-action-grid" style="margin-top:12px"><button class="ghost" data-task-parent-action="copy">Metni Kopyala</button><button class="primary" data-task-parent-action="whatsapp">WhatsApp Aç</button></div><p class="muted tiny" style="margin-top:8px">Bağlantı mesaj içinde tek satır olarak yer alır; WhatsApp’ta tıklanınca doğrudan öğrenci giriş sayfasına yönlendirir.</p>`;
    queueUiScroll('taskParentNotify','smooth');
    runPendingStudentTaskScroll();
    return generatedMessage;
  };
  root.addEventListener('click',async e=>{
    const btn=e.target.closest('[data-task-parent-action]');
    if(!btn || !root.contains(btn)) return;
    const action=btn.dataset.taskParentAction;
    try{
      if(action==='generate'){
        drawMessage();
        return;
      }
      const message=generatedMessage || drawMessage();
      if(action==='copy'){
        await copyText(message);
        setToast('Görevlendirme veli mesajı kopyalandı','ok');
        return;
      }
      if(action==='whatsapp'){
        const phone=normalizePhoneTR(st.parentPhone);
        if(!phone) throw new Error('Veli telefonu yok. Metni kopyalayarak manuel gönderebilirsiniz.');
        window.open(`https://wa.me/${phone}?text=${enc(message)}`,'_blank');
        state.draftConfirm={student:st,channel:'WhatsApp Görev',message};
        renderConfirmBox();
      }
    }catch(err){setToast(err.message,'error');}
  });
}



function stopAutoRefresh(){if(state.refreshTimer){clearInterval(state.refreshTimer);state.refreshTimer=null;}}

async function bootstrap(){
  state.range=weekRange();
  state.loading=false;
  renderLogin();
  try{
    await loadSettings();
    await Promise.all([loadTeachers(), loadStudents(), loadLessons(), loadFollowSettings(), loadTasks()]);
    if(!state.teacher){
      const remembered=getRememberedTeacherId();
      const savedTeacher=remembered ? state.teachers.find(x=>cleanId(x.id)===remembered) : null;
      if(savedTeacher){
        state.teacher=savedTeacher;
        await loadFollowSettings();
        startAutoRefresh();
      }
    }
    if(state.teacher) render(); else renderLogin();
  }catch(e){
    console.warn('Başlangıç verileri yüklenemedi:', e);

function render(options={}){
  const preserveScroll=!!options.preserveScroll && !state.pendingStudentTaskScroll;
  const savedScrollY=preserveScroll ? window.scrollY : null;
  const savedMainHeight=preserveScroll ? Math.max(0,document.getElementById('mainArea')?.offsetHeight||0) : 0;
  if(state.loading && !state.teacher){app.innerHTML=`<div class="login-wrap"><div class="card loading-card"><span class="spinner"></span><h1>Yükleniyor</h1><p>Öğretmen, öğrenci ve Firebase bağlantıları hazırlanıyor.</p></div></div>`;return;}
  if(!state.teacher){renderLogin(); return;}
  app.innerHTML=`${topbarHtml()}<main class="container" id="mainArea" ${savedMainHeight?`style="min-height:${savedMainHeight}px"`:''}></main>${bottomNavHtml()}`;
  const main=document.getElementById('mainArea');
  let viewResult=null;
  if(state.selectedStudent) viewResult=renderStudentDetail(main,state.selectedStudent);
  else if(state.activeTab==='dashboard') viewResult=renderDashboard(main);
  else if(state.activeTab==='students') viewResult=renderStudents(main);
  else if(state.activeTab==='tasks') viewResult=renderTasks(main);
  else if(state.activeTab==='admin') viewResult=renderAdmin(main);
  bindGlobal();
  if(state.pendingStudentTaskScroll){runPendingStudentTaskScroll(); return;}
  if(preserveScroll) Promise.resolve(viewResult).finally(()=>{restoreSavedScroll(savedScrollY); document.getElementById('mainArea')?.style.removeProperty('min-height');});
}
function restoreSavedScroll(savedScrollY,attempt=0){
  if(savedScrollY===null || savedScrollY===undefined) return;
  const maxY=Math.max(0,document.documentElement.scrollHeight-window.innerHeight);
  const targetY=Math.min(Math.max(0,Number(savedScrollY)||0),maxY);
  window.scrollTo({top:targetY,behavior:'auto'});
  if(attempt<4) requestAnimationFrame(()=>restoreSavedScroll(savedScrollY,attempt+1));
}

function queueUiScroll(target,behavior='smooth'){
  state.pendingStudentTaskScroll={target,behavior};
}
function scrollToStudentTaskArea(target,attempt=0,behavior='smooth'){
  const key=typeof target==='object' ? target.target : target;
  const mode=(typeof target==='object' ? target.behavior : behavior) || 'smooth';
  const map={
    main:'#mainArea',
    top:'#mainArea',
    studentTop:'.student-head-card',
    studentContent:'#studentDetailContent',
    detailTabs:'.detail-tabs',
    analysis:'#studentDetailContent',
    parent:'#studentDetailContent',
    messages:'#studentDetailContent',
    packageGrid:'.assignment-package-grid',
    packageDetail:'.assignment-package-detail',
    dayPanel:'.package-day-panel',
    taskParentNotify:'.task-parent-notify',
    wizardPanel:'.wizard-panel',
    adminTabs:'.admin-main-tabs',
    adminPanel:'.admin-tab-panel.active',
    lessonCard:'.lesson-active-note, .lesson-card'
  };
  const selector=map[key]||key;
  const el=document.querySelector(selector);
  if(!el){
    if(attempt<120) requestAnimationFrame(()=>scrollToStudentTaskArea(target,attempt+1,mode));
    return false;
  }
  const topbar=document.querySelector('.topbar');
  const topbarHeight=topbar ? topbar.getBoundingClientRect().height : 0;
  const safeGap=14;
  const top=Math.max(0, window.scrollY + el.getBoundingClientRect().top - topbarHeight - safeGap);
  window.scrollTo({top,behavior:mode});
  const pending=state.pendingStudentTaskScroll;
  if(pending && (pending===target || pending.target===key)) state.pendingStudentTaskScroll=null;
  return true;
}
function runPendingStudentTaskScroll(){
  const pending=state.pendingStudentTaskScroll;
  if(!pending) return;
  requestAnimationFrame(()=>requestAnimationFrame(()=>scrollToStudentTaskArea(pending)));
}

function dailyFilterStatus(item){
  if(!item || Number(item.totalTarget||0)<=0) return 'noTask';
  const pct=Number(item.completionPct||0);
  if(Number(item.totalDone||0)<=0 || pct<=0) return 'zero';
  if(pct>=100) return 'completed';
  return 'incomplete';
}
function dailyFollowFilterCounts(items){
  const counts={all:items.length,completed:0,incomplete:0,zero:0};
  for(const item of items){
    const status=dailyFilterStatus(item);
    if(status==='completed') counts.completed++;
    if(status==='incomplete') counts.incomplete++;
    if(status==='zero') counts.zero++;
  }
  return counts;
}

      <div><small>Görev Durumu</small><strong>${esc(targetText)}</strong></div>

    <div class="daily-card-section"><b>Seçili gün çalışma özeti</b>${dailyEntrySummaryHtml(item.stats)}</div>
    <div class="daily-card-section"><b>Yerine getirilen görevler</b>${hasTask?dailyTaskListHtml(item.completedLessons,'Henüz tamamlanan görev yok.','done'):'<div class="daily-empty-line">Seçili gün atanmış görev yok.</div>'}</div>
    <div class="daily-card-section"><b>Eksik kalan görevler</b>${hasTask?dailyTaskListHtml(item.missingLessons,'Eksik görev görünmüyor.','missing'):'<div class="daily-empty-line">Seçili gün atanmış görev yok.</div>'}</div>

}

function quickStudentInsightHtml(stats){
  const pct=accuracyPct(stats);
  const weak=weakAreas(stats).slice(0,2).map(x=>x.label).join(', ') || 'Belirgin eksik alan yok';
  const msg=stats.total===0?'Bu aralıkta veri girişi yok. Analiz için çalışma kaydı gerekli.':pct<60?'Başarı düşük görünüyor. Öncelik eksik konulara verilmeli.':pct<80?'Orta düzey ilerleme var. Düzenli tekrar başarıyı yükseltir.':'Başarı seviyesi iyi görünüyor. Güçlü alanlar korunmalı.';
  return `<div class="risk-card ${pct>=80?'good':pct<60?'low':'warn'}"><b>${esc(msg)}</b><p>Öncelik: ${esc(weak)}</p></div>`;
}

  return `<div class="grid two">

    <div class="card"><h3>Ders Dağılımı</h3>${subjectBarsHtml(stats)}</div>

    <div class="card"><h3>En Güçlü Alanlar</h3>${strongAreasHtml(stats)}</div>

    <div class="card"><h3>En Güçlü Dersler</h3>${lessonStrengthsHtml(stats,'strong')}</div>

function rangeSelectorHtml(){const r=state.range||weekRange(); return `<div class="chipbar" style="margin-bottom:10px"><button class="chip" data-range="today">Bugün</button><button class="chip" data-range="week">Bugünden 7 gün</button><button class="chip" data-range="month">Bu ay</button><button class="chip" data-range="last30">Son 30</button></div><div class="compact-grid"><div class="field"><label>Başlangıç</label><input id="rangeStart" type="date" class="input" value="${r.start}"></div><div class="field"><label>Bitiş</label><input id="rangeEnd" type="date" class="input" value="${r.end}"></div></div><button id="applyRange" class="secondary" style="margin-top:10px">Uygula</button><p class="muted tiny">Görünen tarih: ${fmtDate(r.start)} - ${fmtDate(r.end)}</p>`;}
function bindRangeSelector(){document.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>{const type=b.dataset.range; state.range=type==='today'?{title:'Bugün',start:todayISO(),end:todayISO()}:type==='week'?weekRange():type==='month'?monthRange():last30Range(); queueUiScroll('studentContent','smooth'); render();}); document.getElementById('applyRange')?.addEventListener('click',()=>{state.range={title:'Özel',start:document.getElementById('rangeStart').value,end:document.getElementById('rangeEnd').value}; queueUiScroll('studentContent','smooth'); render();});}
function subjectBarsHtml(stats){if(!stats.subjects.length) return '<div class="empty">Bu aralıkta çalışma girişi yok.</div>'; return stats.subjects.map(s=>{const ratio=s.total?Math.round((s.correct/s.total)*100):0; return `<div style="margin:10px 0"><div class="row"><b>${esc(s.lesson)}</b><span class="spacer"></span><span class="muted tiny">${s.total} soru</span></div><div class="bar"><span style="width:${Math.min(100,ratio)}%"></span></div><p class="muted tiny">Doğru ${s.correct} • Yanlış ${s.wrong} • Boş ${s.empty}</p></div>`;}).join('');}

function accuracyPct(obj){const total=Number(obj?.total||0); return total?Math.round((Number(obj.correct||0)/total)*100):0;}
function itemAccuracy(x){return x.total?Math.round((x.correct/x.total)*100):0;}
function analysisLevel(pct,total=0){if(!total)return{key:'none',label:'Veri yok',text:'Analiz için yeterli çalışma girişi yok.'}; if(total<10)return{key:'data',label:'Veri düşük',text:'Bu alanda net karar için daha fazla soru gerekir.'}; if(pct>=85)return{key:'strong',label:'Güçlü',text:'Bu alan güçlü; kısa tekrarlarla korunmalı.'}; if(pct>=75)return{key:'good',label:'İyi',text:'Bu alan eksik değil; hız ve kalıcılık için takip edilmeli.'}; if(pct>=60)return{key:'watch',label:'Takip edilmeli',text:'Orta düzey; yanlışlar analiz edilerek güçlendirilmeli.'}; return{key:'weak',label:'Eksik',text:'Öncelikli tekrar ve konu çalışması gerekiyor.'};}
function weakAreas(stats){const arr=(stats.topics||[]).filter(x=>Number(x.total||0)>0).map(x=>{const pct=itemAccuracy(x);const level=analysisLevel(pct,Number(x.total||0));return{...x,label:`${x.lesson} / ${x.topic||'Genel'}`,pct,level:level.key,levelLabel:level.label,levelText:level.text};});return arr.filter(x=>x.level==='weak'||x.level==='watch'||x.level==='data').sort((a,b)=>({weak:0,watch:1,data:2}[a.level]-{weak:0,watch:1,data:2}[b.level])||(a.pct-b.pct)||((a.total||0)-(b.total||0)));}
function strongAreas(stats){return (stats.topics||[]).filter(x=>Number(x.total||0)>=10).map(x=>{const pct=itemAccuracy(x);const level=analysisLevel(pct,Number(x.total||0));return{...x,label:`${x.lesson} / ${x.topic||'Genel'}`,pct,level:level.key,levelLabel:level.label,levelText:level.text};}).filter(x=>x.pct>=75).sort((a,b)=>(b.pct-a.pct)||((b.total||0)-(a.total||0)));}
function lessonStrengths(stats,type='strong'){
  const rows=(stats.subjects||[]).filter(x=>Number(x.total||0)>0).map(x=>({...x,pct:itemAccuracy(x),levelInfo:analysisLevel(itemAccuracy(x),Number(x.total||0))}));
  if(type==='weak') return rows.sort((a,b)=>(a.pct-b.pct)||((a.total||0)-(b.total||0)));
  return rows.sort((a,b)=>(b.pct-a.pct)||((b.total||0)-(a.total||0)));
}
function lessonStrengthsHtml(stats,type='strong'){
  const list=lessonStrengths(stats,type).slice(0,6);
  if(!list.length) return '<div class="empty">Bu aralıkta ders bazlı veri yok.</div>';

}

function dateFromAbsoluteValue(value){
  if(value===null || value===undefined || value==='') return null;
  if(value instanceof Date) return isNaN(value) ? null : value;
  if(typeof value==='number' && isFinite(value)){
    const ms=value>9999999999 ? value : value*1000;
    const d=new Date(ms);
    return isNaN(d) ? null : d;
  }
  const s=String(value||'').trim();
  if(!s) return null;
  if(/^\d{10,13}$/.test(s)){
    const n=Number(s);
    const d=new Date(s.length===10?n*1000:n);
    return isNaN(d) ? null : d;
  }
  if(/^\d{4}-\d{2}-\d{2}T/.test(s) && /(Z|[+-]\d{2}:?\d{2})$/i.test(s)){
    const d=new Date(s.replace(/([+-]\d{2})(\d{2})$/,'$1:$2'));
    return isNaN(d) ? null : d;
  }
  return null;
}
function minutesFromTimeText(t){const m=String(t||'').match(/^(\d{2}):(\d{2})$/); return m?Number(m[1])*60+Number(m[2]):null;}
function localTimeFromTextValue(value){
  const s=String(value||'').trim();
  if(!s) return '';
  const m=s.match(/\b(\d{1,2}):(\d{2})\b/);
  return m ? `${pad2(m[1])}:${m[2]}` : '';
}
function recordLocalDate(record){
  const raw=record?.raw||record||{};
  return record?.date || isoFromAny(raw.dateKey||raw.tarih||raw.date||raw.gun||raw.tarihSaat||'') || '';
}
function normalizeRecordDisplayTime(record,time){
  time=String(time||'').trim();
  if(!time) return '';
  const date=recordLocalDate(record);
  const today=todayISO();
  if(date && date===today){
    const nowMin=minutesFromTimeText(appTimeText(new Date()));
    const recMin=minutesFromTimeText(time);
    if(nowMin!==null && recMin!==null && recMin>nowMin+5){
      const raw=record?.raw||record||{};
      const absoluteCandidates=[raw.timestamp,raw.createdAt,raw.created_at,raw.serverTime,raw.createdAtMs,record?.createdAt];
      for(const val of absoluteCandidates){
        const d=dateFromAbsoluteValue(val);
        if(!d) continue;
        const fallback=appTimeText(d);
        const fallbackMin=minutesFromTimeText(fallback);
        if(fallbackMin!==null && fallbackMin<=nowMin+5) return fallback;
      }
      const fallback=[raw.localTime,raw.girisSaati,raw.entryTime,raw.time,raw.tarihSaat,raw.tarih].map(localTimeFromTextValue).find(Boolean);
      if(fallback && minutesFromTimeText(fallback)<=nowMin+5) return fallback;
      return `${time} ⚠`;
    }
  }
  return time;
}
function recordSortValue(record){
  const raw=record?.raw||record||{};
  const localTime=[raw.localTime,raw.saat,raw.girisSaati,raw.entryTime,raw.time,raw.tarihSaat,raw.tarih].map(localTimeFromTextValue).find(Boolean);
  const date=recordLocalDate(record) || isoFromAny(raw.createdAt||raw.created_at||raw.serverTime||'') || '0000-00-00';
  if(localTime) return Number(String(date).replace(/\D/g,'') + String(localTime).replace(/\D/g,'')) || 0;
  const candidates=[raw.timestamp,raw.createdAt,raw.created_at,raw.serverTime,record?.createdAt];
  for(const val of candidates){
    const d=dateFromAbsoluteValue(val);
    if(d) return d.getTime();
  }
  return Number(String(date).replace(/\D/g,'') + '0000') || 0;
}
function recordTimeText(record){
  const raw=record?.raw||record||{};
  const direct=[raw.localTime,raw.saat,raw.girisSaati,raw.entryTime,raw.time,raw.tarihSaat,raw.tarih].map(localTimeFromTextValue).find(Boolean);
  if(direct) return normalizeRecordDisplayTime(record,direct);
  const absoluteCandidates=[raw.timestamp,raw.createdAt,raw.created_at,raw.serverTime,record?.createdAt];
  for(const val of absoluteCandidates){
    const d=dateFromAbsoluteValue(val);
    if(d) return normalizeRecordDisplayTime(record,appTimeText(d));
  }
  return '';
}

function dataPackageAnalysis(pkg,stats,visibleOnly=false,selectedDay=''){
  const records=stats?.records||[];
  const today=todayISO();
  const rows=[];
  const dayList=selectedDay ? [selectedDay] : (pkg.days||[]);
  for(const day of dayList){
    if(selectedDay && !(pkg.days||[]).includes(day)) continue;
    const targets=packageDayLessonTargets(pkg,day);
    const dayRecords=records.filter(r=>r.date===day);
    if(visibleOnly && (day>today || !dayRecords.length)) continue;
    const targetTotal=targets.reduce((s,x)=>s+Number(x.target||0),0);
    const lessonRows=targets.map(x=>{
      const recs=dayRecords.filter(r=>String(r.lesson||'').trim()===String(x.lesson||'').trim());
      const done=recs.reduce((a,r)=>a+Number(r.total||0),0);
      const correct=recs.reduce((a,r)=>a+Number(r.correct||0),0);
      const wrong=recs.reduce((a,r)=>a+Number(r.wrong||0),0);
      const empty=recs.reduce((a,r)=>a+Number(r.empty||0),0);
      return {lesson:x.lesson,target:Number(x.target)||0,done,correct,wrong,empty,items:x.items||[],missing:Math.max(0,(Number(x.target)||0)-done),records:recs};
    });
    const doneTotal=lessonRows.reduce((s,x)=>s+Number(x.done||0),0);
    const cappedDoneTotal=lessonRows.reduce((s,x)=>s+creditedTaskDone(x.done,x.target),0);
    const extraRecords=dayRecords.filter(r=>!targets.some(x=>String(x.lesson||'').trim()===String(r.lesson||'').trim()));
    const pct=targetTotal?Math.min(100,Math.round((cappedDoneTotal/targetTotal)*100)):0;
    rows.push({day,targetTotal,doneTotal,cappedDoneTotal,pct,lessonRows,extraRecords,dayRecords});
  }
  const targetTotal=rows.reduce((s,d)=>s+d.targetTotal,0);
  const doneTotal=rows.reduce((s,d)=>s+d.doneTotal,0);
  const cappedDoneTotal=rows.reduce((s,d)=>s+d.cappedDoneTotal,0);
  return {pkg,rows,targetTotal,doneTotal,cappedDoneTotal,pct:targetTotal?Math.min(100,Math.round(cappedDoneTotal/targetTotal*100)):0};
}

  const listHtml=analyses.length?analyses.map(dataEntryPackageHtml).join(''): `<div class="empty">${esc(fmtDate(selectedDay))} için görev paketi veya veri girişi görünmüyor.</div>`;
  const extraOnlyHtml=(!analyses.length && dayRecords.length)?`<div class="data-entry-package"><div class="data-entry-package-head"><div><span class="package-index">Hedef dışı kayıt</span><h4>Seçili gün veri girişleri</h4><p class="muted tiny">${esc(fmtDate(selectedDay))} tarihinde paket hedefi olmadan girilen kayıtlar</p></div><span class="badge">${dayRecords.reduce((s,r)=>s+Number(r.total||0),0)} soru</span></div><div class="data-record-list">${dayRecords.map(r=>`<div class="data-record-row"><div><b>${esc(r.lesson)} • ${esc(recordTopicText(r))}</b><small>${fmtDate(r.date)}${recordTimeText(r)?' • '+esc(recordTimeText(r)):''}</small></div><span class="badge">${esc(r.total)} soru • %${esc(itemAccuracy(r))}</span></div>`).join('')}</div></div>`:'';
  return `<div class="card"><h3>Veri Girişi Analizi</h3><p class="muted tiny">Bu bölüm seçilen tek güne göre çalışır. Normal öğrenci detayındaki tarih aralığından bağımsızdır; mesaj da yalnızca seçilen günün paket/veri durumuna göre oluşur.</p>${filterHtml}${statsHtml([['Paket',analyses.length,'Seçili gün'],['Hedef',totalTarget,'Soru'],['Yapılan',totalDone,'Soru'],['Tamamlama',`%${pct}`,'Seçili gün']])}<div class="data-entry-package-list" style="margin-top:14px">${extraOnlyHtml || listHtml}</div><div class="data-entry-message-panel"><h4>Veliye Günlük WhatsApp Bilgisi</h4><p class="muted tiny">Öğrencinin seçilen gün için yaptığı ve yapmadığı dersler paket hedeflerine göre mesaj haline getirilir.</p><div class="row"><button class="primary" data-data-message="generate">Mesajı Oluştur</button><button class="ghost hidden" data-data-message="copy">Metni Kopyala</button><button class="primary hidden" data-data-message="whatsapp">WhatsApp Aç</button></div><div id="dataEntryMessageBox" style="margin-top:12px"></div><div id="dataEntryConfirmBox" style="margin-top:12px"></div></div></div>`;

function buildDailyDataEntryParentMessage(st,stats,tasks,day=todayISO()){
  const activeTasks=(tasks||[]).filter(t=>taskIsActiveForStudentOnDay(t,st,day));
  const packages=buildStudentTaskPackages(activeTasks,{start:day,end:day});
  const records=(stats.records||[]).filter(r=>r.date===day);
  const targetMap={};
  packages.forEach(pkg=>packageDayLessonTargets(pkg,day).forEach(x=>{
    if(!targetMap[x.lesson]) targetMap[x.lesson]={lesson:x.lesson,target:0,items:[]};
    targetMap[x.lesson].target+=Number(x.target||0);
    targetMap[x.lesson].items.push(...(x.items||[]));
  }));
  const recordMap={};
  records.forEach(r=>{
    const lesson=String(r.lesson||'Genel').trim()||'Genel';
    if(!recordMap[lesson]) recordMap[lesson]={lesson,total:0,correct:0,wrong:0,empty:0,topics:new Set()};
    recordMap[lesson].total+=Number(r.total||0);
    recordMap[lesson].correct+=Number(r.correct||0);
    recordMap[lesson].wrong+=Number(r.wrong||0);
    recordMap[lesson].empty+=Number(r.empty||0);
    const topic=recordTopicText(r);
    if(topic && topic!=='Konu bilgisi yok') recordMap[lesson].topics.add(topic);
  });
  const lessons=[...new Set([...Object.keys(targetMap),...Object.keys(recordMap)])].sort((a,b)=>a.localeCompare(b,'tr'));
  const pctOf=r=>r?.total?Math.round(Number(r.correct||0)/Number(r.total||0)*100):0;
  const goalLine=l=>{
    const t=targetMap[l];
    if(!t) return `${l} • hedef dışı çalışma`;
    const details=(t.items||[]).map(x=>x.summary).filter(Boolean);
    return details.length?details.join(' + '):`${l} • hedef ${t.target} soru`;
  };
  const doneDetailLine=l=>{
    const r=recordMap[l]||{total:0,correct:0,wrong:0,empty:0,topics:new Set()};
    const topics=[...(r.topics||[])].slice(0,1).join(' / ');
    return `• ${goalLine(l)}\n  Çözdüğü: ${r.total} soru • Doğru: ${r.correct} • Yanlış: ${r.wrong} • Boş: ${r.empty} • Başarı: %${pctOf(r)}${topics?`\n  Konu: ${topics}`:''}`;
  };
  const simpleMissingLine=l=>{
    const t=targetMap[l]||{target:0};
    const r=recordMap[l]||{total:0};
    const status=Number(r.total||0)>0 ? `tamamlanmadı (${r.total}/${t.target} soru)` : 'yapılmadı';
    return `• ${goalLine(l)} → ${status}`;
  };
  const simpleExtraLine=l=>{
    const r=recordMap[l]||{total:0};
    return `• ${l}: hedef dışı ${r.total} soru çalışıldı`;
  };
  const doneRows=lessons.filter(l=>Number(targetMap[l]?.target||0)>0 && Number(recordMap[l]?.total||0)>=Number(targetMap[l]?.target||0));
  const missingRows=lessons.filter(l=>Number(targetMap[l]?.target||0)>0 && Number(recordMap[l]?.total||0)<Number(targetMap[l]?.target||0));
  const extraRows=lessons.filter(l=>!Number(targetMap[l]?.target||0) && Number(recordMap[l]?.total||0)>0);
  const doneText=doneRows.length?doneRows.map(doneDetailLine).join('\n'):'• Tamamlanan görev görünmüyor.';
  const missingText=missingRows.length?missingRows.map(simpleMissingLine).join('\n'):'• Tamamlanmayan / yapılmayan görev görünmüyor.';
  const extraText=extraRows.length?`\n\n➕ *Hedef dışı yapılan çalışmalar*\n${extraRows.map(simpleExtraLine).join('\n')}`:'';
  const totalTarget=Object.values(targetMap).reduce((sum,x)=>sum+Number(x.target||0),0);
  const totalDone=Object.values(recordMap).reduce((sum,x)=>sum+Number(x.total||0),0);
  const cappedDone=lessons.reduce((sum,l)=>sum+creditedTaskDone(recordMap[l]?.total,targetMap[l]?.target),0);
  const pct=totalTarget?Math.min(100,Math.round(cappedDone/totalTarget*100)):0;
  const teacherLine=state.teacher?.name?`\n\n👩‍🏫 *Öğretmen:* ${state.teacher.name}`:'';
  return `Sayın Velimiz, merhaba. 👋\n\n*${st.name}* öğrencimizin ${fmtDate(day)} tarihli görev ve veri girişi özeti aşağıdadır.\n\n📌 *Günlük Paket Durumu*\nHedef: ${totalTarget} soru\nYapılan: ${totalDone} soru\nTamamlama: %${pct}\n\n✅ *Yapılanlar*\n${doneText}\n\n⚠️ *Tamamlanmayan / Yapılmayanlar*\n${missingText}${extraText}${teacherLine}\n\nBilginize sunar, iyi günler dileriz.\n${state.settings.kurumAdi}`;
}
function bindDataEntryAnalysis(st,stats,tasks){
  const dateInput=document.getElementById('studentDataEntryDate');
  if(dateInput){
    dateInput.addEventListener('change',()=>setStudentDataEntryDate(dateInput.value));
  }
  document.querySelectorAll('[data-data-entry-date]').forEach(btn=>{
    btn.addEventListener('click',()=>setStudentDataEntryDate(btn.dataset.dataEntryDate));
  });
  const panel=document.querySelector('.data-entry-message-panel');
  if(!panel) return;
  let generated='';
  const draw=()=>{
    const selectedDay=selectedStudentDataEntryDate();
    generated=buildDailyDataEntryParentMessage(st,stats,tasks,selectedDay);
    const box=document.getElementById('dataEntryMessageBox');
    if(box) box.innerHTML=`<div class="message-preview">${esc(generated)}</div>`;
    panel.querySelectorAll('[data-data-message="copy"],[data-data-message="whatsapp"]').forEach(b=>b.classList.remove('hidden'));
  };
  panel.addEventListener('click',async e=>{
    const btn=e.target.closest('[data-data-message]');
    if(!btn) return;
    try{
      const action=btn.dataset.dataMessage;
      if(action==='generate'){draw(); return;}
      const selectedDay=selectedStudentDataEntryDate();
      const message=generated || buildDailyDataEntryParentMessage(st,stats,tasks,selectedDay);
      if(action==='copy'){
        await copyText(message); setToast('Veri girişi veli mesajı kopyalandı','ok'); return;
      }
      if(action==='whatsapp'){
        const phone=normalizePhoneTR(st.parentPhone);
        if(!phone) throw new Error('Veli telefonu yok. Metni kopyalayarak manuel gönderebilirsiniz.');

        state.draftConfirm={student:st,channel:'WhatsApp Veri Girişi',message};
        const old=document.getElementById('confirmBox');
        const box=document.getElementById('dataEntryConfirmBox');
        if(box){box.id='confirmBox'; renderConfirmBox(); box.id='dataEntryConfirmBox';}

      }
    }catch(err){setToast(err.message,'error');}
  });
}

/* Görev kartından ayrı ayrı indirilen genel ve öğrenci TXT raporları. */
function reportPct(value,total){return total>0?Math.round((Number(value||0)/Number(total||0))*100):0;}
function reportAverage(values){const nums=(values||[]).map(Number).filter(Number.isFinite); return nums.length?Math.round(nums.reduce((s,n)=>s+n,0)/nums.length):0;}
function reportFilePart(value){
  return String(value||'rapor')
    .replaceAll('İ','I').replaceAll('ı','i').replaceAll('Ş','S').replaceAll('ş','s')
    .replaceAll('Ğ','G').replaceAll('ğ','g').replaceAll('Ü','U').replaceAll('ü','u')
    .replaceAll('Ö','O').replaceAll('ö','o').replaceAll('Ç','C').replaceAll('ç','c')
    .replace(/[^A-Za-z0-9._-]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
}
function reportDateFilePart(value){return fmtDate(value).replaceAll('.','-')||reportFilePart(value);}
function reportMomentInfo(date=new Date()){
  const p=appDateParts(date);
  return {date:`${p.year}-${p.month}-${p.day}`,time:`${p.hour}:${p.minute}`,text:`${p.day}.${p.month}.${p.year} ${p.hour}:${p.minute}`,fileTime:`${p.hour}-${p.minute}`};
}
function taskReportEffectiveEnd(task,momentDate){
  const clickDay=appDateISO(momentDate);
  const taskEnd=isoFromAny(task?.end)||clickDay;
  return taskEnd<clickDay?taskEnd:clickDay;
}
function taskReportDayContext(task,start,end){
  return taskDayKeys(task).filter(day=>day>=start && day<=end).map(day=>{
    const targets=aggregateTaskItemsByLesson(taskItemsForDay(task,day));
    return {day,targets,targetTotal:targets.reduce((sum,x)=>sum+Number(x.target||0),0)};
  }).filter(x=>x.targetTotal>0);
}
function taskReportGroupRecords(records){
  const map=new Map();
  (records||[]).forEach(r=>{
    const lesson=String(r.lesson||'Genel').trim()||'Genel';
    const topic=String(r.topic||'').trim();
    const subtopic=String(r.subtopic||'').trim();
    const key=[lesson,topic,subtopic].join('|||');
    if(!map.has(key)) map.set(key,{lesson,topic,subtopic,total:0,correct:0,wrong:0,empty:0});
    const row=map.get(key);
    row.total+=Number(r.total||0); row.correct+=Number(r.correct||0); row.wrong+=Number(r.wrong||0); row.empty+=Number(r.empty||0);
  });
  return [...map.values()].sort((a,b)=>a.lesson.localeCompare(b.lesson,'tr')||a.topic.localeCompare(b.topic,'tr')||a.subtopic.localeCompare(b.subtopic,'tr'));
}
function taskReportTrend(dayRows){
  const rows=dayRows||[];
  const values=rows.map(x=>Number(x.completionPct||0));
  const workedDays=rows.filter(x=>Number(x.doneTotal||0)>0).length;
  if(values.length<4 || workedDays<2) return {label:'',delta:0};
  const half=Math.floor(values.length/2);
  const first=reportAverage(values.slice(0,half));
  const last=reportAverage(values.slice(values.length-half));
  const delta=last-first;
  return {label:delta>=10?'Son günlerde görev tamamlama arttı.':delta<=-10?'Son günlerde görev tamamlama azaldı.':'Çalışma düzeni genel olarak dengeli ilerledi.',delta};
}
function taskReportMaxMissingStreak(dayRows){
  let current=0,max=0;
  (dayRows||[]).forEach(x=>{current=x.statusKey==='missing'?current+1:0; max=Math.max(max,current);});
  return max;
}

  });

  const topicCandidates=(stats?.topics||[]).filter(x=>Number(x.total||0)>=10 && String(x.topic||'').trim() && String(x.topic||'').trim()!=='Genel').map(x=>({...x,pct:reportPct(x.correct,x.total)}));
  const strongestLesson=[...lessonCandidates].sort((a,b)=>b.pct-a.pct||b.total-a.total)[0]||null;
  const weakestLesson=[...lessonCandidates].sort((a,b)=>a.pct-b.pct||b.total-a.total)[0]||null;
  const strongestTopic=[...topicCandidates].sort((a,b)=>b.pct-a.pct||b.total-a.total)[0]||null;
  const weakestTopic=[...topicCandidates].sort((a,b)=>a.pct-b.pct||b.total-a.total)[0]||null;
  const trend=taskReportTrend(days);

  if(strongestTopic) positives.push(`${strongestTopic.lesson} / ${strongestTopic.topic} konusunda başarılı bir çalışma gösterdi.`);
  else if(strongestLesson) positives.push(`${strongestLesson.lesson} dersindeki başarı oranı %${strongestLesson.pct}.`);

  if(trend.label && trend.delta>=10) positives.push(trend.label);
